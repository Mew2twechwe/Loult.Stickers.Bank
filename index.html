<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Banque de stickers Loult</title>
<style>
body{
  background:#111;
  color:white;
  font-family:Arial,sans-serif;
  margin:0;
  padding:20px;
}
h1{text-align:center}
#dropZone{
  border:3px dashed #666;
  border-radius:15px;
  padding:35px;
  text-align:center;
  margin-bottom:20px;
}
#dropZone.dragover{
  background:#222;
  border-color:white;
}
input,button{
  padding:10px;
  margin:5px;
  border-radius:6px;
}
button{
  cursor:pointer;
  background:#333;
  color:white;
  border:1px solid #777;
}
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
}
.card{
  background:#1b1b1b;
  border:1px solid #444;
  border-radius:10px;
  padding:10px;
  text-align:center;
}
.card img{
  max-width:120px;
  max-height:120px;
}
</style>
</head>
<body>

<h1>Banque de stickers Loult</h1>

<div id="dropZone">
  <h2>Glisse un sticker ici</h2>
  <p>ou choisis un fichier</p>
  <input type="file" id="fileInput" accept="image/*">
</div>

<div class="gallery" id="gallery"></div>

<script>
const STORAGE_KEY = "loult_stickers_v2";

const fileInput = document.getElementById("fileInput");
const dropZone = document.getElementById("dropZone");
const gallery = document.getElementById("gallery");

let stickers = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(stickers));
}

function render(){
  gallery.innerHTML = "";

  stickers.forEach((sticker, index) => {
    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = sticker.image;

    const name = document.createElement("div");
    name.textContent = sticker.name;

    const copyBtn = document.createElement("button");
    copyBtn.textContent = "Copier";
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(sticker.image);
      alert("Sticker copié !");
    };

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Supprimer";
    deleteBtn.onclick = () => {
      stickers.splice(index, 1);
      save();
      render();
    };

    card.appendChild(img);
    card.appendChild(name);
    card.appendChild(copyBtn);
    card.appendChild(deleteBtn);

    gallery.appendChild(card);
  });
}

function addFile(file){
  if(!file || !file.type.startsWith("image/")){
    alert("Choisis une image.");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    stickers.push({
      name: file.name,
      image: e.target.result
    });

    save();
    render();

    fileInput.value = "";
  };

  reader.readAsDataURL(file);
}

fileInput.addEventListener("change", () => {
  addFile(fileInput.files[0]);
});

dropZone.addEventListener("dragover", e => {
  e.preventDefault();
  dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("dragover");

  const file = e.dataTransfer.files[0];
  addFile(file);
});

render();
</script>

</body>
</html>

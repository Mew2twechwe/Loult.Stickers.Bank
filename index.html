<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Loult Stickers Bank</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap");

:root{
  color-scheme:dark;
  --bg:#0d0d0d;
  --text:#ffffff;
  --muted:#b8b0c4;
  --panel:rgba(18,10,30,.74);
  --panel-border:rgba(255,255,255,.22);
  --purple:#9b6cff;
  --pink:#ff5bbd;
  --forge-red:#ff5264;
  --forge-orange:#ff8a35;
  --gold:#ffd84a;
  --blue:#285bd8;
  --pixel-font:"Silkscreen","Pixelify Sans","Courier New",monospace;
}

*{box-sizing:border-box}

body{
  margin:0;
  padding:20px;
  color:var(--text);
  font-family:Arial,sans-serif;
  background:var(--bg);
  position:relative;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:var(
    --page-bg-image,
    url("https://i.imgur.com/jdUGJcx_d.webp?maxwidth=1920&fidelity=grand"),
    url("https://i.imgur.com/jdUGJcx.png"),
    url("https://i.imgur.com/jdUGJcx.jpg"),
    url("https://i.imgur.com/jdUGJcx.jpeg"),
    url("https://i.imgur.com/jdUGJcx.webp")
  );
  background-size:cover;
  background-repeat:no-repeat;
  background-position:center center;
  opacity:.92;
  pointer-events:none;
  z-index:-2;
  filter:saturate(1.08) contrast(1.04);
}

h1{text-align:center}

h2,h3{margin-top:0}

.forge-panel h2,
.forge-panel h3,
.astral-search-panel h2,
.astral-shortcuts-panel h2{
  font-family:var(--pixel-font);
  font-weight:700;
  letter-spacing:.7px;
  line-height:1.2;
  text-transform:none;
  image-rendering:pixelated;
}

.forge-panel h2,
.astral-search-panel h2,
.astral-shortcuts-panel h2{
  font-size:24px;
}

.forge-panel h3{
  font-size:18px;
}

.section{
  position:relative;
  overflow:hidden;
  background:rgba(18,10,30,.78);
  border:1px solid rgba(220,205,255,.18);
  border-radius:10px;
  padding:16px;
  margin-bottom:18px;
  backdrop-filter:none;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    0 10px 24px rgba(8,4,18,.24);
}

.sub-section{
  margin-top:8px;
  padding:0;
  border-top:0;
  border-radius:0;
  background:transparent;
  box-shadow:none;
  outline:0;
}

input,select,button{
  padding:10px;
  margin:5px;
  border-radius:6px;
}

input,select{
  color:white;
  background:rgba(8,8,14,.92);
  border:1px solid rgba(255,255,255,.24);
  box-shadow:inset 0 1px 7px rgba(0,0,0,.50);
}

button{
  cursor:pointer;
  color:white;
  background:#333;
  border:1px solid #777;
}

button:hover{background:#555}

.big-btn{
  font-size:20px;
  padding:16px 30px;
}

.hidden{display:none!important}

.stats-astral{
  position:relative;
  overflow:hidden;
  text-align:center;
  margin:0 auto 22px auto;
  padding:10px 16px;
  max-width:640px;
  border-radius:18px;
  font-weight:bold;
  letter-spacing:.8px;
  color:#fff;
  background:
    radial-gradient(circle at 18% 35%, rgba(70,0,95,.30), transparent 30%),
    radial-gradient(circle at 78% 45%, rgba(150,0,80,.20), transparent 28%),
    linear-gradient(135deg,#07070a,#120018 55%,#07070a);
  border:1px solid rgba(120,80,180,.18);
  box-shadow:inset 0 0 18px rgba(0,0,0,.95), inset 0 0 14px rgba(110,0,170,.20), 0 0 6px rgba(90,0,140,.14);
  text-shadow:0 0 5px rgba(255,255,255,.85), 0 0 10px rgba(170,70,255,.55);
}

#stats{
  position:relative;
  z-index:10;
  font-size:18px;
  font-weight:bold;
  white-space:nowrap;
}

.stars-soft{
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}

.stars-soft::before,
.stars-soft::after{
  content:"";
  position:absolute;
  inset:0;
  opacity:1;
}

.stars-soft::before{
  background:
    radial-gradient(circle at 5% 18%, rgba(255,255,255,.55) 0 .7px, transparent 2px),
    radial-gradient(circle at 13% 68%, rgba(185,210,255,.42) 0 .8px, transparent 2px),
    radial-gradient(circle at 22% 38%, rgba(255,255,255,.62) 0 1px, transparent 2.4px),
    radial-gradient(circle at 34% 82%, rgba(210,180,255,.50) 0 .9px, transparent 2.3px),
    radial-gradient(circle at 45% 26%, rgba(255,255,255,.70) 0 1.1px, transparent 2.8px),
    radial-gradient(circle at 57% 58%, rgba(180,140,255,.48) 0 .9px, transparent 2.4px),
    radial-gradient(circle at 69% 32%, rgba(255,255,255,.55) 0 .7px, transparent 2px),
    radial-gradient(circle at 81% 74%, rgba(210,220,255,.48) 0 1px, transparent 2.6px),
    radial-gradient(circle at 93% 20%, rgba(255,210,255,.43) 0 .8px, transparent 2px);
  animation:nearStarsPulse 6s ease-in-out infinite alternate;
}

.stars-soft::after{
  inset:-10px;
  background:
    radial-gradient(circle at 10% 44%, rgba(255,255,255,.30) 0 .6px, transparent 2px),
    radial-gradient(circle at 24% 14%, rgba(170,130,255,.34) 0 .7px, transparent 2px),
    radial-gradient(circle at 38% 64%, rgba(255,255,255,.36) 0 .7px, transparent 2px),
    radial-gradient(circle at 52% 86%, rgba(200,180,255,.28) 0 .6px, transparent 2px),
    radial-gradient(circle at 70% 18%, rgba(210,230,255,.35) 0 .7px, transparent 2px),
    radial-gradient(circle at 86% 54%, rgba(255,255,255,.42) 0 .8px, transparent 2.2px),
    radial-gradient(circle at 96% 82%, rgba(190,160,255,.30) 0 .7px, transparent 2px);
  animation:farStarsDrift 13s ease-in-out infinite alternate;
}

.shooting-star{
  position:absolute;
  width:128px;
  height:1px;
  border-radius:999px;
  background:linear-gradient(90deg, rgba(255,255,255,0), rgba(130,145,255,.18), rgba(210,225,255,.75), rgba(245,248,255,.95));
  box-shadow:0 0 3px rgba(230,235,255,.75), 0 0 9px rgba(110,120,255,.45);
  opacity:0;
  z-index:4;
  transform-origin:right center;
  animation:naturalShootingStarA 8.5s ease-in-out infinite;
}

.shooting-star::after{
  content:"";
  position:absolute;
  right:0;
  top:50%;
  width:4px;
  height:4px;
  transform:translateY(-50%);
  border-radius:50%;
  background:rgba(240,245,255,.95);
  box-shadow:0 0 7px rgba(240,245,255,.9), 0 0 14px rgba(110,120,255,.65);
}

.shooting-star.s2{
  width:98px;
  animation:naturalShootingStarB 12s ease-in-out infinite;
  animation-delay:4.5s;
}

.shooting-star.s3{
  width:76px;
  animation:naturalShootingStarC 15s ease-in-out infinite;
  animation-delay:8s;
}

@keyframes nearStarsPulse{
  0%{opacity:.42;transform:scale(1) translate(0,0);filter:blur(0)}
  50%{opacity:.9;transform:scale(1.025) translate(1px,1px);filter:blur(.1px)}
  100%{opacity:.62;transform:scale(1.045) translate(-1px,-1px);filter:blur(.25px)}
}

@keyframes farStarsDrift{
  0%{opacity:.32;transform:translate(-2px,2px) scale(1)}
  100%{opacity:.68;transform:translate(4px,-3px) scale(1.04)}
}

@keyframes naturalShootingStarA{
  0%,58%{opacity:0;transform:translate(72px,-22px) rotate(43deg)}
  62%,76%{opacity:.85}
  76%{transform:translate(368px,94px) rotate(43deg)}
  86%,100%{opacity:0;transform:translate(438px,122px) rotate(43deg)}
}

@keyframes naturalShootingStarB{
  0%,50%{opacity:0;transform:translate(420px,-12px) rotate(48deg)}
  55%,68%{opacity:.65}
  68%{transform:translate(592px,72px) rotate(48deg)}
  80%,100%{opacity:0;transform:translate(642px,98px) rotate(48deg)}
}

@keyframes naturalShootingStarC{
  0%,62%{opacity:0;transform:translate(205px,-16px) rotate(40deg)}
  67%,76%{opacity:.48}
  76%{transform:translate(330px,46px) rotate(40deg)}
  86%,100%{opacity:0;transform:translate(368px,64px) rotate(40deg)}
}

.forge-panel{
  min-height:330px;
  background:
    radial-gradient(circle at 75% 26%, rgba(255,210,70,.24), transparent 22%),
    radial-gradient(circle at 38% 90%, rgba(255,100,35,.26), transparent 32%),
    radial-gradient(circle at 16% 18%, rgba(255,30,75,.30), transparent 36%),
    radial-gradient(circle at 88% 84%, rgba(255,135,35,.24), transparent 34%),
    linear-gradient(135deg,rgba(90,16,28,.82),rgba(32,10,22,.78) 48%,rgba(118,24,18,.82));
  border-color:rgba(255,112,86,.54);
  box-shadow:
    inset 0 0 34px rgba(255,80,35,.20),
    inset 0 0 100px rgba(0,0,0,.30),
    0 0 26px rgba(255,40,70,.26);
}

.forge-panel::before,
.forge-panel::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.forge-panel::before{
  background:
    radial-gradient(ellipse 180px 42px at 10% 2%, rgba(255,122,40,.30) 0 22%, transparent 66%),
    radial-gradient(ellipse 220px 50px at 42% 0%, rgba(255,60,62,.26) 0 20%, transparent 64%),
    radial-gradient(ellipse 240px 48px at 82% 2%, rgba(255,160,54,.28) 0 20%, transparent 66%),
    radial-gradient(ellipse 180px 42px at 4% 100%, rgba(255,54,42,.22) 0 22%, transparent 68%),
    radial-gradient(ellipse 260px 54px at 72% 100%, rgba(255,132,36,.22) 0 22%, transparent 68%);
  opacity:.86;
}

.forge-panel::after{
  inset:0;
  background:none;
  opacity:0;
  animation:none;
}

.forge-panel input,
.forge-panel select{
  background:rgba(12,6,8,.82);
  border:1px solid rgba(255,70,90,.32);
  box-shadow:inset 0 0 12px rgba(0,0,0,.62), 0 0 8px rgba(255,30,60,.10);
}

.forge-panel button{
  background:linear-gradient(135deg,rgba(78,16,24,.96),rgba(135,26,38,.90));
  border:1px solid rgba(255,80,95,.42);
  box-shadow:inset 0 0 10px rgba(255,45,70,.14), 0 0 10px rgba(255,25,60,.16);
}

.forge-panel button:hover{background:linear-gradient(135deg,rgba(105,20,32,.98),rgba(185,35,52,.94))}

.forge-panel h2,
.forge-panel h3{
  position:relative;
  z-index:2;
  text-shadow:0 0 8px rgba(255,70,90,.65), 0 0 20px rgba(255,0,70,.32);
}

.forge-create-row,
.file-url-row{
  display:flex;
  align-items:flex-end;
  gap:12px;
  flex-wrap:wrap;
  position:relative;
  z-index:2;
}

.forge-panel .file-url-row,
.forge-panel .media-choice-group{
  background:transparent;
  border:0;
  box-shadow:none;
  outline:0;
  padding:0;
}

.field-stack{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.field-stack label{
  color:#ddd;
  font-size:13px;
  margin-left:6px;
}

.field-stack input{margin-top:0}
.url-field{min-width:240px}

.icon-choice-group,
.media-choice-group{
  display:flex;
  align-items:flex-end;
  gap:6px;
  position:relative;
}

.icon-choice-group .field-stack,
.media-choice-group .field-stack{min-width:210px}

.media-choice-group{
  gap:2px;
}

.media-choice-group .field-stack{
  min-width:200px;
}

.media-choice-group input{
  margin-left:2px;
  margin-right:2px;
}

.choice-connector{
  position:relative;
  align-self:flex-end;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:32px;
  height:26px;
  margin:0 2px 8px;
  padding:0;
  border-radius:4px;
  color:#ffd36f;
  font-family:'Arial Black',Impact,sans-serif;
  font-size:10px;
  font-weight:bold;
  letter-spacing:0;
  background:#17101c;
  border:2px solid rgba(255,205,95,.82);
  box-shadow:
    0 0 0 2px rgba(78,16,30,.88),
    0 0 9px rgba(255,120,45,.28),
    inset 0 -4px 0 rgba(255,120,45,.16);
  text-shadow:2px 2px 0 rgba(80,18,28,.90);
}

.choice-connector::before{
  content:"";
  position:absolute;
  left:50%;
  top:-10px;
  width:14px;
  height:10px;
  transform:translateX(-50%);
  border:2px solid rgba(255,205,95,.82);
  border-bottom:0;
  border-radius:4px 4px 0 0;
  box-shadow:0 0 0 2px rgba(78,16,30,.88);
}

.choice-connector::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:4px;
  width:4px;
  height:5px;
  transform:translateX(-50%);
  border-radius:1px;
  background:rgba(255,205,95,.48);
  box-shadow:none;
}

.forge-flame-layer,
.forge-side-flames{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.forge-flame-layer{
  opacity:.72;
  background:
    radial-gradient(ellipse 72px 190px at 5% 108%, rgba(255,64,20,.42) 0 22%, rgba(255,150,36,.18) 36%, transparent 64%),
    radial-gradient(ellipse 92px 235px at 18% 112%, rgba(255,168,42,.30) 0 25%, rgba(255,40,45,.18) 42%, transparent 68%),
    radial-gradient(ellipse 78px 205px at 31% 107%, rgba(255,45,60,.36) 0 23%, rgba(255,122,35,.18) 43%, transparent 66%),
    radial-gradient(ellipse 106px 250px at 46% 113%, rgba(255,134,30,.30) 0 26%, rgba(255,35,55,.17) 43%, transparent 70%),
    radial-gradient(ellipse 82px 218px at 61% 108%, rgba(255,48,65,.34) 0 24%, rgba(255,145,35,.18) 42%, transparent 68%),
    radial-gradient(ellipse 100px 238px at 78% 111%, rgba(255,150,45,.28) 0 25%, rgba(255,50,45,.16) 45%, transparent 70%),
    radial-gradient(ellipse 74px 194px at 95% 107%, rgba(255,65,25,.36) 0 22%, rgba(255,138,30,.17) 38%, transparent 64%);
  animation:forgeCleanFlames 6.5s ease-in-out infinite alternate;
}

.forge-flame-layer::before,
.forge-flame-layer::after{
  content:"";
  position:absolute;
  display:block;
  pointer-events:none;
}

.forge-flame-layer::before{
  left:-5%;
  right:-5%;
  bottom:-22px;
  height:135px;
  background:
    conic-gradient(from 220deg at 8% 100%, transparent 0 68deg, rgba(255,74,26,.24) 72deg 94deg, transparent 100deg 360deg),
    conic-gradient(from 220deg at 24% 100%, transparent 0 70deg, rgba(255,146,35,.18) 74deg 98deg, transparent 104deg 360deg),
    conic-gradient(from 220deg at 43% 100%, transparent 0 70deg, rgba(255,48,62,.20) 74deg 98deg, transparent 104deg 360deg),
    conic-gradient(from 220deg at 62% 100%, transparent 0 70deg, rgba(255,124,35,.17) 74deg 98deg, transparent 104deg 360deg),
    conic-gradient(from 220deg at 82% 100%, transparent 0 68deg, rgba(255,54,36,.22) 72deg 96deg, transparent 102deg 360deg);
  filter:blur(.35px);
}

.forge-flame-layer::after{
  inset:0;
  background:none;
  opacity:0;
  animation:none;
}

.forge-side-flames{
  opacity:.48;
  background:
    radial-gradient(ellipse 130px 55px at -2% 30%, rgba(255,55,35,.20) 0 20%, transparent 62%),
    radial-gradient(ellipse 160px 60px at 103% 34%, rgba(255,45,75,.18) 0 21%, transparent 63%),
    radial-gradient(ellipse 190px 45px at 10% 4%, rgba(255,120,45,.10) 0 20%, transparent 62%),
    radial-gradient(ellipse 230px 50px at 86% 98%, rgba(255,90,30,.12) 0 22%, transparent 65%);
  animation:forgeCleanDrift 8s ease-in-out infinite alternate;
}

.forge-sparks{
  position:absolute;
  inset:0;
  overflow:hidden;
  clip-path:inset(0 round 12px);
  pointer-events:none;
  z-index:1;
  opacity:.72;
  mix-blend-mode:screen;
}

.forge-sparks span{
  position:absolute;
  left:var(--x,50%);
  bottom:-28px;
  width:var(--w,3px);
  height:var(--h,7px);
  border-radius:50% 50% 55% 55% / 62% 62% 38% 38%;
  background:
    radial-gradient(circle at 50% 18%, rgba(255,255,210,.88) 0 14%, rgba(255,196,70,.78) 32%, rgba(255,105,30,.50) 58%, rgba(255,40,16,.10) 76%, transparent 82%);
  box-shadow:
    0 0 5px rgba(255,184,60,.48),
    0 0 12px rgba(255,80,18,.22);
  opacity:0;
  filter:blur(var(--blur,0px));
  transform:translate3d(0,0,0) scale(var(--scale,1));
  animation:var(--spark-anim,forgeSparkParticle) var(--dur,6.4s) ease-in-out infinite;
  animation-delay:var(--delay,0s);
}

.forge-sparks span:nth-child(3n){
  width:2px;
  height:13px;
  border-radius:999px;
  background:linear-gradient(180deg,rgba(255,245,170,.86),rgba(255,130,36,.42) 58%,transparent);
  box-shadow:0 0 7px rgba(255,130,30,.32);
}

.forge-sparks span:nth-child(4n){
  height:var(--w,3px);
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,245,190,.86) 0 28%, rgba(255,112,35,.42) 58%, transparent 76%);
  box-shadow:0 0 6px rgba(255,160,55,.30);
}

.forge-sparks span:nth-child(5n){
  background:radial-gradient(circle at 50% 35%, rgba(255,190,95,.64), rgba(255,70,30,.24) 54%, transparent 78%);
  box-shadow:0 0 10px rgba(255,72,30,.18);
}

.forge-sparks span:nth-child(1){--x:8%;--w:2px;--h:6px;--scale:.62;--end-scale:.34;--dur:7.4s;--delay:-1.1s;--alpha:.36;--blur:.5px;--zig1:8px;--zig2:-6px;--zig3:10px;--zig4:-5px}
.forge-sparks span:nth-child(2){--x:16%;--w:3px;--h:8px;--scale:.78;--end-scale:.42;--dur:5.9s;--delay:-3.4s;--alpha:.50;--blur:.18px;--zig1:-11px;--zig2:8px;--zig3:-12px;--zig4:7px}
.forge-sparks span:nth-child(3){--x:25%;--w:2px;--h:12px;--scale:.70;--end-scale:.38;--dur:8.6s;--delay:-5.1s;--alpha:.42;--blur:.25px;--zig1:12px;--zig2:-9px;--zig3:13px;--zig4:-8px;--rise1:-92px;--rise2:-218px;--rise3:-360px;--rise4:-470px;--spark-anim:forgeSparkSlow}
.forge-sparks span:nth-child(4){--x:34%;--w:3px;--h:3px;--scale:.68;--end-scale:.36;--dur:6.8s;--delay:-.7s;--alpha:.34;--blur:.65px;--zig1:-7px;--zig2:10px;--zig3:-8px;--zig4:6px}
.forge-sparks span:nth-child(5){--x:42%;--w:4px;--h:8px;--scale:.82;--end-scale:.46;--dur:6.1s;--delay:-4.2s;--alpha:.52;--blur:.12px;--zig1:10px;--zig2:-13px;--zig3:9px;--zig4:-7px}
.forge-sparks span:nth-child(6){--x:49%;--w:2px;--h:14px;--scale:.74;--end-scale:.40;--dur:9.8s;--delay:-2.8s;--alpha:.38;--blur:.35px;--zig1:-12px;--zig2:9px;--zig3:-14px;--zig4:8px;--rise1:-88px;--rise2:-230px;--rise3:-390px;--rise4:-500px;--spark-anim:forgeSparkSlow}
.forge-sparks span:nth-child(7){--x:57%;--w:3px;--h:7px;--scale:.72;--end-scale:.40;--dur:6.9s;--delay:-6.1s;--alpha:.40;--blur:.4px;--zig1:8px;--zig2:-6px;--zig3:11px;--zig4:-7px}
.forge-sparks span:nth-child(8){--x:65%;--w:2px;--h:2px;--scale:.55;--end-scale:.30;--dur:8.1s;--delay:-1.9s;--alpha:.30;--blur:.85px;--zig1:-6px;--zig2:8px;--zig3:-9px;--zig4:6px}
.forge-sparks span:nth-child(9){--x:72%;--w:2px;--h:12px;--scale:.74;--end-scale:.42;--dur:7.7s;--delay:-4.9s;--alpha:.44;--blur:.25px;--zig1:10px;--zig2:-9px;--zig3:12px;--zig4:-6px;--rise1:-96px;--rise2:-224px;--rise3:-350px;--rise4:-450px}
.forge-sparks span:nth-child(10){--x:80%;--w:4px;--h:9px;--scale:.78;--end-scale:.44;--dur:10.4s;--delay:-7.3s;--alpha:.36;--blur:.55px;--zig1:-9px;--zig2:7px;--zig3:-10px;--zig4:6px;--rise1:-84px;--rise2:-215px;--rise3:-372px;--rise4:-490px;--spark-anim:forgeSparkSlow}
.forge-sparks span:nth-child(11){--x:88%;--w:3px;--h:7px;--scale:.70;--end-scale:.38;--dur:6.5s;--delay:-3.1s;--alpha:.40;--blur:.35px;--zig1:8px;--zig2:-10px;--zig3:7px;--zig4:-6px}
.forge-sparks span:nth-child(12){--x:93%;--w:2px;--h:2px;--scale:.52;--end-scale:.28;--dur:8.9s;--delay:-5.7s;--alpha:.28;--blur:.95px;--zig1:-7px;--zig2:6px;--zig3:-8px;--zig4:5px}
.forge-sparks span:nth-child(13){--x:30%;--w:3px;--h:8px;--scale:.72;--end-scale:.38;--dur:11.2s;--delay:-8.4s;--alpha:.34;--blur:.55px;--zig1:-8px;--zig2:11px;--zig3:-7px;--zig4:5px;--rise1:-90px;--rise2:-240px;--rise3:-400px;--rise4:-520px;--spark-anim:forgeSparkSlow}
.forge-sparks span:nth-child(14){--x:61%;--w:2px;--h:6px;--scale:.58;--end-scale:.30;--dur:7.9s;--delay:-.3s;--alpha:.32;--blur:.75px;--zig1:7px;--zig2:-5px;--zig3:8px;--zig4:-5px}

@keyframes forgeCleanFlames{
  0%{opacity:.28;transform:translateY(8px) scaleY(.96) translateX(-6px)}
  50%{opacity:.43;transform:translateY(-2px) scaleY(1.03) translateX(4px)}
  100%{opacity:.34;transform:translateY(-8px) scaleY(1.08) translateX(8px)}
}

@keyframes forgeCleanDrift{
  from{opacity:.18;transform:translateX(-12px) translateY(3px)}
  to{opacity:.30;transform:translateX(12px) translateY(-5px)}
}

@keyframes forgeSparkParticle{
  0%{opacity:0;transform:translate3d(0,24px,0) scale(var(--scale,1))}
  8%{opacity:var(--alpha,.86)}
  30%{opacity:var(--alpha,.44);transform:translate3d(var(--zig1,10px),var(--rise1,-80px),0) scale(var(--scale,1))}
  58%{opacity:.32;transform:translate3d(var(--zig2,-8px),var(--rise2,-170px),0) scale(var(--scale,1))}
  82%{opacity:.16;transform:translate3d(var(--zig3,10px),var(--rise3,-260px),0) scale(var(--end-scale,.45))}
  100%{opacity:0;transform:translate3d(var(--zig4,-6px),var(--rise4,-340px),0) scale(var(--end-scale,.45))}
}

@keyframes forgeSparkSlow{
  0%{opacity:0;transform:translate3d(0,18px,0) scale(var(--scale,1))}
  14%{opacity:var(--alpha,.34)}
  36%{opacity:var(--alpha,.34);transform:translate3d(var(--zig1,8px),var(--rise1,-56px),0) scale(var(--scale,1))}
  62%{opacity:.24;transform:translate3d(var(--zig2,-8px),var(--rise2,-132px),0) scale(var(--scale,1))}
  84%{opacity:.12;transform:translate3d(var(--zig3,8px),var(--rise3,-218px),0) scale(var(--end-scale,.38))}
  100%{opacity:0;transform:translate3d(var(--zig4,-6px),var(--rise4,-300px),0) scale(var(--end-scale,.38))}
}

<script>
let db;
const RECENT_KEY = "loult_recent_stickers_v1";
const SHORTCUTS_KEY = "loult_personal_shortcuts_v1";
let currentShortcutId = null;
let currentThemeId = null;
let quickThemesAnimationId = null;
let quickThemesCleanup = null;
let centerMessageTimer = null;
let centerDialogCancel = null;
const STICKER_MIN_SIZE = 64;
const STICKER_MAX_SIZE = 96;

const PAGE_BACKGROUND_CANDIDATES = [
  "https://i.imgur.com/jdUGJcx_d.webp?maxwidth=1920&fidelity=grand",
  "https://i.imgur.com/jdUGJcx.png",
  "https://i.imgur.com/jdUGJcx.jpg",
  "https://i.imgur.com/jdUGJcx.jpeg",
  "https://i.imgur.com/jdUGJcx.webp"
];

function setPageBackground(url) {
  document.documentElement.style.setProperty("--page-bg-image", `url("${url.replace(/"/g, "%22")}")`);
}

function loadPageBackground(index = 0) {
  if (index >= PAGE_BACKGROUND_CANDIDATES.length) return;

  const img = new Image();
  const url = PAGE_BACKGROUND_CANDIDATES[index];

  img.onload = () => setPageBackground(url);
  img.onerror = () => loadPageBackground(index + 1);
  img.referrerPolicy = "no-referrer";
  img.src = url;
}

loadPageBackground();

const request = indexedDB.open("LoultStickersDB", 5);

request.onupgradeneeded = e => {
  db = e.target.result;

  if (!db.objectStoreNames.contains("themes")) {
    db.createObjectStore("themes", { keyPath: "id" });
  }

  if (!db.objectStoreNames.contains("stickers")) {
    db.createObjectStore("stickers", { keyPath: "id" });
  }
};

request.onsuccess = e => {
  db = e.target.result;
  renderAll();
};

function tx(store, mode = "readonly") {
  return db.transaction(store, mode).objectStore(store);
}

function getAll(store) {
  return new Promise(resolve => {
    const req = tx(store).getAll();
    req.onsuccess = () => resolve(req.result);
  });
}

function put(store, value) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").put(value);
    req.onsuccess = () => resolve();
  });
}

function del(store, id) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").delete(id);
    req.onsuccess = () => resolve();
  });
}

function fileToDataURL(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

function showCenterMessage(title, text) {
  const message = document.getElementById("centerMessage");
  const box = document.getElementById("centerMessageBox");

  centerDialogCancel = null;
  box.innerHTML = "";
  box.appendChild(createCenterTitle(title));
  box.appendChild(createCenterText(text));
  message.classList.add("open");

  clearTimeout(centerMessageTimer);
  centerMessageTimer = setTimeout(() => {
    message.classList.remove("open");
  }, 5200);
}

function closeCenterMessage(event) {
  if (event && event.target !== event.currentTarget) return;
  clearTimeout(centerMessageTimer);
  if (centerDialogCancel) {
    const cancel = centerDialogCancel;
    centerDialogCancel = null;
    cancel();
    return;
  }
  document.getElementById("centerMessage").classList.remove("open");
}

function createCenterTitle(title) {
  const titleEl = document.createElement("div");
  titleEl.className = "center-message-title";
  titleEl.textContent = title;
  return titleEl;
}

function createCenterText(text) {
  const textEl = document.createElement("div");
  textEl.className = "center-message-text";
  textEl.textContent = text;
  return textEl;
}

function showCenterDialog({
  title,
  text = "",
  inputValue = "",
  placeholder = "",
  selectOptions = null,
  confirmText = "Valider",
  cancelText = "Annuler",
  danger = false
}) {
  return new Promise(resolve => {
    const message = document.getElementById("centerMessage");
    const box = document.getElementById("centerMessageBox");

    clearTimeout(centerMessageTimer);
    box.innerHTML = "";
    box.appendChild(createCenterTitle(title));
    if (text) box.appendChild(createCenterText(text));

    let field = null;
    if (selectOptions) {
      field = document.createElement("select");
      selectOptions.forEach(optionData => {
        const option = document.createElement("option");
        option.value = optionData.value;
        option.textContent = optionData.label;
        field.appendChild(option);
      });
    } else {
      field = document.createElement("input");
      field.value = inputValue;
      field.placeholder = placeholder;
    }

    field.className = "center-message-field";
    box.appendChild(field);

    const actions = document.createElement("div");
    actions.className = "center-message-actions";

    const cancelBtn = document.createElement("button");
    cancelBtn.className = "secondary";
    cancelBtn.textContent = cancelText;

    const confirmBtn = document.createElement("button");
    confirmBtn.textContent = confirmText;
    if (danger) confirmBtn.classList.add("danger");

    actions.appendChild(cancelBtn);
    actions.appendChild(confirmBtn);
    box.appendChild(actions);

    const finish = value => {
      centerDialogCancel = null;
      message.classList.remove("open");
      resolve(value);
    };

    cancelBtn.onclick = () => finish(null);
    confirmBtn.onclick = () => finish(field.value);
    field.onkeydown = event => {
      if (event.key === "Enter") finish(field.value);
      if (event.key === "Escape") finish(null);
    };

    centerDialogCancel = () => finish(null);
    message.classList.add("open");
    field.focus();
    if (field.select) field.select();
  });
}

function showCenterConfirm(title, text, danger = false) {
  return new Promise(resolve => {
    const message = document.getElementById("centerMessage");
    const box = document.getElementById("centerMessageBox");

    clearTimeout(centerMessageTimer);
    box.innerHTML = "";
    box.appendChild(createCenterTitle(title));
    if (text) box.appendChild(createCenterText(text));

    const actions = document.createElement("div");
    actions.className = "center-message-actions";

    const cancelBtn = document.createElement("button");
    cancelBtn.className = "secondary";
    cancelBtn.textContent = "Annuler";

    const confirmBtn = document.createElement("button");
    confirmBtn.textContent = "Confirmer";
    if (danger) confirmBtn.classList.add("danger");

    actions.appendChild(cancelBtn);
    actions.appendChild(confirmBtn);
    box.appendChild(actions);

    const finish = value => {
      centerDialogCancel = null;
      message.classList.remove("open");
      resolve(value);
    };

    centerDialogCancel = () => finish(false);
    cancelBtn.onclick = () => finish(false);
    confirmBtn.onclick = () => finish(true);
    message.classList.add("open");
    confirmBtn.focus();
  });
}

function showCenterChoice(title, text, choices) {
  return new Promise(resolve => {
    const message = document.getElementById("centerMessage");
    const box = document.getElementById("centerMessageBox");

    clearTimeout(centerMessageTimer);
    box.innerHTML = "";
    box.appendChild(createCenterTitle(title));
    if (text) box.appendChild(createCenterText(text));

    const actions = document.createElement("div");
    actions.className = "center-message-actions";

    choices.forEach(choice => {
      const button = document.createElement("button");
      button.textContent = choice.label;
      if (choice.className) button.className = choice.className;
      button.onclick = () => {
        centerDialogCancel = null;
        message.classList.remove("open");
        resolve(choice.value);
      };
      actions.appendChild(button);
    });

    const cancelBtn = document.createElement("button");
    cancelBtn.className = "secondary";
    cancelBtn.textContent = "Annuler";
    cancelBtn.onclick = () => {
      centerDialogCancel = null;
      message.classList.remove("open");
      resolve(null);
    };
    actions.appendChild(cancelBtn);

    box.appendChild(actions);
    centerDialogCancel = () => {
      centerDialogCancel = null;
      message.classList.remove("open");
      resolve(null);
    };
    message.classList.add("open");
  });
}

function loadImageDimensions(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const timer = setTimeout(() => {
      img.onload = null;
      img.onerror = null;
      reject(new Error("timeout"));
    }, 10000);

    img.onload = () => {
      clearTimeout(timer);
      resolve({
        width: img.naturalWidth || img.width,
        height: img.naturalHeight || img.height
      });
    };

    img.onerror = () => {
      clearTimeout(timer);
      reject(new Error("load"));
    };

    img.referrerPolicy = "no-referrer";
    img.src = src;
  });
}

async function validateStickerImage(source, sourceType) {
  let objectUrl = "";

  try {
    const src = sourceType === "file" ? URL.createObjectURL(source) : source;
    objectUrl = sourceType === "file" ? src : "";
    const dimensions = await loadImageDimensions(src);
    const { width, height } = dimensions;

    if (
      width < STICKER_MIN_SIZE ||
      height < STICKER_MIN_SIZE ||
      width > STICKER_MAX_SIZE ||
      height > STICKER_MAX_SIZE
    ) {
      return {
        ok: false,
        message: `Dimensions détectées : ${width}x${height}px. Un sticker doit faire entre ${STICKER_MIN_SIZE}x${STICKER_MIN_SIZE}px et ${STICKER_MAX_SIZE}x${STICKER_MAX_SIZE}px.`
      };
    }

    return { ok: true, width, height };
  } catch (err) {
    return {
      ok: false,
      message: sourceType === "url"
        ? "L'image du sticker ne se charge pas depuis cette URL. Vérifie que le lien pointe directement vers une image publique (.png, .jpg, .gif, .webp...) et pas vers une page."
        : "Le fichier choisi ne peut pas être lu comme une image valide."
    };
  } finally {
    if (objectUrl) URL.revokeObjectURL(objectUrl);
  }
}

function sortThemes(themes) {
  return themes.sort((a,b) => {
    if (!!b.pinned !== !!a.pinned) return (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
    return a.name.localeCompare(b.name, "fr");
  });
}

function getRecentIds() {
  return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
}

function saveRecentIds(ids) {
  localStorage.setItem(RECENT_KEY, JSON.stringify(ids));
}

function recordRecentSticker(id) {
  let ids = getRecentIds().filter(existingId => existingId !== id);
  ids.unshift(id);
  ids = ids.slice(0, 12);
  saveRecentIds(ids);
}

async function addTheme() {
  const input = document.getElementById("themeName");
  const iconInput = document.getElementById("themeIcon");
  const iconUrlInput = document.getElementById("themeIconUrl");

  const name = input.value.trim();
  const iconUrl = iconUrlInput.value.trim();

  if (!name) {
    return showCenterMessage("Nom manquant", "Écris un nom de thème.");
  }

  if (!iconInput.files[0] && !iconUrl) {
    return showCenterMessage("Icône manquante", "Ajoute une icône ou une illustration pour ce thème, soit par fichier soit par URL.");
  }

  const themes = await getAll("themes");

  if (themes.some(t => t.name.toLowerCase() === name.toLowerCase())) {
    return showCenterMessage("Thème déjà présent", "Ce nom de thème existe déjà.");
  }

  let icon = null;

  if (iconInput.files[0]) {
    icon = await fileToDataURL(iconInput.files[0]);
  } else {
    icon = iconUrl;
  }

  await put("themes", {
    id: crypto.randomUUID(),
    name,
    icon,
    pinned: false
  });

  input.value = "";
  iconInput.value = "";
  iconUrlInput.value = "";

  await renderAll();
  showCenterMessage("Thème créé", `Le thème « ${name} » a été ajouté.`);
}

async function addSticker() {
  const file = document.getElementById("stickerFile").files[0];
  const url = document.getElementById("stickerUrl").value.trim();
  const name = document.getElementById("stickerName").value.trim();
  const tags = document.getElementById("stickerTags").value
    .split(",")
    .map(tag => tag.trim())
    .filter(Boolean);
  const themeId = document.getElementById("themeSelect").value;

  if (!file && !url) {
    return showCenterMessage("Sticker manquant", "Ajoute un sticker avec un fichier ou une URL directe vers une image.");
  }

  if (!name) {
    return showCenterMessage("Nom manquant", "Donne un nom au sticker avant de l'ajouter.");
  }

  if (!themeId) {
    return showCenterMessage("Thème manquant", "Choisis le thème dans lequel ajouter ce sticker.");
  }

  const sourceType = file ? "file" : "url";
  const validation = await validateStickerImage(file || url, sourceType);

  if (!validation.ok) {
    return showCenterMessage("Sticker refusé", validation.message);
  }

  let stickerData = {
    id: crypto.randomUUID(),
    name,
    themeId,
    favorite: false,
    tags,
    width: validation.width,
    height: validation.height
  };

  if (file) {
    stickerData.file = file;
    stickerData.type = "file";
  } else {
    stickerData.url = url;
    stickerData.type = "url";
  }

  try {
    await put("stickers", stickerData);
  } catch (err) {
    console.error("Ajout du sticker impossible :", err);
    return showCenterMessage("Ajout impossible", "Le sticker est valide, mais il n'a pas pu être enregistré. Réessaie avec une image plus légère.");
  }

  document.getElementById("stickerFile").value = "";
  document.getElementById("stickerUrl").value = "";
  document.getElementById("stickerName").value = "";
  document.getElementById("stickerTags").value = "";

  await renderAll();
  showCenterMessage("Sticker ajouté", `« ${name} » est maintenant dans le thème choisi.`);
}

async function renderAll() {
  const themes = await getAll("themes");
  const stickers = await getAll("stickers");

  renderStats(themes, stickers);
  renderThemeSelect(themes);
  renderQuickThemes(themes);
  renderThemes(themes, stickers);
  renderShortcuts(stickers);

  if (currentThemeId) {
    const currentTheme = themes.find(t => t.id === currentThemeId);

    if (currentTheme) {
      document.getElementById("stickersView").classList.remove("hidden");
      document.getElementById("themeTitle").textContent = currentTheme.name;

      renderStickers(
        stickers.filter(s => s.themeId === currentThemeId),
        document.getElementById("gallery")
      );
    } else {
      currentThemeId = null;
      document.getElementById("stickersView").classList.add("hidden");
    }
  }
}


function renderStats(themes, stickers) {
  const favorites = stickers.filter(s => s.favorite).length;

  document.getElementById("stats").innerHTML =
    `✦ ${themes.length} thèmes ✧ ${stickers.length} stickers ✧ ${favorites} favs ✦`;
}

function renderThemeSelect(themes) {
  const select = document.getElementById("themeSelect");
  select.innerHTML = "";

  sortThemes([...themes])
    .forEach(theme => {
      const option = document.createElement("option");
      option.value = theme.id;
      option.textContent = theme.name;
      select.appendChild(option);
    });
}

function renderQuickThemes(themes) {
  const container = document.getElementById("quickThemes");
  if (quickThemesCleanup) {
    quickThemesCleanup();
    quickThemesCleanup = null;
  }
  container.innerHTML = "";

  const sortedThemes = sortThemes([...themes]);

  if (!sortedThemes.length) {
    const empty = document.createElement("div");
    empty.className = "quick-theme-empty";
    empty.textContent = "Aucun thème";
    container.appendChild(empty);
    return;
  }

  const track = document.createElement("div");
  track.className = "quick-themes-track";

  const createThemePill = theme => {
    const displayName = (theme.name || "Thème").trim();
    const item = document.createElement("button");
    item.type = "button";
    item.className = "quick-theme-item";
    item.title = displayName;

    item.onclick = () => {
      document.getElementById("goThemesBtn").click();
      setTimeout(() => openTheme(theme.id), 100);
    };

    if (theme.icon) {
      const img = document.createElement("img");
      img.src = theme.icon;
      img.alt = "";
      item.appendChild(img);
    } else {
      const fallback = document.createElement("span");
      fallback.className = "quick-theme-fallback";
      fallback.textContent = displayName.charAt(0).toUpperCase() || "✦";
      item.appendChild(fallback);
    }

    const name = document.createElement("span");
    name.className = "quick-theme-name";
    name.textContent = displayName;
    item.appendChild(name);

    return item;
  };

  const passes = sortedThemes.length > 1 ? 3 : 1;
  for (let pass = 0; pass < passes; pass++) {
    sortedThemes.forEach(theme => track.appendChild(createThemePill(theme)));
  }

  if (sortedThemes.length < 2) {
    track.classList.add("no-scroll");
  }

  container.appendChild(track);

  const slider = document.createElement("div");
  slider.className = "quick-themes-slider";
  const thumb = document.createElement("div");
  thumb.className = "quick-themes-thumb";
  slider.appendChild(thumb);

  if (sortedThemes.length < 2) {
    slider.classList.add("no-scroll");
  }
  container.appendChild(slider);

  quickThemesCleanup = setupQuickThemesCarousel(container, track, slider, thumb, sortedThemes.length);
}

function setupQuickThemesCarousel(container, track, slider, thumb, themeCount) {
  if (quickThemesAnimationId) {
    cancelAnimationFrame(quickThemesAnimationId);
    quickThemesAnimationId = null;
  }

  let offset = 0;
  let loopWidth = 0;
  let dragging = false;
  let lastTime = performance.now();
  const speed = 18;

  const measure = () => {
    const first = track.children[0];
    const repeatedFirst = track.children[themeCount];
    loopWidth = first && repeatedFirst ? repeatedFirst.offsetLeft - first.offsetLeft : 0;
    applyPosition();
  };

  const normalizeOffset = () => {
    if (!loopWidth) return;
    offset = ((offset % loopWidth) + loopWidth) % loopWidth;
  };

  const moveThumb = () => {
    if (!loopWidth) return;
    const maxX = Math.max(0, slider.clientWidth - thumb.offsetWidth);
    const ratio = offset / loopWidth;
    thumb.style.transform = `translate3d(${ratio * maxX}px,-50%,0)`;
  };

  const applyPosition = () => {
    normalizeOffset();
    track.style.transform = loopWidth ? `translate3d(${-offset}px,0,0)` : "";
    moveThumb();
  };

  const setFromPointer = event => {
    if (!loopWidth) return;
    const rect = slider.getBoundingClientRect();
    const maxX = Math.max(1, rect.width - thumb.offsetWidth);
    const x = Math.min(Math.max(event.clientX - rect.left - thumb.offsetWidth / 2, 0), maxX);
    offset = (x / maxX) * loopWidth;
    applyPosition();
  };

  const onPointerDown = event => {
    if (!loopWidth) return;
    dragging = true;
    slider.setPointerCapture?.(event.pointerId);
    setFromPointer(event);
  };

  const onPointerMove = event => {
    if (dragging) setFromPointer(event);
  };

  const stopDragging = event => {
    if (!dragging) return;
    dragging = false;
    slider.releasePointerCapture?.(event.pointerId);
    lastTime = performance.now();
  };

  const animate = now => {
    const delta = Math.min(64, now - lastTime) / 1000;
    lastTime = now;

    if (!dragging && loopWidth) {
      offset += speed * delta;
      applyPosition();
    }

    quickThemesAnimationId = requestAnimationFrame(animate);
  };

  slider.addEventListener("pointerdown", onPointerDown);
  slider.addEventListener("pointermove", onPointerMove);
  slider.addEventListener("pointerup", stopDragging);
  slider.addEventListener("pointercancel", stopDragging);
  window.addEventListener("resize", measure);

  requestAnimationFrame(measure);
  quickThemesAnimationId = requestAnimationFrame(animate);

  return () => {
    slider.removeEventListener("pointerdown", onPointerDown);
    slider.removeEventListener("pointermove", onPointerMove);
    slider.removeEventListener("pointerup", stopDragging);
    slider.removeEventListener("pointercancel", stopDragging);
    window.removeEventListener("resize", measure);
    if (quickThemesAnimationId) {
      cancelAnimationFrame(quickThemesAnimationId);
      quickThemesAnimationId = null;
    }
  };
}

async function openTheme(themeId) {
  currentThemeId = themeId;

  const themes = await getAll("themes");
  const stickers = await getAll("stickers");

  const theme = themes.find(t => t.id === themeId);
  if (!theme) return;

  document.getElementById("stickersView").classList.remove("hidden");
  document.getElementById("themeTitle").textContent = theme.name;

  renderStickers(
    stickers.filter(s => s.themeId === themeId),
    document.getElementById("gallery")
  );
}

function getDefaultShortcuts() {
  return [];
}

function getUserShortcuts() {
  return JSON.parse(localStorage.getItem(SHORTCUTS_KEY) || "[]");
}

function saveUserShortcuts(shortcuts) {
  localStorage.setItem(SHORTCUTS_KEY, JSON.stringify(shortcuts));
}

function getAllShortcuts() {
  return [...getDefaultShortcuts(), ...getUserShortcuts()];
}

function getRecentStickers(stickers) {
  const ids = getRecentIds();

  return ids
    .map(id => stickers.find(s => s.id === id))
    .filter(Boolean);
}

function getShortcutStickers(shortcut, stickers) {
  if (shortcut.system === "favorites") {
    return stickers.filter(s => s.favorite);
  }

  if (shortcut.system === "recents") {
    return getRecentStickers(stickers);
  }

  const ids = shortcut.stickerIds || [];

  return ids
    .map(id => stickers.find(s => s.id === id))
    .filter(Boolean);
}

function renderShortcuts(stickers) {
  const container = document.getElementById("shortcutsGrid");
  if (!container) return;

  container.innerHTML = "";

  getAllShortcuts().forEach((shortcut, index) => {
    const shortcutStickers = getShortcutStickers(shortcut, stickers);

    const box = document.createElement("div");

    icon.className = "shortcut-title-icon";

      img.alt = "";
      icon.appendChild(img);
    } else {

      };

      const editPanel = document.createElement("div");
      editPanel.className = "shortcut-edit-panel";

      const renameBtn = document.createElement("button");
      renameBtn.textContent = "Renommer";
      renameBtn.onclick = () => {
        editPanel.classList.remove("open");
        renameShortcut(shortcut.id);
      };

      const iconBtn = document.createElement("button");
      iconBtn.textContent = "Changer l'icône";
      iconBtn.onclick = () => {
        editPanel.classList.remove("open");
        changeShortcutIcon(shortcut.id);
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = () => {
        editPanel.classList.remove("open");
        deleteShortcut(shortcut.id);
      };

      editPanel.appendChild(renameBtn);
      editPanel.appendChild(iconBtn);
      editPanel.appendChild(deleteBtn);

      editWrap.appendChild(editBtn);
      editWrap.appendChild(editPanel);
      actions.appendChild(editWrap);
    }

    preview.className = "shortcut-preview";

    if (!shortcutStickers.length) {

    }

    box.appendChild(actions);
    box.appendChild(preview);

    container.appendChild(box);
  });

  if (currentShortcutId) {

  }

async function createShortcut() {
  const input = document.getElementById("shortcutNameInput");
  const iconFileInput = document.getElementById("shortcutIconFile");
  const iconUrlInput = document.getElementById("shortcutIconUrl");

  const name = input.value.trim();
  const iconUrl = iconUrlInput.value.trim();

  if (!name) {
    return showCenterMessage("Nom manquant", "Écris un nom de raccourci.");
  }

  const shortcuts = getUserShortcuts();

  if (getAllShortcuts().some(s => s.name.toLowerCase() === name.toLowerCase())) {
    return showCenterMessage("Raccourci déjà présent", "Ce nom de raccourci existe déjà.");
  }

  let icon = "▣";

  if (iconFileInput.files[0]) {
    icon = await fileToDataURL(iconFileInput.files[0]);
  } else if (iconUrl) {
    icon = iconUrl;
  }

  shortcuts.push({
    id: crypto.randomUUID(),
    name,
    icon,
    type: "custom",
    stickerIds: []
  });

  saveUserShortcuts(shortcuts);
  input.value = "";
  iconFileInput.value = "";
  iconUrlInput.value = "";

  await getAll("stickers").then(renderShortcuts);
  showCenterMessage("Raccourci créé", `Le raccourci « ${name} » a été ajouté.`);
}

async function renameShortcut(id) {
  const shortcuts = getUserShortcuts();
  const shortcut = shortcuts.find(s => s.id === id);
  if (!shortcut) return;

  const newName = await showCenterDialog({
    title: "Renommer le raccourci",
    text: "Choisis le nouveau nom de ce raccourci.",
    inputValue: shortcut.name,
    placeholder: "Nom du raccourci",
    confirmText: "Renommer"
  });
  if (newName === null || !newName.trim()) return;

  const cleanName = newName.trim();
  if (getAllShortcuts().some(s => s.id !== id && s.name.toLowerCase() === cleanName.toLowerCase())) {
    return showCenterMessage("Nom déjà pris", "Un autre raccourci utilise déjà ce nom.");
  }

  shortcut.name = cleanName;
  saveUserShortcuts(shortcuts);

  await getAll("stickers").then(renderShortcuts);
  showCenterMessage("Raccourci renommé", `Le raccourci s'appelle maintenant « ${cleanName} ».`);
}

async function changeShortcutIcon(id) {
  const mode = await showCenterChoice("Changer l'icône", "Choisis la source de la nouvelle icône.", [
    { label: "Choisir un fichier", value: "file" },
    { label: "Coller une URL", value: "url" }
  ]);
  if (!mode) return;

  if (mode === "file") {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";

    input.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;

      const shortcuts = getUserShortcuts();
      const shortcut = shortcuts.find(s => s.id === id);
      if (!shortcut) return;

      shortcut.icon = await fileToDataURL(file);
      saveUserShortcuts(shortcuts);
      await getAll("stickers").then(renderShortcuts);
      showCenterMessage("Icône modifiée", "L'icône du raccourci a été mise à jour.");
    };

    input.click();
    return;
  }

  const currentShortcut = getUserShortcuts().find(s => s.id === id);
  const choice = await showCenterDialog({
    title: "URL de l'icône",
    text: "Colle l'URL de la nouvelle icône.",
    inputValue: currentShortcut && currentShortcut.icon && currentShortcut.icon.startsWith("http") ? currentShortcut.icon : "",
    placeholder: "https://...",
    confirmText: "Modifier"
  });
  if (!choice || !choice.trim()) return;

  const shortcuts = getUserShortcuts();
  const shortcut = shortcuts.find(s => s.id === id);
  if (!shortcut) return;

  shortcut.icon = choice.trim();
  saveUserShortcuts(shortcuts);
  await getAll("stickers").then(renderShortcuts);
  showCenterMessage("Icône modifiée", "L'icône du raccourci a été mise à jour.");
}

async function deleteShortcut(id) {
  const ok = await showCenterConfirm("Supprimer le raccourci", "Les stickers resteront dans la banque, seul le raccourci sera supprimé.", true);
  if (!ok) return;

  const shortcuts = getUserShortcuts().filter(s => s.id !== id);
  saveUserShortcuts(shortcuts);

  if (currentShortcutId === id) {
    closeShortcutPage();
  }

  await getAll("stickers").then(renderShortcuts);
  showCenterMessage("Raccourci supprimé", "Le raccourci personnel a été supprimé.");
}

function openShortcut(id) {
  currentShortcutId = id;

  document.getElementById("shortcutPage").classList.remove("hidden");

function closeShortcutPage() {

  );

async function addStickerToShortcut(stickerId, shortcutId) {
  if (shortcutId === "favorites") {
    toggleFavorite(stickerId);
    return;
  }

  if (shortcutId === "recents") {
    recordRecentSticker(stickerId);
    await renderAll();
    showCenterMessage("Raccourci mis à jour", "Le sticker a été ajouté aux récents.");
    return;
  }

  const shortcuts = getUserShortcuts();
  const shortcut = shortcuts.find(s => s.id === shortcutId);
  if (!shortcut) return;

  shortcut.stickerIds = shortcut.stickerIds || [];

  const alreadyAdded = shortcut.stickerIds.includes(stickerId);
  if (!alreadyAdded) {
    shortcut.stickerIds.push(stickerId);
  }

  saveUserShortcuts(shortcuts);
  await renderAll();
  showCenterMessage(
    alreadyAdded ? "Déjà présent" : "Raccourci mis à jour",
    alreadyAdded ? "Ce sticker est déjà dans ce raccourci." : `Le sticker a été ajouté à « ${shortcut.name} ».`
  );
}

async function removeStickerFromShortcut(stickerId, shortcutId) {
  if (shortcutId === "favorites") {
    toggleFavorite(stickerId);
    return;
  }

  if (shortcutId === "recents") {
    const ids = getRecentIds().filter(id => id !== stickerId);
    saveRecentIds(ids);
    await renderAll();
    showCenterMessage("Raccourci mis à jour", "Le sticker a été retiré des récents.");
    return;
  }

  const shortcuts = getUserShortcuts();
  const shortcut = shortcuts.find(s => s.id === shortcutId);
  if (!shortcut) return;

  shortcut.stickerIds = (shortcut.stickerIds || []).filter(id => id !== stickerId);

  saveUserShortcuts(shortcuts);
  await renderAll();
  showCenterMessage("Raccourci mis à jour", `Le sticker a été retiré de « ${shortcut.name} ».`);
}


function renderStickers(stickers, container) {
  container.innerHTML = "";

  const search = document.getElementById("searchInput").value.toLowerCase();
  let renderedCount = 0;

  stickers
    .filter(s => {
      const tagsText = (s.tags || []).join(" ").toLowerCase();
      return s.name.toLowerCase().includes(search) || tagsText.includes(search);
    })
    .sort((a,b) => a.name.localeCompare(b.name, "fr"))
    .forEach(sticker => {
      let url;

      try {
        url = getStickerDisplayUrl(sticker);
      } catch (err) {
        console.error("Sticker impossible à afficher :", sticker, err);
        return;
      }

      if (!url) {
        console.warn("Sticker sans image :", sticker);
        return;
      }

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = url;
      img.title = "Cliquer pour agrandir";
      img.style.cursor = "zoom-in";
      img.onclick = () => openPreview(sticker.id);

      const title = document.createElement("div");
      title.innerHTML = `<strong>${sticker.name}</strong>`;

      const tags = document.createElement("div");
      tags.className = "sticker-tags";
      if (sticker.tags && sticker.tags.length) {
        sticker.tags.forEach(tag => {
          const span = document.createElement("span");
          span.className = "tag-tape";
          span.textContent = "#" + tag;
          tags.appendChild(span);
        });
      }

      const primaryActions = document.createElement("div");
      primaryActions.className = "primary-actions";

      const previewBtnMain = document.createElement("button");
      previewBtnMain.textContent = "Aperçu";
      previewBtnMain.onclick = () => openPreview(sticker.id);

      const copyBtnMain = document.createElement("button");
      copyBtnMain.textContent = "Copier URL";
      copyBtnMain.onclick = () => copyStickerUrl(sticker.id);

      primaryActions.appendChild(previewBtnMain);
      primaryActions.appendChild(copyBtnMain);

      const editToggle = document.createElement("button");
      editToggle.className = "edit-toggle";
      editToggle.textContent = "Éditer ▾";

      const editPanel = document.createElement("div");
      editPanel.className = "edit-panel";

      editToggle.onclick = () => {
        editPanel.classList.toggle("open");
        editToggle.textContent = editPanel.classList.contains("open") ? "Éditer ▴" : "Éditer ▾";
      };

      const shortcutRow = document.createElement("div");
      shortcutRow.className = "shortcut-select-row";

      const personalShortcuts = getAllShortcuts();

      if (personalShortcuts.length) {
        const shortcutSelect = document.createElement("select");

        personalShortcuts.forEach(shortcut => {
          const option = document.createElement("option");
          option.value = shortcut.id;
          option.textContent = shortcut.name;
          shortcutSelect.appendChild(option);
        });

        const addShortcutBtn = document.createElement("button");
        addShortcutBtn.textContent = "Ajouter au raccourci";
        addShortcutBtn.onclick = () => addStickerToShortcut(sticker.id, shortcutSelect.value);

        const removeShortcutBtn = document.createElement("button");
        removeShortcutBtn.textContent = "Retirer";
        removeShortcutBtn.onclick = () => removeStickerFromShortcut(sticker.id, shortcutSelect.value);

        shortcutRow.appendChild(shortcutSelect);
        shortcutRow.appendChild(addShortcutBtn);
        shortcutRow.appendChild(removeShortcutBtn);
      } else {
        const emptyShortcutNote = document.createElement("div");
        emptyShortcutNote.className = "empty-note";
        emptyShortcutNote.textContent = "Crée d'abord un raccourci personnel pour y ajouter ce sticker.";
        shortcutRow.appendChild(emptyShortcutNote);
      }

      const moveBtn = document.createElement("button");
      moveBtn.textContent = "Déplacer";
      moveBtn.onclick = () => moveSticker(sticker.id);

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = () => deleteSticker(sticker.id);

      const editTopActions = document.createElement("div");
      editTopActions.className = "edit-top-actions";
      editTopActions.appendChild(moveBtn);
      editTopActions.appendChild(deleteBtn);

      editPanel.appendChild(editTopActions);
      editPanel.appendChild(shortcutRow);

      card.appendChild(img);
      card.appendChild(title);
      card.appendChild(tags);
      card.appendChild(primaryActions);
      card.appendChild(editToggle);
      card.appendChild(editPanel);

      container.appendChild(card);
      renderedCount++;
    });

  if (!renderedCount && stickers.length) {
    const empty = document.createElement("div");
    empty.className = "empty-note";
    empty.textContent = "Aucun sticker affichable ici. Si tu as utilisé un fichier local, réessaie avec une URL d'image publique.";
    container.appendChild(empty);
  }
}

function getStickerDisplayUrl(sticker) {
  if (!sticker) return "";

  // Stickers ajoutés par URL
  if (sticker.type === "url" && sticker.url) {
    return sticker.url;
  }

  // Anciennes versions ou stickers avec URL sans type
  if (sticker.url) {
    return sticker.url;
  }

  // Stickers ajoutés par fichier local : Blob/File stocké dans IndexedDB
  if (sticker.file instanceof Blob) {
    return URL.createObjectURL(sticker.file);
  }

  // Sécurité pour anciennes versions qui auraient stocké une dataURL
  if (typeof sticker.file === "string") {
    return sticker.file;
  }

  // Sécurité supplémentaire si l'image a été stockée sous un autre nom
  if (sticker.dataUrl) {
    return sticker.dataUrl;
  }

  return "";
}

async function openPreview(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  let previewUrl;

  try {
    previewUrl = getStickerDisplayUrl(sticker);
  } catch (err) {
    console.error("Aperçu impossible :", sticker, err);
    showCenterMessage("Sticker illisible", "Impossible d'afficher ce sticker. L'image locale est peut-être cassée.");
    return;
  }

  if (!previewUrl) {
    showCenterMessage("Sticker manquant", "Impossible d'afficher ce sticker. L'image est manquante.");
    return;
  }

  const previewImage = document.getElementById("previewImage");
  previewImage.onerror = () => {
    document.getElementById("previewModal").style.display = "none";
    showCenterMessage("Sticker illisible", "L'image du sticker ne se charge pas. Le lien est peut-être cassé ou n'est pas une image directe.");
  };
  previewImage.onload = () => {
    previewImage.onerror = null;
  };
  previewImage.src = previewUrl;
  document.getElementById("previewTitle").textContent = sticker.name;
  document.getElementById("previewTags").textContent = sticker.tags && sticker.tags.length
    ? sticker.tags.map(tag => "#" + tag).join(" ")
    : "";

  document.getElementById("previewModal").style.display = "flex";
}

function closePreview(event) {
  if (event && event.target.id !== "previewModal") return;
  document.getElementById("previewModal").style.display = "none";
}

async function copyStickerUrl(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  if (sticker.type !== "url") {
    showCenterMessage("URL indisponible", "Ce sticker vient d'un fichier local. Pour Loult, ajoute-le plutôt via une URL publique.");
    return;
  }

  await navigator.clipboard.writeText(sticker.url);
  showCenterMessage("URL copiée", "Le lien du sticker est dans le presse-papiers.");
}

async function toggleFavorite(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  sticker.favorite = !sticker.favorite;
  await put("stickers", sticker);
  await renderAll();
  showCenterMessage(sticker.favorite ? "Favori ajouté" : "Favori retiré", `« ${sticker.name} » a été mis à jour.`);
}

async function toggleThemePin(id) {
  const themes = await getAll("themes");
  const theme = themes.find(t => t.id === id);
  if (!theme) return;

  theme.pinned = !theme.pinned;
  await put("themes", theme);
  await renderAll();
  showCenterMessage(theme.pinned ? "Thème épinglé" : "Thème désépinglé", `« ${theme.name} » a été mis à jour.`);
}

async function changeThemeIcon(id) {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;

    const themes = await getAll("themes");
    const theme = themes.find(t => t.id === id);
    if (!theme) return;

    theme.icon = await fileToDataURL(file);
    await put("themes", theme);
    await renderAll();
    showCenterMessage("Icône modifiée", `L'icône de « ${theme.name} » a été mise à jour.`);
  };
  input.click();
}

async function renameTheme(id) {
  const themes = await getAll("themes");
  const theme = themes.find(t => t.id === id);
  if (!theme) return;

  const newName = await showCenterDialog({
    title: "Renommer le thème",
    text: "Choisis le nouveau nom de ce thème.",
    inputValue: theme.name,
    placeholder: "Nom du thème",
    confirmText: "Renommer"
  });
  if (newName === null || !newName.trim()) return;

  const cleanName = newName.trim();
  if (themes.some(t => t.id !== id && t.name.toLowerCase() === cleanName.toLowerCase())) {
    return showCenterMessage("Nom déjà pris", "Un autre thème utilise déjà ce nom.");
  }

  theme.name = cleanName;
  await put("themes", theme);
  await renderAll();
  showCenterMessage("Thème renommé", `Le thème s'appelle maintenant « ${cleanName} ».`);
}

async function deleteTheme(id) {
  const ok = await showCenterConfirm("Supprimer le thème", "Ce thème et tous ses stickers seront supprimés.", true);
  if (!ok) return;

  const stickers = await getAll("stickers");

  for (const sticker of stickers) {
    if (sticker.themeId === id) {
      await del("stickers", sticker.id);
    }
  }

  await del("themes", id);
  await renderAll();
  showCenterMessage("Thème supprimé", "Le thème et ses stickers ont été supprimés.");
}

async function moveSticker(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  const themes = sortThemes(await getAll("themes")).filter(t => t.id !== sticker.themeId);
  if (!themes.length) {
    return showCenterMessage("Déplacement impossible", "Il n'y a pas d'autre thème disponible pour ce sticker.");
  }

  const themeId = await showCenterDialog({
    title: "Déplacer le sticker",
    text: `Choisis le nouveau thème pour « ${sticker.name} ».`,
    selectOptions: themes.map(t => ({ value: t.id, label: t.name })),
    confirmText: "Déplacer"
  });

  if (!themeId) return;
  if (!themes.some(t => t.id === themeId)) return;

  sticker.themeId = themeId;
  await put("stickers", sticker);
  await renderAll();
  showCenterMessage("Sticker déplacé", `« ${sticker.name} » a été déplacé.`);
}

async function deleteSticker(id) {
  const ok = await showCenterConfirm("Supprimer le sticker", "Ce sticker sera retiré de la banque et des raccourcis.", true);
  if (!ok) return;

  await del("stickers", id);

  // Nettoyer aussi les derniers utilisés
  const recentIds = getRecentIds().filter(recentId => recentId !== id);
  saveRecentIds(recentIds);

  // Nettoyer aussi les raccourcis personnels
  const shortcuts = getUserShortcuts().map(shortcut => {
    shortcut.stickerIds = (shortcut.stickerIds || []).filter(stickerId => stickerId !== id);
    return shortcut;
  });
  saveUserShortcuts(shortcuts);

  // Fermer l'aperçu si le sticker supprimé était affiché
  document.getElementById("previewModal").style.display = "none";

  await renderAll();
  showCenterMessage("Sticker supprimé", "Le sticker a été supprimé.");
}

document.getElementById("addThemeBtn").onclick = addTheme;
document.getElementById("addStickerBtn").onclick = addSticker;
document.getElementById("searchBtn").onclick = () => renderAll();
document.getElementById("createShortcutBtn").onclick = createShortcut;
document.getElementById("backShortcutHomeBtn").onclick = closeShortcutPage;

document.getElementById("goThemesBtn").onclick = () => {
  currentShortcutId = null;
  currentThemeId = null;
  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("shortcutPage").classList.add("hidden");
  document.getElementById("themesPage").classList.remove("hidden");
  document.getElementById("stickersView").classList.add("hidden");
};
document.getElementById("backHomeBtn").onclick = () => {
  currentShortcutId = null;
  currentThemeId = null;
  document.getElementById("homePage").classList.remove("hidden");
  document.getElementById("themesPage").classList.add("hidden");
  document.getElementById("shortcutPage").classList.add("hidden");
};
document.getElementById("backThemesBtn").onclick = () => {
  currentThemeId = null;
  document.getElementById("stickersView").classList.add("hidden");
};
document.getElementById("searchInput").addEventListener("keyup", () => renderAll());
</script>

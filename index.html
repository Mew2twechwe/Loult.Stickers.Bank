<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Loult Stickers Bank</title>

<style>
body{margin:0;padding:20px;background:#111;color:white;font-family:Arial,sans-serif}
h1{text-align:center}
.section{background:#1b1b1b;border:1px solid #444;border-radius:12px;padding:18px;margin-bottom:20px}
.sub-section{margin-top:18px;padding-top:15px;border-top:1px solid #444}
input,select,button{padding:10px;margin:5px;border-radius:6px}
button{cursor:pointer;background:#333;color:white;border:1px solid #777}
button:hover{background:#555}
.big-btn{font-size:20px;padding:16px 30px}
.hidden{display:none}
.themes{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.theme{
  background:#222;
  border:1px solid #555;
  border-radius:15px;
  padding:20px;
  min-width:180px;
  text-align:center;
  cursor:pointer;
}

.theme img{
  width:65px;
  height:65px;
  object-fit:cover;
  border-radius:50%;
  border:2px solid #555;
  display:block;
  margin:0 auto 6px;
  background:#1a1a1a;
}

.theme strong{
  font-size:11px;
  display:block;
  line-height:1.1;
}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px}
.card{background:#1b1b1b;border:1px solid #444;border-radius:10px;padding:10px;text-align:center}
.card img{max-width:120px;max-height:120px;object-fit:contain}
.search{width:60%;max-width:450px}
.quick-themes{
  display:flex;
  align-items:center;
  gap:18px;
  overflow-x:auto;
  white-space:nowrap;
  padding:8px 14px;
  flex:1;
  min-width:0;
  max-width:none;
  border-radius:18px;
  background:linear-gradient(90deg,#141414,#1d1230,#101820);
  box-shadow:0 0 12px rgba(130,80,255,0.35);
}

.quick-themes::-webkit-scrollbar{
  height:8px;
}

.quick-themes::-webkit-scrollbar-track{
  background:#111;
  border-radius:20px;
}

.quick-themes::-webkit-scrollbar-thumb{
  background:linear-gradient(90deg,#7f5cff,#00eaff);
  border-radius:20px;
  box-shadow:0 0 8px #7f5cff;
}

/* Replaced stats/astral/star CSS per request */
.stats-astral{
  position:relative;
  overflow:hidden;
  text-align:center;
  margin:0 auto 22px auto;
  max-width:700px;
  min-height:auto;
  padding:14px 22px;
  border-radius:18px;
  background:
    radial-gradient(circle at 15% 25%, rgba(120,0,80,.45), transparent 28%),
    radial-gradient(circle at 70% 40%, rgba(70,0,130,.45), transparent 30%),
    radial-gradient(circle at 45% 90%, rgba(10,10,35,.9), transparent 35%),
    linear-gradient(135deg,#050506,#090012 45%,#050506);
  border:1px solid rgba(120,80,180,.18);
  backdrop-filter: blur(2px);
  box-shadow:
    inset 0 0 18px rgba(80,0,120,.25),
    0 0 6px rgba(80,0,120,.15);
}

.stats-astral::before{
  content:"";
  position:absolute;
  inset:-35px;
  background:
    radial-gradient(circle at 15% 45%, rgba(0,0,0,.9) 0 8%, transparent 16%),
    radial-gradient(circle at 85% 30%, rgba(0,0,0,.85) 0 7%, transparent 15%),
    radial-gradient(circle at 50% 115%, rgba(0,0,0,.95) 0 16%, transparent 28%);
  filter:blur(18px);
  opacity:.9;
  animation:symbioteMove 7s ease-in-out infinite alternate;
  z-index:1;
}

.stats-astral::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 10% 20%, #fff 0 1px, transparent 2px),
    radial-gradient(circle at 25% 65%, #fff 0 1px, transparent 2px),
    radial-gradient(circle at 40% 35%, #fff 0 1px, transparent 2px),
    radial-gradient(circle at 55% 75%, #fff 0 1px, transparent 2px),
    radial-gradient(circle at 70% 25%, #fff 0 1px, transparent 2px),
    radial-gradient(circle at 85% 60%, #fff 0 1px, transparent 2px),
    radial-gradient(circle at 95% 40%, #fff 0 1px, transparent 2px);
  background-size:140px 90px;
  opacity:.9;
  animation:starsDrift 10s linear infinite;
  z-index:2;
}

.stars,
.stars2,
.stars3{
  position:absolute;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:3;
}

.stars::before,
.stars2::before,
.stars3::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    radial-gradient(circle, white 0 1px, transparent 2px);
  background-size:160px 120px;
  filter:
    drop-shadow(0 0 4px white)
    drop-shadow(0 0 7px rgba(180,90,255,.9));
  animation:starFieldFall 12s linear infinite;
}

.stars2::before{
  opacity:.65;
  animation-duration:8s;
  animation-delay:-3s;
}

.stars3::before{
  opacity:.35;
  animation-duration:16s;
  animation-delay:-6s;
}

/* Shooting stars */
.shooting-star{
  position:absolute;
  width:80px;
  height:2px;

  background:linear-gradient(
    90deg,
    rgba(255,255,255,0),
    rgba(255,255,255,.9)
  );

  transform:rotate(-35deg);

  filter:
    drop-shadow(0 0 4px white)
    drop-shadow(0 0 8px #9d6cff);

  opacity:.8;
  z-index:4;
}

.shooting-star{
  top:15%;
  left:-120px;
  animation:shootingStar 8s linear infinite;
}

.shooting2{
  top:50%;
  animation-delay:2.5s;
}

.shooting3{
  top:75%;
  animation-delay:5s;
}

@keyframes shootingStar{

  0%{
    transform:
      translate(-150px,-50px)
      rotate(-35deg);
    opacity:0;
  }

  10%{
    opacity:1;
  }

  40%{
    opacity:1;
  }

  100%{
    transform:
      translate(900px,250px)
      rotate(-35deg);
    opacity:0;
  }
}

#stats{
  position:relative;
  z-index:10;
  font-size:24px;
  font-weight:bold;
  color:white;
  text-shadow:
    0 0 6px rgba(255,255,255,.9),
    0 0 12px rgba(190,80,255,.8),
    0 0 20px rgba(255,0,100,.45);
}

@keyframes starFieldFall{
  from{
    transform:translateY(-100%);
  }
  to{
    transform:translateY(100%);
  }
}

@keyframes starsDrift{
  from{
    background-position:0 0;
  }
  to{
    background-position:140px 180px;
  }
}

@keyframes symbioteMove{
  from{
    transform:scale(1) translateX(-15px);
    opacity:.75;
  }
  to{
    transform:scale(1.08) translateX(18px);
    opacity:1;
  }
}
</style>
</head>

let db;

const request = indexedDB.open("LoultStickersDB", 5);

request.onupgradeneeded = e => {
  db = e.target.result;

  if (!db.objectStoreNames.contains("themes")) {
    db.createObjectStore("themes", { keyPath: "id" });
  }

  if (!db.objectStoreNames.contains("stickers")) {
    db.createObjectStore("stickers", { keyPath: "id" });
  }
};

request.onsuccess = e => {
  db = e.target.result;
  renderAll();
};

function tx(store, mode = "readonly") {
  return db.transaction(store, mode).objectStore(store);
}

function getAll(store) {
  return new Promise(resolve => {
    const req = tx(store).getAll();
    req.onsuccess = () => resolve(req.result);
  });
}

function put(store, value) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").put(value);
    req.onsuccess = () => resolve();
  });
}

function del(store, id) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").delete(id);
    req.onsuccess = () => resolve();
  });
}

function fileToDataURL(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

async function addTheme() {
  const input = document.getElementById("themeName");
  const iconInput = document.getElementById("themeIcon");

  const name = input.value.trim();

  if (!name) return alert("Écris un nom de thème.");

  if (!iconInput.files[0]) {
    return alert("Ajoute une icône / illustration pour ce thème.");
  }

  const themes = await getAll("themes");

  if (themes.some(t => t.name.toLowerCase() === name.toLowerCase())) {
    return alert("Ce thème existe déjà.");
  }

  let icon = null;

  if (iconInput.files[0]) {
    icon = await fileToDataURL(iconInput.files[0]);
  }

  await put("themes", {
    id: crypto.randomUUID(),
    name,
    icon
  });

  input.value = "";
  iconInput.value = "";

  renderAll();
}

async function addSticker() {
  const file = document.getElementById("stickerFile").files[0];
  const url = document.getElementById("stickerUrl").value.trim();
  const name = document.getElementById("stickerName").value.trim();
  const themeId = document.getElementById("themeSelect").value;

  if (!file && !url) return alert("Choisis un fichier ou colle une URL.");
  if (!name) return alert("Donne un nom au sticker.");
  if (!themeId) return alert("Choisis un thème.");

  let stickerData = {
    id: crypto.randomUUID(),
    name,
    themeId,
    favorite: false
  };

  if (file) {
    stickerData.file = file;
    stickerData.type = "file";
  } else {
    stickerData.url = url;
    stickerData.type = "url";
  }

  await put("stickers", stickerData);

  document.getElementById("stickerFile").value = "";
  document.getElementById("stickerUrl").value = "";
  document.getElementById("stickerName").value = "";

  renderAll();
}

async function renderAll() {
  const themes = await getAll("themes");
  const stickers = await getAll("stickers");

  renderStats(themes, stickers);
  renderThemeSelect(themes);
  renderQuickThemes(themes);
  renderThemes(themes, stickers);
  renderFavorites(stickers);
}

    &nbsp;&nbsp;&nbsp;

    &nbsp;&nbsp;&nbsp;
    ✦ ${favorites} FAVORIS ✦
  `;
}

      select.appendChild(option);
    });
}

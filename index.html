<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Loult Stickers Bank</title>

<style>
body{margin:0;padding:20px;background:#111;color:white;font-family:Arial,sans-serif}
h1{text-align:center}
.section{background:#1b1b1b;border:1px solid #444;border-radius:12px;padding:18px;margin-bottom:20px}
.sub-section{margin-top:18px;padding-top:15px;border-top:1px solid #444}
input,select,button{padding:10px;margin:5px;border-radius:6px}
button{cursor:pointer;background:#333;color:white;border:1px solid #777}
button:hover{background:#555}
.big-btn{font-size:20px;padding:16px 30px}
.hidden{display:none}
.themes{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.theme{
  background:#222;
  border:1px solid #555;
  border-radius:15px;
  padding:20px;
  min-width:180px;
  text-align:center;
  cursor:pointer;
}

.theme img{
  width:65px;
  height:65px;
  object-fit:cover;
  border-radius:50%;
  border:2px solid #555;
  display:block;
  margin:0 auto 6px;
  background:#1a1a1a;
}

.theme strong{
  font-size:11px;
  display:block;
  line-height:1.1;
}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px}
.card{background:#1b1b1b;border:1px solid #444;border-radius:10px;padding:10px;text-align:center}
.card img{max-width:120px;max-height:120px;object-fit:contain}
.search{width:60%;max-width:450px}
.quick-themes{
  display:flex;
  align-items:center;
  gap:18px;
  overflow-x:auto;
  white-space:nowrap;
  padding:8px 14px;
  flex:1;
  min-width:0;
  max-width:none;
  border-radius:18px;
  background:linear-gradient(90deg,#141414,#1d1230,#101820);
  box-shadow:0 0 12px rgba(130,80,255,0.35);
}

.quick-themes::-webkit-scrollbar{
  height:8px;
}

.quick-themes::-webkit-scrollbar-track{
  background:#111;
  border-radius:20px;
}

.quick-themes::-webkit-scrollbar-thumb{
  background:linear-gradient(90deg,#7f5cff,#00eaff);
  border-radius:20px;
  box-shadow:0 0 8px #7f5cff;
}

/* Added stats-astral and stars styles */
.stats-astral{
  position:relative;
  overflow:hidden;

  text-align:center;

  margin:0 auto 20px auto;

  max-width:800px;

  padding:22px;

  border-radius:20px;

  background:
  radial-gradient(circle at 20% 20%,
  rgba(255,0,100,.35),
  transparent 35%),

  radial-gradient(circle at 80% 40%,
  rgba(120,0,255,.35),
  transparent 35%),

  #080812;

  border:1px solid #9d4fff;

  box-shadow:
  0 0 20px #7d2cff,
  0 0 45px #ff0080;

  min-height:55px;
}

#stats{
  position:relative;
  z-index:10;

  font-size:24px;
  font-weight:bold;

  color:white;

  text-shadow:
  0 0 10px #ff00aa,
  0 0 20px #7d2cff;
}

.stars,
.stars2,
.stars3{
  position:absolute;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}

.stars::before,
.stars2::before,
.stars3::before{
  content:"";
  position:absolute;
  top:-20%;
  left:0;
  width:4px;
  height:4px;
  border-radius:50%;
  background:white;

  box-shadow:
    20px 10px #fff,
    70px 45px #fff,
    120px 20px #fff,
    180px 70px #fff,
    240px 35px #fff,
    300px 90px #fff,
    370px 25px #fff,
    430px 60px #fff,
    500px 15px #fff,
    560px 80px #fff,
    630px 40px #fff,
    700px 95px #fff,
    760px 25px #fff,
    830px 65px #fff,
    900px 35px #fff,
    970px 85px #fff,
    1040px 15px #fff,
    1110px 55px #fff,
    1180px 95px #fff,
    1250px 40px #fff,
    1320px 75px #fff,
    1390px 25px #fff,
    1460px 90px #fff,
    1530px 50px #fff;
    
  animation:starRain 7s linear infinite;
  filter:drop-shadow(0 0 5px #fff)
         drop-shadow(0 0 9px #c77dff);
}

.stars2::before{
  width:2px;
  height:2px;
  opacity:.75;
  animation-duration:10s;
  animation-delay:-3s;
}

.stars3::before{
  width:6px;
  height:6px;
  opacity:.45;
  animation-duration:13s;
  animation-delay:-6s;
}

@keyframes starRain{
  from{
    transform:translateY(-120px);
  }
  to{
    transform:translateY(260px);
  }
}
</style>
</head>

<body>

<h1>Loult Stickers Bank</h1>

<div class="stats-astral">

  <div class="stars"></div>
  <div class="stars stars2"></div>
  <div class="stars stars3"></div>

  <div id="stats"></div>

</div>

<div id="homePage">

  <div class="section">
    <h2>Créer un thème</h2>
    <div style="
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
">

<input id="themeName" placeholder="Nom du thème">

<div style="display:inline-block;vertical-align:top;margin-left:10px;">
  <label style="display:block;color:#ccc;font-size:13px;margin-bottom:4px;">
    Icône / illustration :
  </label>
  <input id="themeIcon" type="file" accept="image/*">
</div>

<button id="addThemeBtn">Créer le thème</button>

</div>

    <div class="sub-section">
      <h3>Ajouter un sticker dans un thème</h3>
      <input id="stickerFile" type="file" accept="image/*">
      <input id="stickerUrl" placeholder="Ou URL du sticker">
      <input id="stickerName" placeholder="Nom du sticker">
      <select id="themeSelect"></select>
      <button id="addStickerBtn">Ajouter le sticker</button>
    </div>
  </div>

  <div class="section">
    <h2>Recherche</h2>

    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <input class="search" id="searchInput" placeholder="Rechercher un sticker...">
      <button id="searchBtn">Appliquer</button>
      <button id="goThemesBtn" class="big-btn">Voir tous les thèmes</button>

      <div id="quickThemes" class="quick-themes"></div>
    </div>
  </div>

  <div class="section">
    <h2>Favoris ⭐</h2>
    <div id="favoritesGallery" class="gallery"></div>
  </div>

</div>

<div id="themesPage" class="hidden">

  <div class="section">
    <button id="backHomeBtn" class="big-btn">Retour accueil</button>
  </div>

  <div class="section">
    <h2>Thèmes</h2>
    <div id="themes" class="themes"></div>
  </div>

  <div id="stickersView" class="section hidden">
    <h2 id="themeTitle"></h2>
    <button id="backThemesBtn">Retour aux thèmes</button>
    <div id="gallery" class="gallery"></div>
  </div>

</div>

<script>
let db;

const request = indexedDB.open("LoultStickersDB", 5);

request.onupgradeneeded = e => {
  db = e.target.result;

  if (!db.objectStoreNames.contains("themes")) {
    db.createObjectStore("themes", { keyPath: "id" });
  }

  if (!db.objectStoreNames.contains("stickers")) {
    db.createObjectStore("stickers", { keyPath: "id" });
  }
};

request.onsuccess = e => {
  db = e.target.result;
  renderAll();
};

function tx(store, mode = "readonly") {
  return db.transaction(store, mode).objectStore(store);
}

function getAll(store) {
  return new Promise(resolve => {
    const req = tx(store).getAll();
    req.onsuccess = () => resolve(req.result);
  });
}

function put(store, value) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").put(value);
    req.onsuccess = () => resolve();
  });
}

function del(store, id) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").delete(id);
    req.onsuccess = () => resolve();
  });
}

function fileToDataURL(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

async function addTheme() {
  const input = document.getElementById("themeName");
  const iconInput = document.getElementById("themeIcon");

  const name = input.value.trim();

  if (!name) return alert("Écris un nom de thème.");

  if (!iconInput.files[0]) {
    return alert("Ajoute une icône / illustration pour ce thème.");
  }

  const themes = await getAll("themes");

  if (themes.some(t => t.name.toLowerCase() === name.toLowerCase())) {
    return alert("Ce thème existe déjà.");
  }

  let icon = null;

  if (iconInput.files[0]) {
    icon = await fileToDataURL(iconInput.files[0]);
  }

  await put("themes", {
    id: crypto.randomUUID(),
    name,
    icon
  });

  input.value = "";
  iconInput.value = "";

  renderAll();
}

async function addSticker() {
  const file = document.getElementById("stickerFile").files[0];
  const url = document.getElementById("stickerUrl").value.trim();
  const name = document.getElementById("stickerName").value.trim();
  const themeId = document.getElementById("themeSelect").value;

  if (!file && !url) return alert("Choisis un fichier ou colle une URL.");
  if (!name) return alert("Donne un nom au sticker.");
  if (!themeId) return alert("Choisis un thème.");

  let stickerData = {
    id: crypto.randomUUID(),
    name,
    themeId,
    favorite: false
  };

  if (file) {
    stickerData.file = file;
    stickerData.type = "file";
  } else {
    stickerData.url = url;
    stickerData.type = "url";
  }

  await put("stickers", stickerData);

  document.getElementById("stickerFile").value = "";
  document.getElementById("stickerUrl").value = "";
  document.getElementById("stickerName").value = "";

  renderAll();
}

async function renderAll() {
  const themes = await getAll("themes");
  const stickers = await getAll("stickers");

  renderStats(themes, stickers);
  renderThemeSelect(themes);
  renderQuickThemes(themes);
  renderThemes(themes, stickers);
  renderFavorites(stickers);
}

function renderStats(themes, stickers){

  const favorites =
    stickers.filter(s => s.favorite).length;

  document.getElementById("stats").innerHTML = `
    ✦ ${themes.length} THÈMES ✦
    &nbsp;&nbsp;&nbsp;
    ✦ ${stickers.length} STICKERS ✦
    &nbsp;&nbsp;&nbsp;
    ✦ ${favorites} FAVORIS ✦
  `;
}

function renderThemeSelect(themes) {
  const select = document.getElementById("themeSelect");
  select.innerHTML = "";

  themes
    .sort((a,b) => a.name.localeCompare(b.name, "fr"))
    .forEach(theme => {
      const option = document.createElement("option");
      option.value = theme.id;
      option.textContent = theme.name;
      select.appendChild(option);
    });
}

function renderQuickThemes(themes) {
  const container = document.getElementById("quickThemes");
  container.innerHTML = "";

  themes
    .sort((a,b) => a.name.localeCompare(b.name, "fr"))
    .forEach(theme => {
      const div = document.createElement("div");

      div.style.textAlign = "center";
      div.style.width = "72px";
      div.style.marginRight = "4px";
      div.style.flexShrink = "0";
      div.style.cursor = "pointer";

      div.onclick = () => {
        document.getElementById("goThemesBtn").click();
        setTimeout(() => openTheme(theme.id), 100);
      };

      div.innerHTML = `
        ${theme.icon ? `<img src="${theme.icon}" style="
          width:58px;
          height:58px;
          border-radius:50%;
          object-fit:cover;
          border:2px solid #555;
          display:block;
          margin:0 auto 6px;
        ">` : ""}
        <div style="
          font-size:11px;
          line-height:1;
          overflow:hidden;
          text-overflow:ellipsis;
          white-space:nowrap;
        ">
          ${theme.name}
        </div>
      `;

      container.appendChild(div);
    });
}

function renderThemes(themes, stickers) {
  const container = document.getElementById("themes");
  container.innerHTML = "";

  themes
    .sort((a,b) => a.name.localeCompare(b.name, "fr"))
    .forEach(theme => {
      const count = stickers.filter(s => s.themeId === theme.id).length;

      const box = document.createElement("div");
      box.className = "theme";

      box.innerHTML = `
        ${
          theme.icon
            ? `<img src="${theme.icon}"
                 style="
                   width:90px;
                   height:90px;
                   object-fit:cover;
                   border-radius:50%;
                   border:3px solid #555;
                   display:block;
                   margin:0 auto 12px;
                   background:#1a1a1a;
                 ">`
            : ""
        }

        <div style="
  font-size:18px;
  font-weight:bold;
  margin-top:8px;
">
  ${theme.name}
</div>

<div style="
  color:#aaa;
  font-size:13px;
  margin-top:4px;
">
  ${count} sticker(s)
</div>
      `;

      const openBtn = document.createElement("button");
      openBtn.textContent = "Ouvrir";
      openBtn.onclick = e => {
        e.stopPropagation();
        openTheme(theme.id);
      };

      const renameBtn = document.createElement("button");
      renameBtn.textContent = "Renommer";
      renameBtn.onclick = e => {
        e.stopPropagation();
        renameTheme(theme.id);
      };

      const iconBtn = document.createElement("button");
      iconBtn.textContent = "Icône";
      iconBtn.onclick = e => {
        e.stopPropagation();
        changeThemeIcon(theme.id);
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = e => {
        e.stopPropagation();
        deleteTheme(theme.id);
      };

      box.onclick = () => openTheme(theme.id);
      box.appendChild(openBtn);
      box.appendChild(renameBtn);
      box.appendChild(iconBtn);
      box.appendChild(deleteBtn);

      container.appendChild(box);
    });
}

async function openTheme(themeId) {
  const themes = await getAll("themes");
  const stickers = await getAll("stickers");

  const theme = themes.find(t => t.id === themeId);
  if (!theme) return;

  document.getElementById("stickersView").classList.remove("hidden");
  document.getElementById("themeTitle").textContent = theme.name;

  renderStickers(
    stickers.filter(s => s.themeId === themeId),
    document.getElementById("gallery")
  );
}

function renderFavorites(stickers) {
  renderStickers(
    stickers.filter(s => s.favorite),
    document.getElementById("favoritesGallery")
  );
}

function renderStickers(stickers, container) {
  container.innerHTML = "";

  const search = document.getElementById("searchInput").value.toLowerCase();

  stickers
    .filter(s => s.name.toLowerCase().includes(search))
    .sort((a,b) => a.name.localeCompare(b.name, "fr"))
    .forEach(sticker => {
      const url = sticker.type === "url"
        ? sticker.url
        : URL.createObjectURL(sticker.file);

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = url;

      const title = document.createElement("div");
      title.innerHTML = `<strong>${sticker.name}</strong>`;

      const favBtn = document.createElement("button");
      favBtn.textContent = sticker.favorite ? "⭐" : "☆";
      favBtn.onclick = () => toggleFavorite(sticker.id);

      const renameBtn = document.createElement("button");
      renameBtn.textContent = "Renommer";
      renameBtn.onclick = () => renameSticker(sticker.id);

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = () => deleteSticker(sticker.id);

      card.appendChild(img);
      card.appendChild(title);
      card.appendChild(favBtn);
      card.appendChild(renameBtn);
      card.appendChild(deleteBtn);

      container.appendChild(card);
    });
}

async function toggleFavorite(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);

  if (!sticker) return;

  sticker.favorite = !sticker.favorite;
  await put("stickers", sticker);

  renderAll();

  if (!document.getElementById("stickersView").classList.contains("hidden")) {
    openTheme(sticker.themeId);
  }
}

async function renameTheme(id) {
  const themes = await getAll("themes");
  const theme = themes.find(t => t.id === id);

  const newName = prompt("Nouveau nom du thème :", theme.name);
  if (!newName) return;

  theme.name = newName.trim();
  await put("themes", theme);
  renderAll();
}

async function renameSticker(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);

  const newName = prompt("Nouveau nom du sticker :", sticker.name);
  if (!newName) return;

  sticker.name = newName.trim();
  await put("stickers", sticker);
  renderAll();

  if (!document.getElementById("stickersView").classList.contains("hidden")) {
    openTheme(sticker.themeId);
  }
}

async function deleteSticker(id) {
  if (!confirm("Supprimer ce sticker ?")) return;

  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);

  await del("stickers", id);
  renderAll();

  if (sticker && !document.getElementById("stickersView").classList.contains("hidden")) {
    openTheme(sticker.themeId);
  }
}

async function changeThemeIcon(id) {
  const themes = await getAll("themes");
  const theme = themes.find(t => t.id === id);

  if (!theme) return;

  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;

    theme.icon = await fileToDataURL(file);

    await put("themes", theme);
    renderAll();
  };

  input.click();
}

async function deleteTheme(id) {
  const stickers = await getAll("stickers");

  if (stickers.some(s => s.themeId === id)) {
    return alert("Supprime d'abord les stickers de ce thème.");
  }

  if (!confirm("Supprimer ce thème ?")) return;

  await del("themes", id);
  renderAll();
}

document.getElementById("addThemeBtn").onclick = addTheme;
document.getElementById("addStickerBtn").onclick = addSticker;

document.getElementById("goThemesBtn").onclick = () => {
  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("themesPage").classList.remove("hidden");
};

document.getElementById("backHomeBtn").onclick = () => {
  document.getElementById("themesPage").classList.add("hidden");
  document.getElementById("homePage").classList.remove("hidden");
};

document.getElementById("backThemesBtn").onclick = () => {
  document.getElementById("stickersView").classList.add("hidden");
};

document.getElementById("searchInput").oninput = renderAll;
document.getElementById("searchBtn").onclick = renderAll;
</script>

</body>
</html>

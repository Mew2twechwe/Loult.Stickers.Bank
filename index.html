<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Loult Stickers Bank</title>

<style>
body{margin:0;padding:20px;background:#111;color:white;font-family:Arial,sans-serif}
h1{text-align:center}
.section{background:#1b1b1b;border:1px solid #444;border-radius:12px;padding:18px;margin-bottom:20px}
.sub-section{margin-top:18px;padding-top:15px;border-top:1px solid #444}
input,select,button{padding:10px;margin:5px;border-radius:6px}
button{cursor:pointer;background:#333;color:white;border:1px solid #777}
button:hover{background:#555}
.big-btn{font-size:22px;padding:18px 35px}
.nav{text-align:center;margin:25px 0}
.hidden{display:none}
.themes{display:flex;flex-wrap:wrap;gap:10px}
.theme{background:#222;border:1px solid #555;border-radius:10px;padding:15px;min-width:160px;text-align:center;cursor:pointer}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px}
.card{background:#1b1b1b;border:1px solid #444;border-radius:10px;padding:10px;text-align:center}
.card img{max-width:120px;max-height:120px;object-fit:contain}
.search{width:70%;max-width:500px}
.favorite-bar{border-top:1px solid #444;margin-top:15px;padding-top:15px}
.favorite-title{font-size:20px;margin-bottom:10px}
</style>
</head>

<body>

<h1>Loult Stickers Bank</h1>

<div id="homePage">

  <div class="section">
    <h2>Créer un thème</h2>
    <input id="themeName" placeholder="Nom du thème">
    <button id="addThemeBtn">Créer le thème</button>

    <div class="sub-section">
      <h3>Ajouter un sticker dans un thème</h3>
      <input id="stickerFile" type="file" accept="image/*">
      <input id="stickerName" placeholder="Nom du sticker">
      <select id="themeSelect"></select>
      <button id="addStickerBtn">Ajouter le sticker</button>
    </div>
  </div>

  <div class="section">
    <h2>Recherche et tri</h2>
    <input class="search" id="searchInput" placeholder="Rechercher un sticker ou thème...">

    <select id="sortSelect">
      <option value="az">Nom A → Z</option>
      <option value="za">Nom Z → A</option>
      <option value="theme">Par thème</option>
      <option value="fav">Favoris d’abord</option>
    </select>

    <button id="searchBtn">Appliquer</button>
  </div>

  <div class="nav">
    <button id="goThemesBtn" class="big-btn">Voir les thèmes</button>
  </div>

  <div class="section">
    <h2>Barres de favoris ⭐</h2>

    <input id="favBarName" placeholder="Nom de la barre de favoris">
    <button id="addFavBarBtn">Créer une barre</button>

    <div id="favoriteBars"></div>
  </div>

</div>

<div id="themesPage" class="hidden">

  <div class="nav">
    <button id="backHomeBtn" class="big-btn">Retour accueil</button>
  </div>

  <div class="section">
    <h2>Thèmes</h2>
    <div id="themes" class="themes"></div>
  </div>

  <div id="stickersView" class="section hidden">
    <h2 id="themeTitle"></h2>
    <button id="backThemesBtn">Retour aux thèmes</button>
    <div id="gallery" class="gallery"></div>
  </div>

</div>

<script>
let db;

const request = indexedDB.open("LoultStickersDB", 4);

request.onupgradeneeded = e => {
  db = e.target.result;

  if (!db.objectStoreNames.contains("themes")) {
    db.createObjectStore("themes", { keyPath: "id" });
  }

  if (!db.objectStoreNames.contains("stickers")) {
    db.createObjectStore("stickers", { keyPath: "id" });
  }

  if (!db.objectStoreNames.contains("favoriteBars")) {
    db.createObjectStore("favoriteBars", { keyPath: "id" });
  }
};

request.onsuccess = e => {
  db = e.target.result;
  renderAll();
};

function tx(store, mode = "readonly") {
  return db.transaction(store, mode).objectStore(store);
}

function getAll(store) {
  return new Promise(resolve => {
    const req = tx(store).getAll();
    req.onsuccess = () => resolve(req.result);
  });
}

function put(store, value) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").put(value);
    req.onsuccess = () => resolve();
  });
}

function del(store, id) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").delete(id);
    req.onsuccess = () => resolve();
  });
}

function sortItems(items) {
  const sort = document.getElementById("sortSelect").value;

  if (sort === "za") {
    return items.sort((a,b) => b.name.localeCompare(a.name, "fr"));
  }

  return items.sort((a,b) => a.name.localeCompare(b.name, "fr"));
}

async function addTheme() {
  const input = document.getElementById("themeName");
  const name = input.value.trim();

  if (!name) return alert("Écris un nom de thème.");

  const themes = await getAll("themes");

  if (themes.some(t => t.name.toLowerCase() === name.toLowerCase())) {
    return alert("Ce thème existe déjà.");
  }

  await put("themes", {
    id: crypto.randomUUID(),
    name
  });

  input.value = "";
  renderAll();
}

async function addSticker() {
  const file = document.getElementById("stickerFile").files[0];
  const name = document.getElementById("stickerName").value.trim();
  const themeId = document.getElementById("themeSelect").value;

  if (!file) return alert("Choisis un fichier.");
  if (!name) return alert("Donne un nom au sticker.");
  if (!themeId) return alert("Choisis un thème.");

  await put("stickers", {
    id: crypto.randomUUID(),
    name,
    themeId,
    file,
    favoriteBars: []
  });

  document.getElementById("stickerFile").value = "";
  document.getElementById("stickerName").value = "";

  renderAll();
}

async function addFavoriteBar() {
  const input = document.getElementById("favBarName");
  const name = input.value.trim();

  if (!name) return alert("Donne un nom à la barre.");

  const bars = await getAll("favoriteBars");

  if (bars.some(b => b.name.toLowerCase() === name.toLowerCase())) {
    return alert("Cette barre existe déjà.");
  }

  await put("favoriteBars", {
    id: crypto.randomUUID(),
    name
  });

  input.value = "";
  renderAll();
}

async function renderAll() {
  const themes = await getAll("themes");
  const stickers = await getAll("stickers");
  const bars = await getAll("favoriteBars");

  renderThemeSelect(themes);
  renderThemes(themes, stickers);
  renderFavoriteBars(bars, stickers);
}

function renderThemeSelect(themes) {
  const select = document.getElementById("themeSelect");
  select.innerHTML = "";

  themes
    .sort((a,b) => a.name.localeCompare(b.name, "fr"))
    .forEach(theme => {
      const option = document.createElement("option");
      option.value = theme.id;
      option.textContent = theme.name;
      select.appendChild(option);
    });
}

function renderThemes(themes, stickers) {
  const container = document.getElementById("themes");
  container.innerHTML = "";

  themes
    .sort((a,b) => a.name.localeCompare(b.name, "fr"))
    .forEach(theme => {
      const count = stickers.filter(s => s.themeId === theme.id).length;

      const box = document.createElement("div");
      box.className = "theme";

      box.innerHTML = `
        <strong>${theme.name}</strong><br>
        <small>${count} sticker(s)</small><br>
      `;

      const openBtn = document.createElement("button");
      openBtn.textContent = "Ouvrir";
      openBtn.onclick = e => {
        e.stopPropagation();
        openTheme(theme.id);
      };

      const renameBtn = document.createElement("button");
      renameBtn.textContent = "Renommer";
      renameBtn.onclick = e => {
        e.stopPropagation();
        renameTheme(theme.id);
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = e => {
        e.stopPropagation();
        deleteTheme(theme.id);
      };

      box.onclick = () => openTheme(theme.id);
      box.appendChild(openBtn);
      box.appendChild(renameBtn);
      box.appendChild(deleteBtn);

      container.appendChild(box);
    });
}

async function openTheme(themeId) {
  const themes = await getAll("themes");
  const stickers = await getAll("stickers");
  const bars = await getAll("favoriteBars");

  const theme = themes.find(t => t.id === themeId);
  if (!theme) return;

  document.getElementById("stickersView").classList.remove("hidden");
  document.getElementById("themeTitle").textContent = theme.name;

  renderStickers(
    stickers.filter(s => s.themeId === themeId),
    document.getElementById("gallery"),
    bars
  );
}

function renderFavoriteBars(bars, stickers) {
  const container = document.getElementById("favoriteBars");
  container.innerHTML = "";

  bars
    .sort((a,b) => a.name.localeCompare(b.name, "fr"))
    .forEach(bar => {
      const div = document.createElement("div");
      div.className = "favorite-bar";

      const title = document.createElement("div");
      title.className = "favorite-title";
      title.textContent = bar.name;

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer la barre";
      deleteBtn.onclick = () => deleteFavoriteBar(bar.id);

      const gallery = document.createElement("div");
      gallery.className = "gallery";

      const barStickers = stickers.filter(s => s.favoriteBars && s.favoriteBars.includes(bar.id));
      renderStickers(barStickers, gallery, bars, true);

      div.appendChild(title);
      div.appendChild(deleteBtn);
      div.appendChild(gallery);

      container.appendChild(div);
    });
}

function renderStickers(stickers, container, bars, fromFavoriteBar = false) {
  container.innerHTML = "";

  const search = document.getElementById("searchInput").value.toLowerCase();

  let filtered = stickers.filter(s => s.name.toLowerCase().includes(search));

  filtered = sortItems(filtered);

  filtered.forEach(sticker => {
    const url = URL.createObjectURL(sticker.file);

    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = url;

    const title = document.createElement("div");
    title.innerHTML = `<strong>${sticker.name}</strong>`;

    const barSelect = document.createElement("select");
    const empty = document.createElement("option");
    empty.value = "";
    empty.textContent = "Ajouter à une barre";
    barSelect.appendChild(empty);

    bars.forEach(bar => {
      const option = document.createElement("option");
      option.value = bar.id;
      option.textContent = bar.name;
      barSelect.appendChild(option);
    });

    barSelect.onchange = () => {
      if (barSelect.value) addStickerToBar(sticker.id, barSelect.value);
    };

    const renameBtn = document.createElement("button");
    renameBtn.textContent = "Renommer";
    renameBtn.onclick = () => renameSticker(sticker.id);

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Supprimer";
    deleteBtn.onclick = () => deleteSticker(sticker.id);

    card.appendChild(img);
    card.appendChild(title);
    card.appendChild(barSelect);
    card.appendChild(renameBtn);
    card.appendChild(deleteBtn);

    container.appendChild(card);
  });
}

async function addStickerToBar(stickerId, barId) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === stickerId);

  if (!sticker.favoriteBars) sticker.favoriteBars = [];

  if (!sticker.favoriteBars.includes(barId)) {
    sticker.favoriteBars.push(barId);
  }

  await put("stickers", sticker);
  renderAll();
}

async function deleteFavoriteBar(id) {
  if (!confirm("Supprimer cette barre de favoris ?")) return;

  const stickers = await getAll("stickers");

  for (const sticker of stickers) {
    if (sticker.favoriteBars) {
      sticker.favoriteBars = sticker.favoriteBars.filter(b => b !== id);
      await put("stickers", sticker);
    }
  }

  await del("favoriteBars", id);
  renderAll();
}

async function renameTheme(id) {
  const themes = await getAll("themes");
  const theme = themes.find(t => t.id === id);

  const newName = prompt("Nouveau nom du thème :", theme.name);
  if (!newName) return;

  theme.name = newName.trim();
  await put("themes", theme);
  renderAll();
}

async function renameSticker(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);

  const newName = prompt("Nouveau nom du sticker :", sticker.name);
  if (!newName) return;

  sticker.name = newName.trim();
  await put("stickers", sticker);
  renderAll();
}

async function deleteSticker(id) {
  if (!confirm("Supprimer ce sticker ?")) return;

  await del("stickers", id);
  renderAll();
}

async function deleteTheme(id) {
  const stickers = await getAll("stickers");

  if (stickers.some(s => s.themeId === id)) {
    return alert("Supprime d'abord les stickers de ce thème.");
  }

  if (!confirm("Supprimer ce thème ?")) return;

  await del("themes", id);
  renderAll();
}

document.getElementById("addThemeBtn").onclick = addTheme;
document.getElementById("addStickerBtn").onclick = addSticker;
document.getElementById("addFavBarBtn").onclick = addFavoriteBar;

document.getElementById("goThemesBtn").onclick = () => {
  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("themesPage").classList.remove("hidden");
};

document.getElementById("backHomeBtn").onclick = () => {
  document.getElementById("themesPage").classList.add("hidden");
  document.getElementById("homePage").classList.remove("hidden");
};

document.getElementById("backThemesBtn").onclick = () => {
  document.getElementById("stickersView").classList.add("hidden");
};

document.getElementById("searchInput").oninput = renderAll;
document.getElementById("searchBtn").onclick = renderAll;
document.getElementById("sortSelect").onchange = renderAll;
</script>

</body>
</html>

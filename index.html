<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Loult Stickers Bank</title>

<style>
body{
  margin:0;
  padding:20px;
  color:white;
  font-family:Arial,sans-serif;
  background:#0d0d0d;
  position:relative;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:url("https://i.imgur.com/EHcEQ61.png");
  background-size:700px;
  background-repeat:repeat;
  background-position:center top;
  opacity:.50;
  pointer-events:none;
  z-index:-2;
  filter:saturate(1.25) contrast(1.1);
}
h1{text-align:center}
.section{
  background:rgba(20,20,20,.72);
  border:1px solid rgba(255,255,255,.10);
  border-radius:12px;
  padding:18px;
  margin-bottom:20px;
  backdrop-filter:blur(2px);
}
.sub-section{margin-top:18px;padding-top:15px;border-top:1px solid #444}
input,select,button{padding:10px;margin:5px;border-radius:6px}
button{cursor:pointer;background:#333;color:white;border:1px solid #777}
button:hover{background:#555}
.big-btn{font-size:20px;padding:16px 30px}
.hidden{display:none}
.themes{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.theme{
  background:#222;
  border:1px solid #555;
  border-radius:15px;
  padding:20px;
  min-width:180px;
  text-align:center;
  cursor:pointer;
}

.theme img{
  width:65px;
  height:65px;
  object-fit:cover;
  border-radius:50%;
  border:2px solid #555;
  display:block;
  margin:0 auto 6px;
  background:#1a1a1a;
}

.theme strong{
  font-size:11px;
  display:block;
  line-height:1.1;
}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px}
.card{background:#1b1b1b;border:1px solid #444;border-radius:10px;padding:10px;text-align:center}
.card img{max-width:120px;max-height:120px;object-fit:contain}
.search{width:60%;max-width:450px}
.quick-themes{
  display:flex;
  align-items:center;
  gap:18px;
  overflow-x:auto;
  white-space:nowrap;
  padding:8px 14px;
  flex:1;
  min-width:0;
  max-width:none;
  border-radius:18px;
  background:linear-gradient(90deg,#141414,#1d1230,#101820);
  box-shadow:0 0 12px rgba(130,80,255,0.35);
}

.quick-themes::-webkit-scrollbar{
  height:8px;
}

.quick-themes::-webkit-scrollbar-track{
  background:#111;
  border-radius:20px;
}

.quick-themes::-webkit-scrollbar-thumb{
  background:linear-gradient(90deg,#7f5cff,#00eaff);
  border-radius:20px;
  box-shadow:0 0 8px #7f5cff;
}



.stats-astral{
  position:relative;
  overflow:hidden;
  text-align:center;
  margin:0 auto 22px auto;
  padding:10px 16px;
  max-width:640px;
  border-radius:18px;
  font-weight:bold;
  letter-spacing:.8px;
  color:#fff;
  background:
    radial-gradient(circle at 18% 35%, rgba(70,0,95,.30), transparent 30%),
    radial-gradient(circle at 78% 45%, rgba(150,0,80,.20), transparent 28%),
    linear-gradient(135deg,#07070a,#120018 55%,#07070a);
  border:1px solid rgba(120,80,180,.18);
  box-shadow:
    inset 0 0 18px rgba(0,0,0,.95),
    inset 0 0 14px rgba(110,0,170,.20),
    0 0 6px rgba(90,0,140,.14);
  text-shadow:
    0 0 5px rgba(255,255,255,.85),
    0 0 10px rgba(170,70,255,.55);
}

#stats{
  position:relative;
  z-index:10;
  font-size:18px;
  font-weight:bold;
  white-space:nowrap;
}


.stars-soft{
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}

/* Couche de petites étoiles */
.stars-soft::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 5% 18%, rgba(255,255,255,.55) 0 .7px, transparent 2px),
    radial-gradient(circle at 13% 68%, rgba(185,210,255,.42) 0 .8px, transparent 2px),
    radial-gradient(circle at 22% 38%, rgba(255,255,255,.62) 0 1px, transparent 2.4px),
    radial-gradient(circle at 34% 82%, rgba(210,180,255,.50) 0 .9px, transparent 2.3px),
    radial-gradient(circle at 45% 26%, rgba(255,255,255,.70) 0 1.1px, transparent 2.8px),
    radial-gradient(circle at 57% 58%, rgba(180,140,255,.48) 0 .9px, transparent 2.4px),
    radial-gradient(circle at 69% 32%, rgba(255,255,255,.55) 0 .7px, transparent 2px),
    radial-gradient(circle at 81% 74%, rgba(210,220,255,.48) 0 1px, transparent 2.6px),
    radial-gradient(circle at 93% 20%, rgba(255,210,255,.43) 0 .8px, transparent 2px);
  opacity:.75;
  animation:nearStarsPulse 6s ease-in-out infinite alternate;
}

/* Couche profonde : étoiles plus faibles qui dérivent lentement */
.stars-soft::after{
  content:"";
  position:absolute;
  inset:-10px;
  background:
    radial-gradient(circle at 10% 44%, rgba(255,255,255,.30) 0 .6px, transparent 2px),
    radial-gradient(circle at 24% 14%, rgba(170,130,255,.34) 0 .7px, transparent 2px),
    radial-gradient(circle at 38% 64%, rgba(255,255,255,.36) 0 .7px, transparent 2px),
    radial-gradient(circle at 52% 86%, rgba(200,180,255,.28) 0 .6px, transparent 2px),
    radial-gradient(circle at 70% 18%, rgba(210,230,255,.35) 0 .7px, transparent 2px),
    radial-gradient(circle at 86% 54%, rgba(255,255,255,.42) 0 .8px, transparent 2.2px),
    radial-gradient(circle at 96% 82%, rgba(190,160,255,.30) 0 .7px, transparent 2px);
  opacity:.55;
  animation:farStarsDrift 13s ease-in-out infinite alternate;
}

/* Étoile filante naturelle : tête fine + longue traînée */
.shooting-star{
  position:absolute;
  width:128px;
  height:1px;
  border-radius:999px;
  background:linear-gradient(
    90deg,
    rgba(255,255,255,0),
    rgba(130,145,255,.18),
    rgba(210,225,255,.75),
    rgba(245,248,255,.95)
  );
  box-shadow:
    0 0 3px rgba(230,235,255,.75),
    0 0 9px rgba(110,120,255,.45);
  opacity:0;
  z-index:4;
  transform-origin:right center;
  animation:naturalShootingStarA 8.5s ease-in-out infinite;
}

.shooting-star::after{
  content:"";
  position:absolute;
  right:0;
  top:50%;
  width:4px;
  height:4px;
  transform:translateY(-50%);
  border-radius:50%;
  background:rgba(240,245,255,.95);
  box-shadow:
    0 0 7px rgba(240,245,255,.9),
    0 0 14px rgba(110,120,255,.65);
}

.shooting-star.s2{
  width:98px;
  opacity:0;
  animation:naturalShootingStarB 12s ease-in-out infinite;
  animation-delay:4.5s;
}

.shooting-star.s3{
  display:block;
  width:76px;
  opacity:0;
  animation:naturalShootingStarC 15s ease-in-out infinite;
  animation-delay:8s;
}

@keyframes nearStarsPulse{
  0%{
    opacity:.42;
    transform:scale(1) translate(0,0);
    filter:blur(0);
  }
  50%{
    opacity:.9;
    transform:scale(1.025) translate(1px,1px);
    filter:blur(.1px);
  }
  100%{
    opacity:.62;
    transform:scale(1.045) translate(-1px,-1px);
    filter:blur(.25px);
  }
}

@keyframes farStarsDrift{
  0%{
    opacity:.32;
    transform:translate(-2px,2px) scale(1);
  }
  100%{
    opacity:.68;
    transform:translate(4px,-3px) scale(1.04);
  }
}

/* Trajectoire principale : descend comme sur ta photo */
@keyframes naturalShootingStarA{
  0%,58%{
    opacity:0;
    transform:translate(72px,-22px) rotate(43deg);
  }
  62%{
    opacity:.85;
  }
  76%{
    opacity:.85;
    transform:translate(368px,94px) rotate(43deg);
  }
  86%,100%{
    opacity:0;
    transform:translate(438px,122px) rotate(43deg);
  }
}

/* Deuxième passage plus discret, plus à droite */
@keyframes naturalShootingStarB{
  0%,50%{
    opacity:0;
    transform:translate(420px,-12px) rotate(48deg);
  }
  55%{
    opacity:.65;
  }
  68%{
    opacity:.65;
    transform:translate(592px,72px) rotate(48deg);
  }
  80%,100%{
    opacity:0;
    transform:translate(642px,98px) rotate(48deg);
  }
}

/* Très petite étoile filante, rare, pour varier */
@keyframes naturalShootingStarC{
  0%,62%{
    opacity:0;
    transform:translate(205px,-16px) rotate(40deg);
  }
  67%{
    opacity:.48;
  }
  76%{
    opacity:.48;
    transform:translate(330px,46px) rotate(40deg);
  }
  86%,100%{
    opacity:0;
    transform:translate(368px,64px) rotate(40deg);
  }
}

.pinned-theme{
  border-color:rgba(255,215,80,.8);
  box-shadow:0 0 10px rgba(255,215,80,.25);
}
.recent-note{
  color:#aaa;
  font-size:13px;
  margin-top:-8px;
  margin-bottom:12px;
}

.tagline{
  color:#9f8fb5;
  font-size:12px;
  margin:6px 0 8px 0;
}
.tags-display{
  color:#b899ff;
  font-size:12px;
  margin:6px 0;
  line-height:1.3;
}

/* Tags façon ruban adhésif */
.sticker-tags{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  margin:9px 0 8px 0;
}
.tag-tape{
  position:relative;
  display:inline-block;
  padding:4px 10px;
  font-size:11px;
  color:#201525;
  background:linear-gradient(135deg,rgba(255,240,165,.92),rgba(255,215,115,.78));
  border-radius:3px;
  transform:rotate(-2deg);
  box-shadow:0 2px 4px rgba(0,0,0,.35), inset 0 0 8px rgba(255,255,255,.25);
  font-weight:bold;
}
.tag-tape:nth-child(even){
  transform:rotate(2deg);
  background:linear-gradient(135deg,rgba(210,180,255,.92),rgba(170,125,255,.78));
}
.tag-tape::before,
.tag-tape::after{
  content:"";
  position:absolute;
  top:0;
  bottom:0;
  width:7px;
  background:rgba(255,255,255,.28);
}
.tag-tape::before{left:-3px;clip-path:polygon(0 0,100% 18%,100% 82%,0 100%)}
.tag-tape::after{right:-3px;clip-path:polygon(0 18%,100% 0,100% 100%,0 82%)}

.edit-toggle{
  margin-top:8px;
  width:90%;
  background:linear-gradient(135deg,#292035,#3a1b4d);
  border:1px solid rgba(180,120,255,.45);
  box-shadow:0 0 8px rgba(130,80,255,.18);
}
.edit-panel{
  display:none;
  margin-top:9px;
  padding:9px;
  border-radius:10px;
  background:rgba(0,0,0,.28);
  border:1px solid rgba(255,255,255,.08);
}
.edit-panel.open{

}
.edit-panel button{
  padding:7px 9px;
  margin:4px;
  font-size:12px;
}
.primary-actions button{
  padding:8px 10px;
  margin-top:6px;
}

.preview-modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.82);
  z-index:9999;
}
.preview-box{
  max-width:90vw;
  max-height:90vh;
  background:#111;
  border:1px solid rgba(160,80,255,.45);
  border-radius:18px;
  padding:18px;
  text-align:center;
  box-shadow:0 0 25px rgba(130,80,255,.35);
}
.preview-box img{
  max-width:80vw;
  max-height:70vh;
  object-fit:contain;
}
.preview-title{
  margin-top:10px;
  font-weight:bold;
}
.preview-actions{
  margin-top:12px;
}

.shortcut-toolbar{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.shortcut-toolbar input{
  min-width:220px;
}

.shortcuts-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
}

.shortcut-box{
  background:
    radial-gradient(circle at 12% 20%, rgba(130,80,255,.18), transparent 28%),
    linear-gradient(135deg,rgba(16,16,20,.94),rgba(20,12,28,.94));
  border:1px solid rgba(190,140,255,.22);
  border-radius:16px;
  padding:14px;
  box-shadow:
    inset 0 0 18px rgba(0,0,0,.45),
    0 0 14px rgba(120,70,255,.12);
}

.shortcut-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.shortcut-title{
  margin:0;

}

.shortcut-key{
  font-size:12px;
  color:#d8c6ff;
  border:1px solid rgba(190,140,255,.35);
  background:rgba(70,40,120,.25);

  border-radius:999px;
}

.shortcut-actions{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}

.shortcut-actions button{
  padding:7px 9px;
  font-size:12px;
}

.shortcut-preview{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(125px,1fr));
  gap:12px;
}

.empty-note{
  color:#aaa;
  font-size:13px;
  padding:10px;
}

.shortcut-select-row{
  margin-top:8px;
  padding-top:8px;
  border-top:1px solid rgba(255,255,255,.08);
}

.shortcut-select-row select{
  max-width:160px;
  font-size:12px;
  padding:7px;
}

.shortcut-select-row button{
  font-size:12px;
  padding:7px 9px;
}

/* ===== DESIGN DES BLOCS PRINCIPAUX ===== */

.section{
  position:relative;
  overflow:hidden;
}

.forge-panel{
  border:1px solid rgba(255,120,45,.32);
  background:
    radial-gradient(circle at 14% 18%, rgba(255,95,35,.20), transparent 28%),
    radial-gradient(circle at 84% 22%, rgba(255,190,80,.10), transparent 30%),
    linear-gradient(135deg,rgba(24,16,12,.97),rgba(18,18,22,.97) 48%,rgba(30,10,8,.96));
  box-shadow:
    inset 0 0 32px rgba(255,80,25,.08),
    inset 0 0 70px rgba(0,0,0,.70),
    0 0 22px rgba(255,70,20,.12);
}

.forge-panel::before{
  content:"";
  position:absolute;
  right:26px;
  top:18px;
  font-size:92px;
  opacity:.055;
  transform:rotate(-16deg);
  pointer-events:none;
  text-shadow:0 0 18px rgba(255,120,50,.55);
}

.forge-panel::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(115deg, transparent 0 35%, rgba(255,120,40,.08) 45%, transparent 56%),
    radial-gradient(circle at 20% 100%, rgba(255,80,25,.14), transparent 30%);
  pointer-events:none;
}

.forge-panel h2,
.forge-panel h3{
  position:relative;
  z-index:2;
  text-shadow:
    0 0 8px rgba(255,130,55,.55),
    0 0 18px rgba(255,50,20,.25);
}

.forge-panel input,
.forge-panel select{
  background:rgba(10,8,8,.78);
  border:1px solid rgba(255,140,70,.25);
  color:white;
  box-shadow:inset 0 0 12px rgba(0,0,0,.55);
}

.forge-panel button{
  background:linear-gradient(135deg,rgba(70,32,18,.95),rgba(120,48,22,.88));
  border:1px solid rgba(255,145,70,.35);
  box-shadow:inset 0 0 10px rgba(255,90,30,.12),0 0 10px rgba(255,70,20,.13);
}

.forge-panel button:hover{
  background:linear-gradient(135deg,rgba(95,42,20,.96),rgba(170,66,25,.90));
}

.astral-search-panel{
  border:1px solid rgba(170,90,255,.32);
  background:
    radial-gradient(circle at 12% 28%, rgba(130,70,255,.22), transparent 30%),
    radial-gradient(circle at 82% 30%, rgba(255,50,170,.12), transparent 28%),
    radial-gradient(circle at 50% 100%, rgba(60,0,120,.18), transparent 36%),
    linear-gradient(135deg,rgba(10,10,18,.97),rgba(18,9,30,.97) 55%,rgba(8,15,24,.96));
  box-shadow:
    inset 0 0 30px rgba(100,60,255,.10),
    inset 0 0 70px rgba(0,0,0,.72),
    0 0 24px rgba(130,80,255,.16);
}

.astral-search-panel::before{
  content:"✦";
  position:absolute;
  right:28px;
  top:14px;
  font-size:86px;
  opacity:.07;
  pointer-events:none;
  color:#d9c2ff;
  text-shadow:0 0 16px rgba(210,180,255,.80),0 0 32px rgba(140,80,255,.45);
}

.astral-search-panel::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 18% 76%, rgba(255,255,255,.20) 0 1px, transparent 2px),
    radial-gradient(circle at 36% 22%, rgba(210,180,255,.25) 0 1px, transparent 2px),
    radial-gradient(circle at 62% 70%, rgba(255,210,255,.22) 0 1.2px, transparent 2.5px),
    radial-gradient(circle at 88% 50%, rgba(255,255,255,.18) 0 .8px, transparent 2px);
  opacity:.75;
  pointer-events:none;
  animation:panelStarsPulse 5s ease-in-out infinite alternate;
}

.astral-search-panel h2{
  position:relative;
  z-index:2;
  text-shadow:0 0 8px rgba(190,140,255,.75),0 0 22px rgba(130,70,255,.45);
}

.astral-search-panel input{
  background:rgba(6,6,16,.82);
  border:1px solid rgba(180,120,255,.30);
  color:white;
  box-shadow:inset 0 0 14px rgba(0,0,0,.60),0 0 12px rgba(130,80,255,.12);
}

.astral-shortcuts-panel{
  border:1px solid rgba(210,70,180,.30);
  background:
    radial-gradient(circle at 18% 25%, rgba(180,0,80,.18), transparent 31%),
    radial-gradient(circle at 78% 22%, rgba(120,60,255,.20), transparent 31%),
    radial-gradient(circle at 50% 100%, rgba(120,0,40,.22), transparent 38%),
    linear-gradient(135deg,rgba(14,8,18,.98),rgba(28,8,30,.97) 50%,rgba(14,8,22,.98));
  box-shadow:
    inset 0 0 34px rgba(180,30,130,.10),
    inset 0 0 78px rgba(0,0,0,.75),
    0 0 24px rgba(180,40,160,.14);
}

.astral-shortcuts-panel::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:
    linear-gradient(120deg, transparent, rgba(255,50,160,.10), transparent 45%),
    radial-gradient(circle at 15% 15%, rgba(255,70,120,.16), transparent 22%),
    radial-gradient(circle at 84% 18%, rgba(130,80,255,.18), transparent 25%);
  pointer-events:none;
}

.astral-shortcuts-panel h2{
  position:relative;
  z-index:2;
  text-shadow:0 0 8px rgba(255,80,180,.65),0 0 20px rgba(150,80,255,.50);
}

.shortcut-box{
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,120,220,.28);
  background:
    radial-gradient(circle at 16% 18%, rgba(255,40,120,.14), transparent 30%),
    radial-gradient(circle at 78% 20%, rgba(120,80,255,.18), transparent 32%),
    linear-gradient(135deg,rgba(18,12,22,.95),rgba(30,12,36,.95));
  box-shadow:
    inset 0 0 16px rgba(255,70,170,.08),
    inset 0 0 36px rgba(0,0,0,.65),
    0 0 14px rgba(160,70,255,.14);
}

.shortcut-box::before{
  content:"";
  position:absolute;
  inset:6px;
  border-radius:13px;
  border:1px solid rgba(255,255,255,.05);
  box-shadow:inset 0 0 18px rgba(255,80,170,.08),inset 0 0 26px rgba(100,60,255,.08);
  pointer-events:none;
}

.shortcut-head,
.shortcut-actions,
.shortcut-preview{
  position:relative;
  z-index:2;
}

.shortcut-title{
  text-shadow:0 0 7px rgba(255,110,210,.55),0 0 17px rgba(125,80,255,.38);
}

.shortcut-key{
  background:linear-gradient(135deg,rgba(90,30,90,.72),rgba(55,35,120,.72));
  border:1px solid rgba(255,150,230,.35);
  box-shadow:inset 0 0 8px rgba(255,90,190,.12),0 0 10px rgba(150,80,255,.15);
}

.shortcut-actions button,
.astral-shortcuts-panel button{
  background:linear-gradient(135deg,rgba(45,25,70,.94),rgba(90,30,80,.88));
  border:1px solid rgba(210,120,255,.30);
  box-shadow:inset 0 0 10px rgba(255,70,180,.08),0 0 10px rgba(150,70,255,.12);
}

.shortcut-actions button:hover,
.astral-shortcuts-panel button:hover{
  background:linear-gradient(135deg,rgba(65,32,100,.96),rgba(125,38,105,.92));
}

@keyframes panelStarsPulse{
  from{opacity:.35;transform:translateY(0) scale(1);}
  to{opacity:.85;transform:translateY(-2px) scale(1.015);}
}

/* ===== AJUSTEMENTS FORGE ROUGE + ALIGNEMENT INPUTS ===== */

.forge-panel{
  border:1px solid rgba(255,55,70,.40);
  background:
    radial-gradient(circle at 14% 18%, rgba(255,25,50,.24), transparent 28%),
    radial-gradient(circle at 84% 22%, rgba(255,80,120,.13), transparent 30%),
    linear-gradient(135deg,rgba(26,8,10,.98),rgba(18,18,22,.97) 48%,rgba(38,4,12,.96));
  box-shadow:
    inset 0 0 36px rgba(255,35,55,.10),
    inset 0 0 74px rgba(0,0,0,.72),
    0 0 24px rgba(255,20,50,.16);
}

.forge-panel::before{
  content:"";
  right:24px;
  top:4px;
  font-size:135px;
  opacity:.09;
  color:#ff4b5f;
  text-shadow:
    0 0 18px rgba(255,60,80,.75),
    0 0 35px rgba(255,0,70,.45);
}

<script>
let db;
const RECENT_KEY = "loult_recent_stickers_v1";
const SHORTCUTS_KEY = "loult_personal_shortcuts_v1";
let currentShortcutId = null;
let currentThemeId = null;

const request = indexedDB.open("LoultStickersDB", 5);

request.onupgradeneeded = e => {
  db = e.target.result;

  if (!db.objectStoreNames.contains("themes")) {
    db.createObjectStore("themes", { keyPath: "id" });
  }

  if (!db.objectStoreNames.contains("stickers")) {
    db.createObjectStore("stickers", { keyPath: "id" });
  }
};

request.onsuccess = e => {
  db = e.target.result;
  renderAll();
};

function tx(store, mode = "readonly") {
  return db.transaction(store, mode).objectStore(store);
}

function getAll(store) {
  return new Promise(resolve => {
    const req = tx(store).getAll();
    req.onsuccess = () => resolve(req.result);
  });
}

function put(store, value) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").put(value);
    req.onsuccess = () => resolve();
  });
}

function del(store, id) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").delete(id);
    req.onsuccess = () => resolve();
  });
}

function fileToDataURL(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

function sortThemes(themes) {
  return themes.sort((a,b) => {
    if (!!b.pinned !== !!a.pinned) return (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
    return a.name.localeCompare(b.name, "fr");
  });
}

function getRecentIds() {
  return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
}

function saveRecentIds(ids) {
  localStorage.setItem(RECENT_KEY, JSON.stringify(ids));
}

function recordRecentSticker(id) {
  let ids = getRecentIds().filter(existingId => existingId !== id);
  ids.unshift(id);
  ids = ids.slice(0, 12);
  saveRecentIds(ids);
}

async function addTheme() {
  const input = document.getElementById("themeName");
  const iconInput = document.getElementById("themeIcon");
  const iconUrlInput = document.getElementById("themeIconUrl");

  const name = input.value.trim();
  const iconUrl = iconUrlInput.value.trim();

  if (!name) return alert("Écris un nom de thème.");

  if (!iconInput.files[0] && !iconUrl) {
    return alert("Ajoute une icône / illustration pour ce thème, soit par fichier soit par URL.");
  }

  const themes = await getAll("themes");

  if (themes.some(t => t.name.toLowerCase() === name.toLowerCase())) {
    return alert("Ce thème existe déjà.");
  }

  let icon = null;

  if (iconInput.files[0]) {
    icon = await fileToDataURL(iconInput.files[0]);
  } else {
    icon = iconUrl;
  }

  await put("themes", {
    id: crypto.randomUUID(),
    name,
    icon,
    pinned: false
  });

  input.value = "";
  iconInput.value = "";
  iconUrlInput.value = "";

  renderAll();
}

async function addSticker() {
  const file = document.getElementById("stickerFile").files[0];
  const url = document.getElementById("stickerUrl").value.trim();
  const name = document.getElementById("stickerName").value.trim();
  const tags = document.getElementById("stickerTags").value
    .split(",")
    .map(tag => tag.trim())
    .filter(Boolean);
  const themeId = document.getElementById("themeSelect").value;

  if (!file && !url) return alert("Ajoute un sticker, soit par fichier soit par URL.");
  if (!name) return alert("Donne un nom au sticker.");
  if (!themeId) return alert("Choisis un thème.");

  let stickerData = {
    id: crypto.randomUUID(),
    name,
    themeId,
    favorite: false,
    tags
  };

  if (file) {
    stickerData.file = file;
    stickerData.type = "file";
  } else {
    stickerData.url = url;
    stickerData.type = "url";
  }

  await put("stickers", stickerData);

  document.getElementById("stickerFile").value = "";
  document.getElementById("stickerUrl").value = "";
  document.getElementById("stickerName").value = "";
  document.getElementById("stickerTags").value = "";

  renderAll();
}

async function renderAll() {
  const themes = await getAll("themes");
  const stickers = await getAll("stickers");

  renderStats(themes, stickers);
  renderThemeSelect(themes);
  renderQuickThemes(themes);
  renderThemes(themes, stickers);
  renderShortcuts(stickers);

  if (currentThemeId) {
    const currentTheme = themes.find(t => t.id === currentThemeId);

    if (currentTheme) {
      document.getElementById("stickersView").classList.remove("hidden");
      document.getElementById("themeTitle").textContent = currentTheme.name;

      renderStickers(
        stickers.filter(s => s.themeId === currentThemeId),
        document.getElementById("gallery")
      );
    } else {
      currentThemeId = null;
      document.getElementById("stickersView").classList.add("hidden");
    }
  }
}


function renderStats(themes, stickers) {
  const favorites = stickers.filter(s => s.favorite).length;

  document.getElementById("stats").innerHTML =
    `✦ ${themes.length} thèmes ✧ ${stickers.length} stickers ✧ ${favorites} favs ✦`;
}

function renderThemeSelect(themes) {
  const select = document.getElementById("themeSelect");
  select.innerHTML = "";

  sortThemes([...themes])
    .forEach(theme => {
      const option = document.createElement("option");
      option.value = theme.id;
      option.textContent = theme.name;
      select.appendChild(option);
    });
}

function renderQuickThemes(themes) {
  const container = document.getElementById("quickThemes");
  container.innerHTML = "";

  sortThemes([...themes])
    .forEach(theme => {
      const div = document.createElement("div");

      div.style.textAlign = "center";
      div.style.width = "72px";
      div.style.marginRight = "4px";
      div.style.flexShrink = "0";
      div.style.cursor = "pointer";

      div.onclick = () => {
        document.getElementById("goThemesBtn").click();
        setTimeout(() => openTheme(theme.id), 100);
      };

      div.innerHTML = `
        ${theme.icon ? `<img src="${theme.icon}" style="
          width:58px;
          height:58px;
          border-radius:50%;
          object-fit:cover;
          border:2px solid #555;
          display:block;
          margin:0 auto 6px;
        ">` : ""}
        <div style="
          font-size:11px;
          line-height:1;
          overflow:hidden;
          text-overflow:ellipsis;
          white-space:nowrap;
        ">
          ${theme.name}
        </div>
      `;

      container.appendChild(div);
    });
}

function renderThemes(themes, stickers) {
  const container = document.getElementById("themes");
  container.innerHTML = "";

  sortThemes([...themes])
    .forEach(theme => {
      const count = stickers.filter(s => s.themeId === theme.id).length;

      const box = document.createElement("div");
      box.className = "theme";
      if (theme.pinned) box.classList.add("pinned-theme");

      box.innerHTML = `
        ${theme.pinned ? `<div style="color:#ffd54a;font-size:13px;margin-bottom:6px;">📌 Épinglé</div>` : ""}
        ${
          theme.icon
            ? `<img src="${theme.icon}"
                 style="
                   width:90px;
                   height:90px;
                   object-fit:cover;
                   border-radius:50%;
                   border:3px solid #555;
                   display:block;
                   margin:0 auto 12px;
                   background:#1a1a1a;
                 ">`
            : ""
        }

        <div style="
  font-size:18px;
  font-weight:bold;
  margin-top:8px;
">
  ${theme.name}
</div>

<div style="
  color:#aaa;
  font-size:13px;
  margin-top:4px;
">
  ${count} sticker(s)
</div>
      `;

      const openBtn = document.createElement("button");
      openBtn.textContent = "Ouvrir";
      openBtn.onclick = e => {
        e.stopPropagation();
        openTheme(theme.id);
      };

      const pinBtn = document.createElement("button");
      pinBtn.textContent = theme.pinned ? "Désépingler" : "Épingler";
      pinBtn.onclick = e => {
        e.stopPropagation();
        toggleThemePin(theme.id);
      };

      const editToggle = document.createElement("button");
      editToggle.className = "edit-toggle";
      editToggle.textContent = "Éditer ▾";
      editToggle.onclick = e => {
        e.stopPropagation();
        editPanel.classList.toggle("open");
        editToggle.textContent = editPanel.classList.contains("open") ? "Éditer ▴" : "Éditer ▾";
      };

      const editPanel = document.createElement("div");
      editPanel.className = "edit-panel";
      editPanel.onclick = e => e.stopPropagation();

      const iconBtn = document.createElement("button");
      iconBtn.textContent = "Changer l'icône";
      iconBtn.onclick = e => {
        e.stopPropagation();
        changeThemeIcon(theme.id);
      };

      const renameBtn = document.createElement("button");
      renameBtn.textContent = "Renommer";
      renameBtn.onclick = e => {
        e.stopPropagation();
        renameTheme(theme.id);
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = e => {
        e.stopPropagation();
        deleteTheme(theme.id);
      };

      editPanel.appendChild(iconBtn);
      editPanel.appendChild(renameBtn);
      editPanel.appendChild(deleteBtn);

      box.onclick = () => openTheme(theme.id);
      box.appendChild(openBtn);
      box.appendChild(pinBtn);
      box.appendChild(editToggle);
      box.appendChild(editPanel);

      container.appendChild(box);
    });
}

async function openTheme(themeId) {
  currentThemeId = themeId;

  const themes = await getAll("themes");
  const stickers = await getAll("stickers");

  const theme = themes.find(t => t.id === themeId);
  if (!theme) return;

  document.getElementById("stickersView").classList.remove("hidden");
  document.getElementById("themeTitle").textContent = theme.name;

  renderStickers(
    stickers.filter(s => s.themeId === themeId),
    document.getElementById("gallery")
  );
}

function getDefaultShortcuts() {
  return [];
}

function getUserShortcuts() {
  return JSON.parse(localStorage.getItem(SHORTCUTS_KEY) || "[]");
}

function saveUserShortcuts(shortcuts) {
  localStorage.setItem(SHORTCUTS_KEY, JSON.stringify(shortcuts));
}

function getAllShortcuts() {
  return [...getDefaultShortcuts(), ...getUserShortcuts()];
}

function getRecentStickers(stickers) {
  const ids = getRecentIds();

  return ids
    .map(id => stickers.find(s => s.id === id))
    .filter(Boolean);
}

function getShortcutStickers(shortcut, stickers) {
  if (shortcut.system === "favorites") {
    return stickers.filter(s => s.favorite);
  }

  if (shortcut.system === "recents") {
    return getRecentStickers(stickers);
  }

  const ids = shortcut.stickerIds || [];

  return ids
    .map(id => stickers.find(s => s.id === id))
    .filter(Boolean);
}

function renderShortcuts(stickers) {
  const container = document.getElementById("shortcutsGrid");
  if (!container) return;

  container.innerHTML = "";

  getAllShortcuts().forEach((shortcut, index) => {
    const shortcutStickers = getShortcutStickers(shortcut, stickers);

    const box = document.createElement("div");
    box.className = "shortcut-box";

    const head = document.createElement("div");
    head.className = "shortcut-head";

    const title = document.createElement("h3");
    title.className = "shortcut-title";

    const icon = document.createElement("span");
    icon.className = "shortcut-title-icon";

    if (shortcut.icon && typeof shortcut.icon === "string" && (shortcut.icon.startsWith("data:") || shortcut.icon.startsWith("http"))) {
      const img = document.createElement("img");
      img.src = shortcut.icon;
      img.alt = "";
      icon.appendChild(img);
    } else {
      icon.textContent = "▣";
    }

    const titleText = document.createElement("span");
    titleText.textContent = `${shortcut.name} (${shortcutStickers.length})`;

    title.appendChild(icon);
    title.appendChild(titleText);

    const key = document.createElement("span");
    key.className = "shortcut-key";
    key.textContent = `ALT + ${index + 1}`;

    head.appendChild(title);
    head.appendChild(key);

    const actions = document.createElement("div");
    actions.className = "shortcut-actions";

    const openBtn = document.createElement("button");
    openBtn.textContent = "Ouvrir";
    openBtn.onclick = () => openShortcut(shortcut.id);

    actions.appendChild(openBtn);

    if (!shortcut.locked) {
      const editWrap = document.createElement("div");
      editWrap.className = "shortcut-edit-wrap";

      const editBtn = document.createElement("button");
      editBtn.textContent = "Éditer ▾";
      editBtn.onclick = () => {
        editPanel.classList.toggle("open");
        editBtn.textContent = editPanel.classList.contains("open") ? "Éditer ▴" : "Éditer ▾";
      };

      const editPanel = document.createElement("div");
      editPanel.className = "shortcut-edit-panel";

      const renameBtn = document.createElement("button");
      renameBtn.textContent = "Renommer";
      renameBtn.onclick = () => {
        editPanel.classList.remove("open");
        renameShortcut(shortcut.id);
      };

      const iconBtn = document.createElement("button");
      iconBtn.textContent = "Changer l'icône";
      iconBtn.onclick = () => {
        editPanel.classList.remove("open");
        changeShortcutIcon(shortcut.id);
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = () => {
        editPanel.classList.remove("open");
        deleteShortcut(shortcut.id);
      };

      editPanel.appendChild(renameBtn);
      editPanel.appendChild(iconBtn);
      editPanel.appendChild(deleteBtn);

      editWrap.appendChild(editBtn);
      editWrap.appendChild(editPanel);
      actions.appendChild(editWrap);
    }

    const preview = document.createElement("div");
    preview.className = "shortcut-preview";

    if (!shortcutStickers.length) {
      const empty = document.createElement("div");
      empty.className = "empty-note";
      empty.textContent = shortcut.locked
        ? "Aucun sticker pour le moment."
        : "Ajoute des stickers depuis Éditer > Ajouter au raccourci.";
      preview.appendChild(empty);
    } else {
      renderStickers(shortcutStickers.slice(0, 4), preview);
    }

    box.appendChild(head);
    box.appendChild(actions);
    box.appendChild(preview);

    container.appendChild(box);
  });

  if (currentShortcutId) {
    renderShortcutPage(stickers);
  }
}

async function createShortcut() {
  const input = document.getElementById("shortcutNameInput");
  const iconFileInput = document.getElementById("shortcutIconFile");
  const iconUrlInput = document.getElementById("shortcutIconUrl");

  const name = input.value.trim();
  const iconUrl = iconUrlInput.value.trim();

  if (!name) return alert("Écris un nom de raccourci.");

  const shortcuts = getUserShortcuts();

  if (getAllShortcuts().some(s => s.name.toLowerCase() === name.toLowerCase())) {
    return alert("Ce raccourci existe déjà.");
  }

  let icon = "▣";

  if (iconFileInput.files[0]) {
    icon = await fileToDataURL(iconFileInput.files[0]);
  } else if (iconUrl) {
    icon = iconUrl;
  }

  shortcuts.push({
    id: crypto.randomUUID(),
    name,
    icon,
    type: "custom",
    stickerIds: []
  });

  saveUserShortcuts(shortcuts);
  input.value = "";
  iconFileInput.value = "";
  iconUrlInput.value = "";

  getAll("stickers").then(renderShortcuts);
}

function renameShortcut(id) {
  const shortcuts = getUserShortcuts();
  const shortcut = shortcuts.find(s => s.id === id);
  if (!shortcut) return;

  const newName = prompt("Nouveau nom du raccourci :", shortcut.name);
  if (newName === null || !newName.trim()) return;

  shortcut.name = newName.trim();
  saveUserShortcuts(shortcuts);

  getAll("stickers").then(renderShortcuts);
}

function changeShortcutIcon(id) {
  const mode = confirm("OK = choisir un fichier\nAnnuler = coller une URL");

  if (mode) {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";

    input.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;

      const shortcuts = getUserShortcuts();
      const shortcut = shortcuts.find(s => s.id === id);
      if (!shortcut) return;

      shortcut.icon = await fileToDataURL(file);
      saveUserShortcuts(shortcuts);
      await getAll("stickers").then(renderShortcuts);
    };

    input.click();
    return;
  }

  const choice = prompt("Colle l'URL de l'icône :");
  if (!choice || !choice.trim()) return;

  const shortcuts = getUserShortcuts();
  const shortcut = shortcuts.find(s => s.id === id);
  if (!shortcut) return;

  shortcut.icon = choice.trim();
  saveUserShortcuts(shortcuts);
  getAll("stickers").then(renderShortcuts);
}

function deleteShortcut(id) {
  if (!confirm("Supprimer ce raccourci personnel ? Les stickers ne seront pas supprimés.")) return;

  const shortcuts = getUserShortcuts().filter(s => s.id !== id);
  saveUserShortcuts(shortcuts);

  if (currentShortcutId === id) {
    closeShortcutPage();
  }

  getAll("stickers").then(renderShortcuts);
}

function openShortcut(id) {
  currentShortcutId = id;

  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("themesPage").classList.add("hidden");
  document.getElementById("shortcutPage").classList.remove("hidden");

  getAll("stickers").then(renderShortcutPage);
}

function closeShortcutPage() {
  currentShortcutId = null;

  document.getElementById("shortcutPage").classList.add("hidden");
  document.getElementById("themesPage").classList.add("hidden");
  document.getElementById("homePage").classList.remove("hidden");
}

function renderShortcutPage(stickers) {
  const shortcut = getAllShortcuts().find(s => s.id === currentShortcutId);
  if (!shortcut) return;

  document.getElementById("shortcutPageTitle").innerHTML =
    `${shortcut.icon && typeof shortcut.icon === "string" && (shortcut.icon.startsWith("data:") || shortcut.icon.startsWith("http"))
      ? `<img src="${shortcut.icon}" style="width:52px;height:52px;object-fit:cover;border-radius:10px;vertical-align:middle;margin-right:10px;">`
      : `<span style="margin-right:8px;">▣</span>`}${shortcut.name}`;

  renderStickers(
    getShortcutStickers(shortcut, stickers),
    document.getElementById("shortcutPageGallery")
  );
}

function addStickerToShortcut(stickerId, shortcutId) {
  if (shortcutId === "favorites") {
    toggleFavorite(stickerId);
    return;
  }

  if (shortcutId === "recents") {
    recordRecentSticker(stickerId);
    renderAll();
    return;
  }

  const shortcuts = getUserShortcuts();
  const shortcut = shortcuts.find(s => s.id === shortcutId);
  if (!shortcut) return;

  shortcut.stickerIds = shortcut.stickerIds || [];

  if (!shortcut.stickerIds.includes(stickerId)) {
    shortcut.stickerIds.push(stickerId);
  }

  saveUserShortcuts(shortcuts);
  renderAll();
}

function removeStickerFromShortcut(stickerId, shortcutId) {
  if (shortcutId === "favorites") {
    toggleFavorite(stickerId);
    return;
  }

  if (shortcutId === "recents") {
    const ids = getRecentIds().filter(id => id !== stickerId);
    saveRecentIds(ids);
    renderAll();
    return;
  }

  const shortcuts = getUserShortcuts();
  const shortcut = shortcuts.find(s => s.id === shortcutId);
  if (!shortcut) return;

  shortcut.stickerIds = (shortcut.stickerIds || []).filter(id => id !== stickerId);

  saveUserShortcuts(shortcuts);
  renderAll();
}


function renderStickers(stickers, container) {
  container.innerHTML = "";

  const search = document.getElementById("searchInput").value.toLowerCase();
  let renderedCount = 0;

  stickers
    .filter(s => {
      const tagsText = (s.tags || []).join(" ").toLowerCase();
      return s.name.toLowerCase().includes(search) || tagsText.includes(search);
    })
    .sort((a,b) => a.name.localeCompare(b.name, "fr"))
    .forEach(sticker => {
      let url;

      try {
        url = getStickerDisplayUrl(sticker);
      } catch (err) {
        console.error("Sticker impossible à afficher :", sticker, err);
        return;
      }

      if (!url) {
        console.warn("Sticker sans image :", sticker);
        return;
      }

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = url;
      img.title = "Cliquer pour agrandir";
      img.style.cursor = "zoom-in";
      img.onclick = () => openPreview(sticker.id);

      const title = document.createElement("div");
      title.innerHTML = `<strong>${sticker.name}</strong>`;

      const tags = document.createElement("div");
      tags.className = "sticker-tags";
      if (sticker.tags && sticker.tags.length) {
        sticker.tags.forEach(tag => {
          const span = document.createElement("span");
          span.className = "tag-tape";
          span.textContent = "#" + tag;
          tags.appendChild(span);
        });
      }

      const primaryActions = document.createElement("div");
      primaryActions.className = "primary-actions";

      const previewBtnMain = document.createElement("button");
      previewBtnMain.textContent = "Aperçu";
      previewBtnMain.onclick = () => openPreview(sticker.id);

      const copyBtnMain = document.createElement("button");
      copyBtnMain.textContent = "Copier URL";
      copyBtnMain.onclick = () => copyStickerUrl(sticker.id);

      primaryActions.appendChild(previewBtnMain);
      primaryActions.appendChild(copyBtnMain);

      const editToggle = document.createElement("button");
      editToggle.className = "edit-toggle";
      editToggle.textContent = "Éditer ▾";

      const editPanel = document.createElement("div");
      editPanel.className = "edit-panel";

      editToggle.onclick = () => {
        editPanel.classList.toggle("open");
        editToggle.textContent = editPanel.classList.contains("open") ? "Éditer ▴" : "Éditer ▾";
      };

      const shortcutRow = document.createElement("div");
      shortcutRow.className = "shortcut-select-row";

      const personalShortcuts = getAllShortcuts();

      if (personalShortcuts.length) {
        const shortcutSelect = document.createElement("select");

        personalShortcuts.forEach(shortcut => {
          const option = document.createElement("option");
          option.value = shortcut.id;
          option.textContent = shortcut.name;
          shortcutSelect.appendChild(option);
        });

        const addShortcutBtn = document.createElement("button");
        addShortcutBtn.textContent = "Ajouter au raccourci";
        addShortcutBtn.onclick = () => addStickerToShortcut(sticker.id, shortcutSelect.value);

        const removeShortcutBtn = document.createElement("button");
        removeShortcutBtn.textContent = "Retirer";
        removeShortcutBtn.onclick = () => removeStickerFromShortcut(sticker.id, shortcutSelect.value);

        shortcutRow.appendChild(shortcutSelect);
        shortcutRow.appendChild(addShortcutBtn);
        shortcutRow.appendChild(removeShortcutBtn);
      } else {
        const emptyShortcutNote = document.createElement("div");
        emptyShortcutNote.className = "empty-note";
        emptyShortcutNote.textContent = "Crée d'abord un raccourci personnel pour y ajouter ce sticker.";
        shortcutRow.appendChild(emptyShortcutNote);
      }

      const moveBtn = document.createElement("button");
      moveBtn.textContent = "Déplacer";
      moveBtn.onclick = () => moveSticker(sticker.id);

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = () => deleteSticker(sticker.id);

      const editTopActions = document.createElement("div");
      editTopActions.className = "edit-top-actions";
      editTopActions.appendChild(moveBtn);
      editTopActions.appendChild(deleteBtn);

      editPanel.appendChild(editTopActions);
      editPanel.appendChild(shortcutRow);

      card.appendChild(img);
      card.appendChild(title);
      card.appendChild(tags);
      card.appendChild(primaryActions);
      card.appendChild(editToggle);
      card.appendChild(editPanel);

      container.appendChild(card);
      renderedCount++;
    });

  if (!renderedCount && stickers.length) {
    const empty = document.createElement("div");
    empty.className = "empty-note";
    empty.textContent = "Aucun sticker affichable ici. Si tu as utilisé un fichier local, réessaie avec une URL d'image publique.";
    container.appendChild(empty);
  }
}

function getStickerDisplayUrl(sticker) {
  if (!sticker) return "";

  // Stickers ajoutés par URL
  if (sticker.type === "url" && sticker.url) {
    return sticker.url;
  }

  // Anciennes versions ou stickers avec URL sans type
  if (sticker.url) {
    return sticker.url;
  }

  // Stickers ajoutés par fichier local : Blob/File stocké dans IndexedDB
  if (sticker.file instanceof Blob) {
    return URL.createObjectURL(sticker.file);
  }

  // Sécurité pour anciennes versions qui auraient stocké une dataURL
  if (typeof sticker.file === "string") {
    return sticker.file;
  }

  // Sécurité supplémentaire si l'image a été stockée sous un autre nom
  if (sticker.dataUrl) {
    return sticker.dataUrl;
  }

  return "";
}

async function openPreview(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  let previewUrl;

  try {
    previewUrl = getStickerDisplayUrl(sticker);
  } catch (err) {
    console.error("Aperçu impossible :", sticker, err);
    alert("Impossible d'afficher ce sticker. L'image locale est peut-être cassée.");
    return;
  }

  if (!previewUrl) {
    alert("Impossible d'afficher ce sticker. L'image est manquante.");
    return;
  }

  document.getElementById("previewImage").src = previewUrl;
  document.getElementById("previewTitle").textContent = sticker.name;
  document.getElementById("previewTags").textContent = sticker.tags && sticker.tags.length
    ? sticker.tags.map(tag => "#" + tag).join(" ")
    : "";

  document.getElementById("previewModal").style.display = "flex";
}

function closePreview(event) {
  if (event && event.target.id !== "previewModal") return;
  document.getElementById("previewModal").style.display = "none";
}

async function copyStickerUrl(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  if (sticker.type !== "url") {
    alert("Ce sticker vient d'un fichier local. Pour Loult, ajoute-le plutôt via une URL publique.");
    return;
  }

  await navigator.clipboard.writeText(sticker.url);
  alert("URL copiée !");
}

async function prepareLoultPost(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  recordRecentSticker(id);

  if (sticker.type === "url") {
    await navigator.clipboard.writeText(sticker.url);
    alert("Préparé pour Loult : URL copiée. Plus tard, ce bouton pourra poster directement dans le chat.");
  } else {
    alert("Sticker marqué comme utilisé. Pour poster dans Loult, il faudra une URL publique ou une intégration serveur.");
  }

  renderAll();
}

async function useSticker(id) {
  recordRecentSticker(id);
  renderAll();
}

async function toggleFavorite(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  sticker.favorite = !sticker.favorite;
  await put("stickers", sticker);
  renderAll();
}

async function toggleThemePin(id) {
  const themes = await getAll("themes");
  const theme = themes.find(t => t.id === id);
  if (!theme) return;

  theme.pinned = !theme.pinned;
  await put("themes", theme);
  renderAll();
}

async function changeThemeIcon(id) {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;

    const themes = await getAll("themes");
    const theme = themes.find(t => t.id === id);
    if (!theme) return;

    theme.icon = await fileToDataURL(file);
    await put("themes", theme);
    renderAll();
  };
  input.click();
}

async function renameTheme(id) {
  const themes = await getAll("themes");
  const theme = themes.find(t => t.id === id);
  if (!theme) return;

  const newName = prompt("Nouveau nom du thème :", theme.name);
  if (newName === null || !newName.trim()) return;

  if (themes.some(t => t.id !== id && t.name.toLowerCase() === newName.toLowerCase())) {
    return alert("Ce nom existe déjà.");
  }

  theme.name = newName;
  await put("themes", theme);
  renderAll();
}

async function deleteTheme(id) {
  if (!confirm("Supprimer ce thème et tous ses stickers ?")) return;

  const stickers = await getAll("stickers");

  for (const sticker of stickers) {
    if (sticker.themeId === id) {
      await del("stickers", sticker.id);
    }
  }

  await del("themes", id);
  renderAll();
}

async function renameSticker(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  const newName = prompt("Nouveau nom du sticker :", sticker.name);
  if (newName === null || !newName.trim()) return;

  sticker.name = newName;
  await put("stickers", sticker);
  renderAll();
}

async function moveSticker(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  const themes = await getAll("themes");
  const themeOptions = sortThemes([...themes]).map(t => `${t.id}:${t.name}`).join("\n");
  const selected = prompt("Sélectionne le thème :\n" + themeOptions);
  
  if (!selected) return;

  const themeId = selected.split(":")[0];
  if (!themes.some(t => t.id === themeId)) return;

  sticker.themeId = themeId;
  await put("stickers", sticker);
  renderAll();
}

async function deleteSticker(id) {
  if (!confirm("Supprimer ce sticker ?")) return;

  await del("stickers", id);

  // Nettoyer aussi les derniers utilisés
  const recentIds = getRecentIds().filter(recentId => recentId !== id);
  saveRecentIds(recentIds);

  // Nettoyer aussi les raccourcis personnels
  const shortcuts = getUserShortcuts().map(shortcut => {
    shortcut.stickerIds = (shortcut.stickerIds || []).filter(stickerId => stickerId !== id);
    return shortcut;
  });
  saveUserShortcuts(shortcuts);

  // Fermer l'aperçu si le sticker supprimé était affiché
  document.getElementById("previewModal").style.display = "none";

  await renderAll();
}

document.getElementById("addThemeBtn").onclick = addTheme;
document.getElementById("addStickerBtn").onclick = addSticker;
document.getElementById("searchBtn").onclick = () => renderAll();
document.getElementById("createShortcutBtn").onclick = createShortcut;
document.getElementById("backShortcutHomeBtn").onclick = closeShortcutPage;

document.getElementById("goThemesBtn").onclick = () => {
  currentShortcutId = null;
  currentThemeId = null;
  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("shortcutPage").classList.add("hidden");
  document.getElementById("themesPage").classList.remove("hidden");
  document.getElementById("stickersView").classList.add("hidden");
};
document.getElementById("backHomeBtn").onclick = () => {
  currentShortcutId = null;
  currentThemeId = null;
  document.getElementById("homePage").classList.remove("hidden");
  document.getElementById("themesPage").classList.add("hidden");
  document.getElementById("shortcutPage").classList.add("hidden");
};
document.getElementById("backThemesBtn").onclick = () => {
  currentThemeId = null;
  document.getElementById("stickersView").classList.add("hidden");
};
document.getElementById("searchInput").addEventListener("keyup", () => renderAll());
</script>

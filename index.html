<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Loult Stickers Bank</title>
<style>
:root{
  color-scheme:dark;
  --bg:#0d0d0d;
  --text:#ffffff;
  --muted:#b8b0c4;
  --panel:rgba(18,10,30,.74);
  --panel-border:rgba(255,255,255,.22);
  --purple:#9b6cff;
  --pink:#ff5bbd;
  --forge-red:#ff5264;
  --forge-orange:#ff8a35;
  --gold:#ffd84a;
  --blue:#285bd8;
}

*{box-sizing:border-box}

body{
  margin:0;
  padding:20px;
  color:var(--text);
  font-family:Arial,sans-serif;
  background:var(--bg);
  position:relative;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:url("https://i.imgur.com/EHcEQ61.png");
  background-size:700px;
  background-repeat:repeat;
  background-position:center top;
  opacity:.50;
  pointer-events:none;
  z-index:-2;
  filter:saturate(1.25) contrast(1.1);
}

h1{text-align:center}

h2,h3{margin-top:0}

.section{
  position:relative;
  overflow:hidden;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:12px;
  padding:18px;
  margin-bottom:20px;
  backdrop-filter:blur(1.4px) saturate(1.2);
  box-shadow:
    inset 0 0 42px rgba(255,255,255,.035),
    inset 0 0 80px rgba(0,0,0,.28),
    0 0 24px rgba(130,80,255,.16);
}

.sub-section{
  margin-top:20px;
  padding:20px 0 0 0;
  border-top:2px solid rgba(255,150,85,.62);
  border-radius:0;
  background:transparent;
  box-shadow:0 -1px 0 rgba(255,55,45,.22);
}

input,select,button{
  padding:10px;
  margin:5px;
  border-radius:6px;
}

input,select{
  color:white;
  background:rgba(8,8,14,.92);
  border:1px solid rgba(255,255,255,.24);
  box-shadow:inset 0 0 12px rgba(0,0,0,.55);
}

button{
  cursor:pointer;
  color:white;
  background:#333;
  border:1px solid #777;
}

button:hover{background:#555}

.big-btn{
  font-size:20px;
  padding:16px 30px;
}

.hidden{display:none!important}

.stats-astral{
  position:relative;
  overflow:hidden;
  text-align:center;
  margin:0 auto 22px auto;
  padding:10px 16px;
  max-width:640px;
  border-radius:18px;
  font-weight:bold;
  letter-spacing:.8px;
  color:#fff;
  background:
    radial-gradient(circle at 18% 35%, rgba(70,0,95,.30), transparent 30%),
    radial-gradient(circle at 78% 45%, rgba(150,0,80,.20), transparent 28%),
    linear-gradient(135deg,#07070a,#120018 55%,#07070a);
  border:1px solid rgba(120,80,180,.18);
  box-shadow:inset 0 0 18px rgba(0,0,0,.95), inset 0 0 14px rgba(110,0,170,.20), 0 0 6px rgba(90,0,140,.14);
  text-shadow:0 0 5px rgba(255,255,255,.85), 0 0 10px rgba(170,70,255,.55);
}

#stats{
  position:relative;
  z-index:10;
  font-size:18px;
  font-weight:bold;
  white-space:nowrap;
}

.stars-soft{
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}

.stars-soft::before,
.stars-soft::after{
  content:"";
  position:absolute;
  inset:0;
  opacity:1;
}

.stars-soft::before{
  background:
    radial-gradient(circle at 5% 18%, rgba(255,255,255,.55) 0 .7px, transparent 2px),
    radial-gradient(circle at 13% 68%, rgba(185,210,255,.42) 0 .8px, transparent 2px),
    radial-gradient(circle at 22% 38%, rgba(255,255,255,.62) 0 1px, transparent 2.4px),
    radial-gradient(circle at 34% 82%, rgba(210,180,255,.50) 0 .9px, transparent 2.3px),
    radial-gradient(circle at 45% 26%, rgba(255,255,255,.70) 0 1.1px, transparent 2.8px),
    radial-gradient(circle at 57% 58%, rgba(180,140,255,.48) 0 .9px, transparent 2.4px),
    radial-gradient(circle at 69% 32%, rgba(255,255,255,.55) 0 .7px, transparent 2px),
    radial-gradient(circle at 81% 74%, rgba(210,220,255,.48) 0 1px, transparent 2.6px),
    radial-gradient(circle at 93% 20%, rgba(255,210,255,.43) 0 .8px, transparent 2px);
  animation:nearStarsPulse 6s ease-in-out infinite alternate;
}

.stars-soft::after{
  inset:-10px;
  background:
    radial-gradient(circle at 10% 44%, rgba(255,255,255,.30) 0 .6px, transparent 2px),
    radial-gradient(circle at 24% 14%, rgba(170,130,255,.34) 0 .7px, transparent 2px),
    radial-gradient(circle at 38% 64%, rgba(255,255,255,.36) 0 .7px, transparent 2px),
    radial-gradient(circle at 52% 86%, rgba(200,180,255,.28) 0 .6px, transparent 2px),
    radial-gradient(circle at 70% 18%, rgba(210,230,255,.35) 0 .7px, transparent 2px),
    radial-gradient(circle at 86% 54%, rgba(255,255,255,.42) 0 .8px, transparent 2.2px),
    radial-gradient(circle at 96% 82%, rgba(190,160,255,.30) 0 .7px, transparent 2px);
  animation:farStarsDrift 13s ease-in-out infinite alternate;
}

.shooting-star{
  position:absolute;
  width:128px;
  height:1px;
  border-radius:999px;
  background:linear-gradient(90deg, rgba(255,255,255,0), rgba(130,145,255,.18), rgba(210,225,255,.75), rgba(245,248,255,.95));
  box-shadow:0 0 3px rgba(230,235,255,.75), 0 0 9px rgba(110,120,255,.45);
  opacity:0;
  z-index:4;
  transform-origin:right center;
  animation:naturalShootingStarA 8.5s ease-in-out infinite;
}

.shooting-star::after{
  content:"";
  position:absolute;
  right:0;
  top:50%;
  width:4px;
  height:4px;
  transform:translateY(-50%);
  border-radius:50%;
  background:rgba(240,245,255,.95);
  box-shadow:0 0 7px rgba(240,245,255,.9), 0 0 14px rgba(110,120,255,.65);
}

.shooting-star.s2{
  width:98px;
  animation:naturalShootingStarB 12s ease-in-out infinite;
  animation-delay:4.5s;
}

.shooting-star.s3{
  width:76px;
  animation:naturalShootingStarC 15s ease-in-out infinite;
  animation-delay:8s;
}

@keyframes nearStarsPulse{
  0%{opacity:.42;transform:scale(1) translate(0,0);filter:blur(0)}
  50%{opacity:.9;transform:scale(1.025) translate(1px,1px);filter:blur(.1px)}
  100%{opacity:.62;transform:scale(1.045) translate(-1px,-1px);filter:blur(.25px)}
}

@keyframes farStarsDrift{
  0%{opacity:.32;transform:translate(-2px,2px) scale(1)}
  100%{opacity:.68;transform:translate(4px,-3px) scale(1.04)}
}

@keyframes naturalShootingStarA{
  0%,58%{opacity:0;transform:translate(72px,-22px) rotate(43deg)}
  62%,76%{opacity:.85}
  76%{transform:translate(368px,94px) rotate(43deg)}
  86%,100%{opacity:0;transform:translate(438px,122px) rotate(43deg)}
}

@keyframes naturalShootingStarB{
  0%,50%{opacity:0;transform:translate(420px,-12px) rotate(48deg)}
  55%,68%{opacity:.65}
  68%{transform:translate(592px,72px) rotate(48deg)}
  80%,100%{opacity:0;transform:translate(642px,98px) rotate(48deg)}
}

@keyframes naturalShootingStarC{
  0%,62%{opacity:0;transform:translate(205px,-16px) rotate(40deg)}
  67%,76%{opacity:.48}
  76%{transform:translate(330px,46px) rotate(40deg)}
  86%,100%{opacity:0;transform:translate(368px,64px) rotate(40deg)}
}

.forge-panel{
  min-height:330px;
  background:
    radial-gradient(circle at 75% 26%, rgba(255,210,70,.24), transparent 22%),
    radial-gradient(circle at 38% 90%, rgba(255,100,35,.26), transparent 32%),
    radial-gradient(circle at 16% 18%, rgba(255,30,75,.30), transparent 36%),
    radial-gradient(circle at 88% 84%, rgba(255,135,35,.24), transparent 34%),
    linear-gradient(135deg,rgba(90,16,28,.82),rgba(32,10,22,.78) 48%,rgba(118,24,18,.82));
  border-color:rgba(255,112,86,.54);
  box-shadow:
    inset 0 0 34px rgba(255,80,35,.20),
    inset 0 0 100px rgba(0,0,0,.30),
    0 0 26px rgba(255,40,70,.26);
}

.forge-panel::before,
.forge-panel::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.forge-panel::before{
  background:
    radial-gradient(ellipse 180px 42px at 10% 2%, rgba(255,122,40,.30) 0 22%, transparent 66%),
    radial-gradient(ellipse 220px 50px at 42% 0%, rgba(255,60,62,.26) 0 20%, transparent 64%),
    radial-gradient(ellipse 240px 48px at 82% 2%, rgba(255,160,54,.28) 0 20%, transparent 66%),
    radial-gradient(ellipse 180px 42px at 4% 100%, rgba(255,54,42,.22) 0 22%, transparent 68%),
    radial-gradient(ellipse 260px 54px at 72% 100%, rgba(255,132,36,.22) 0 22%, transparent 68%),
    linear-gradient(117deg, transparent 0 12%, rgba(255,196,70,.08) 18%, rgba(255,70,45,.12) 24%, transparent 34%),
    linear-gradient(61deg, transparent 0 48%, rgba(255,88,32,.12) 56%, rgba(255,212,92,.08) 63%, transparent 74%);
  opacity:.86;
}

.forge-panel::after{
  background:
    radial-gradient(circle at 9% 24%, rgba(255,236,152,.70) 0 1px, transparent 2.8px),
    radial-gradient(circle at 15% 72%, rgba(255,136,58,.60) 0 1.2px, transparent 3px),
    radial-gradient(circle at 23% 38%, rgba(255,228,118,.72) 0 1px, transparent 2.7px),
    radial-gradient(circle at 31% 83%, rgba(255,100,55,.54) 0 1.4px, transparent 3px),
    radial-gradient(circle at 46% 20%, rgba(255,232,126,.72) 0 1.1px, transparent 2.8px),
    radial-gradient(circle at 56% 72%, rgba(255,124,50,.58) 0 1.3px, transparent 3px),
    radial-gradient(circle at 67% 34%, rgba(255,236,160,.76) 0 1px, transparent 2.8px),
    radial-gradient(circle at 78% 78%, rgba(255,106,45,.60) 0 1.4px, transparent 3px),
    radial-gradient(circle at 90% 24%, rgba(255,232,126,.72) 0 1.2px, transparent 3px),
    radial-gradient(circle at 95% 64%, rgba(255,126,55,.58) 0 1.2px, transparent 3px);
  opacity:.84;
  animation:forgeSparkField 4.8s ease-in-out infinite alternate;
}

.forge-panel input,
.forge-panel select{
  background:rgba(12,6,8,.82);
  border:1px solid rgba(255,70,90,.32);
  box-shadow:inset 0 0 12px rgba(0,0,0,.62), 0 0 8px rgba(255,30,60,.10);
}

.forge-panel button{
  background:linear-gradient(135deg,rgba(78,16,24,.96),rgba(135,26,38,.90));
  border:1px solid rgba(255,80,95,.42);
  box-shadow:inset 0 0 10px rgba(255,45,70,.14), 0 0 10px rgba(255,25,60,.16);
}

.forge-panel button:hover{background:linear-gradient(135deg,rgba(105,20,32,.98),rgba(185,35,52,.94))}

.forge-panel h2,
.forge-panel h3{
  position:relative;
  z-index:2;
  text-shadow:0 0 8px rgba(255,70,90,.65), 0 0 20px rgba(255,0,70,.32);
}

.forge-create-row,
.file-url-row{
  display:flex;
  align-items:flex-end;
  gap:12px;
  flex-wrap:wrap;
  position:relative;
  z-index:2;
}

.field-stack{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.field-stack label{
  color:#ddd;
  font-size:13px;
  margin-left:6px;
}

.field-stack input{margin-top:0}
.url-field{min-width:240px}

.icon-choice-group,
.media-choice-group{
  display:flex;
  align-items:flex-end;
  gap:0;
  position:relative;
}

.icon-choice-group .field-stack,
.media-choice-group .field-stack{min-width:210px}

.choice-connector{
  position:relative;
  align-self:flex-end;
  margin:0 12px 15px 12px;
  padding:5px 11px;
  border-radius:999px;
  color:#ff8b9a;
  font-size:12px;
  font-weight:bold;
  letter-spacing:1px;
  background:rgba(35,8,12,.92);
  border:1px solid rgba(255,90,110,.42);
  box-shadow:0 0 12px rgba(255,45,75,.30), inset 0 0 8px rgba(255,60,90,.12);
  text-shadow:0 0 8px rgba(255,80,100,.75);
}

.choice-connector::before,
.choice-connector::after{
  content:"";
  position:absolute;
  top:50%;
  width:30px;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,80,100,.85),transparent);
}

.choice-connector::before{right:100%}
.choice-connector::after{left:100%}

.forge-brand{
  position:absolute;
  left:76%;
  top:31%;
  transform:translate(-50%,-50%) rotate(-5deg);
  width:min(520px,42vw);
  height:210px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:1;
  opacity:.90;
  filter:
    drop-shadow(0 0 18px rgba(255,80,45,.75))
    drop-shadow(0 0 28px rgba(255,210,80,.32));
}

.forge-icon{
  width:230px;
  height:112px;
  margin:0 auto -2px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0;
  line-height:1;
  color:transparent;
  text-shadow:none;
}

.anvil-shape{
  position:relative;
  display:block;
  width:220px;
  height:112px;
  background:
    linear-gradient(180deg,#d93b45,#73101e) 86px 58px/52px 30px no-repeat,
    linear-gradient(180deg,#ff6a53,#7d1022) 48px 84px/132px 22px no-repeat;
  transform:scale(.9);
  filter:
    drop-shadow(0 0 18px rgba(255,55,55,.58))
    drop-shadow(0 0 12px rgba(255,220,92,.24))
    drop-shadow(0 6px 0 rgba(60,0,12,.24));
}

.anvil-shape::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:220px;
  height:82px;
  border-radius:12px;
  background:linear-gradient(180deg,#ff8a58 0%,#f04a54 42%,#8c1325 100%);
  clip-path:polygon(0 27%,58% 27%,70% 0,100% 0,88% 40%,73% 58%,30% 58%,24% 82%,0 82%);
  box-shadow:inset 0 9px 16px rgba(255,255,255,.20), inset 0 -12px 18px rgba(60,0,12,.44);
}

.anvil-shape::after{
  content:"";
  position:absolute;
  left:62px;
  top:103px;
  width:104px;
  height:9px;
  border-radius:999px;
  background:rgba(255,104,82,.62);
  box-shadow:0 0 14px rgba(255,55,55,.35);
}

.forge-title-logo{
  margin-top:-2px;
  font-family:'Arial Black','Trebuchet MS',Impact,sans-serif;
  font-size:68px;
  font-weight:900;
  letter-spacing:.5px;
  color:var(--gold);
  -webkit-text-stroke:3px var(--blue);
  text-shadow:
    5px 5px 0 #173483,
    0 0 14px rgba(255,225,85,.78),
    0 0 28px rgba(255,65,60,.55);
  transform:skew(-7deg);
}

.forge-flame-layer,
.forge-side-flames{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.forge-flame-layer{
  opacity:.72;
  background:
    radial-gradient(ellipse 72px 190px at 5% 108%, rgba(255,64,20,.42) 0 22%, rgba(255,150,36,.18) 36%, transparent 64%),
    radial-gradient(ellipse 92px 235px at 18% 112%, rgba(255,168,42,.30) 0 25%, rgba(255,40,45,.18) 42%, transparent 68%),
    radial-gradient(ellipse 78px 205px at 31% 107%, rgba(255,45,60,.36) 0 23%, rgba(255,122,35,.18) 43%, transparent 66%),
    radial-gradient(ellipse 106px 250px at 46% 113%, rgba(255,134,30,.30) 0 26%, rgba(255,35,55,.17) 43%, transparent 70%),
    radial-gradient(ellipse 82px 218px at 61% 108%, rgba(255,48,65,.34) 0 24%, rgba(255,145,35,.18) 42%, transparent 68%),
    radial-gradient(ellipse 100px 238px at 78% 111%, rgba(255,150,45,.28) 0 25%, rgba(255,50,45,.16) 45%, transparent 70%),
    radial-gradient(ellipse 74px 194px at 95% 107%, rgba(255,65,25,.36) 0 22%, rgba(255,138,30,.17) 38%, transparent 64%),
    linear-gradient(118deg, transparent 0 12%, rgba(255,55,38,.16) 18%, rgba(255,190,65,.11) 24%, transparent 34%),
    linear-gradient(62deg, transparent 0 28%, rgba(255,36,76,.15) 36%, rgba(255,145,30,.11) 43%, transparent 55%),
    linear-gradient(130deg, transparent 0 54%, rgba(255,90,30,.16) 63%, rgba(255,30,65,.11) 70%, transparent 83%);
  animation:forgeCleanFlames 6.5s ease-in-out infinite alternate;
}

.forge-flame-layer::before,
.forge-flame-layer::after{
  content:"";
  position:absolute;
  display:block;
  pointer-events:none;
}

.forge-flame-layer::before{
  left:-5%;
  right:-5%;
  bottom:-22px;
  height:135px;
  background:
    conic-gradient(from 220deg at 8% 100%, transparent 0 68deg, rgba(255,74,26,.24) 72deg 94deg, transparent 100deg 360deg),
    conic-gradient(from 220deg at 24% 100%, transparent 0 70deg, rgba(255,146,35,.18) 74deg 98deg, transparent 104deg 360deg),
    conic-gradient(from 220deg at 43% 100%, transparent 0 70deg, rgba(255,48,62,.20) 74deg 98deg, transparent 104deg 360deg),
    conic-gradient(from 220deg at 62% 100%, transparent 0 70deg, rgba(255,124,35,.17) 74deg 98deg, transparent 104deg 360deg),
    conic-gradient(from 220deg at 82% 100%, transparent 0 68deg, rgba(255,54,36,.22) 72deg 96deg, transparent 102deg 360deg);
  filter:blur(.35px);
}

.forge-flame-layer::after{
  inset:0;
  background:
    radial-gradient(circle at 12% 22%, rgba(255,226,118,.55) 0 1px, transparent 2.4px),
    radial-gradient(circle at 24% 58%, rgba(255,132,55,.42) 0 1.2px, transparent 2.8px),
    radial-gradient(circle at 35% 18%, rgba(255,238,160,.45) 0 .9px, transparent 2.4px),
    radial-gradient(circle at 48% 68%, rgba(255,116,54,.36) 0 1.3px, transparent 3px),
    radial-gradient(circle at 59% 30%, rgba(255,232,126,.48) 0 1px, transparent 2.5px),
    radial-gradient(circle at 72% 62%, rgba(255,128,48,.38) 0 1.2px, transparent 2.8px),
    radial-gradient(circle at 84% 24%, rgba(255,226,118,.46) 0 1px, transparent 2.5px),
    radial-gradient(circle at 92% 72%, rgba(255,115,50,.36) 0 1.3px, transparent 3px);
  opacity:.75;
  animation:forgeCleanSparks 5.2s ease-in-out infinite alternate;
}

.forge-side-flames{
  opacity:.48;
  background:
    radial-gradient(ellipse 130px 55px at -2% 30%, rgba(255,55,35,.20) 0 20%, transparent 62%),
    radial-gradient(ellipse 160px 60px at 103% 34%, rgba(255,45,75,.18) 0 21%, transparent 63%),
    radial-gradient(ellipse 190px 45px at 10% 4%, rgba(255,120,45,.10) 0 20%, transparent 62%),
    radial-gradient(ellipse 230px 50px at 86% 98%, rgba(255,90,30,.12) 0 22%, transparent 65%),
    radial-gradient(circle at 18% 78%, rgba(255,214,94,.30) 0 1.2px, transparent 3px),
    radial-gradient(circle at 78% 15%, rgba(255,196,80,.28) 0 1.2px, transparent 3px);
  animation:forgeCleanDrift 8s ease-in-out infinite alternate;
}

@keyframes forgeCleanFlames{
  0%{opacity:.28;transform:translateY(8px) scaleY(.96) translateX(-6px)}
  50%{opacity:.43;transform:translateY(-2px) scaleY(1.03) translateX(4px)}
  100%{opacity:.34;transform:translateY(-8px) scaleY(1.08) translateX(8px)}
}

@keyframes forgeCleanSparks{
  from{opacity:.46;transform:translateY(8px) translateX(-6px)}
  to{opacity:.82;transform:translateY(-10px) translateX(8px)}
}

@keyframes forgeCleanDrift{
  from{opacity:.18;transform:translateX(-12px) translateY(3px)}
  to{opacity:.30;transform:translateX(12px) translateY(-5px)}
}

@keyframes forgeSparkField{
  from{opacity:.54;transform:translateY(8px) translateX(-8px)}
  to{opacity:.92;transform:translateY(-10px) translateX(10px)}
}

.forge-panel > *:not(.forge-brand):not(.forge-flame-layer):not(.forge-side-flames),
.astral-search-panel > *,
.astral-shortcuts-panel > *{
  position:relative;
  z-index:2;
}

.astral-search-panel{
  background:
    radial-gradient(circle at 14% 28%, rgba(125,70,255,.32), transparent 32%),
    radial-gradient(circle at 82% 35%, rgba(255,50,170,.22), transparent 32%),
    radial-gradient(circle at 46% 100%, rgba(40,210,255,.16), transparent 38%),
    linear-gradient(135deg,rgba(18,14,54,.80),rgba(44,12,72,.78) 55%,rgba(8,34,58,.80));
  border-color:rgba(185,110,255,.46);
  box-shadow:
    inset 0 0 38px rgba(125,70,255,.22),
    inset 0 0 90px rgba(0,0,0,.26),
    0 0 26px rgba(130,80,255,.28);
}

.astral-search-panel::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 18% 76%, rgba(255,255,255,.20) 0 1px, transparent 2px),
    radial-gradient(circle at 36% 22%, rgba(210,180,255,.25) 0 1px, transparent 2px),
    radial-gradient(circle at 62% 70%, rgba(255,210,255,.22) 0 1.2px, transparent 2.5px),
    radial-gradient(circle at 88% 50%, rgba(255,255,255,.18) 0 .8px, transparent 2px);
  opacity:.75;
  pointer-events:none;
  animation:panelStarsPulse 5s ease-in-out infinite alternate;
}

.astral-search-panel h2{text-shadow:0 0 8px rgba(190,140,255,.75),0 0 22px rgba(130,70,255,.45)}
.astral-search-panel input{border-color:rgba(180,120,255,.30);box-shadow:inset 0 0 14px rgba(0,0,0,.60),0 0 12px rgba(130,80,255,.12)}

.search-row{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.search{
  width:60%;
  max-width:450px;
}

.quick-themes{
  display:flex;
  align-items:center;
  gap:18px;
  overflow-x:auto;
  white-space:nowrap;
  padding:8px 14px;
  flex:1;
  min-width:0;
  border-radius:18px;

<script>
let db;
const RECENT_KEY = "loult_recent_stickers_v1";
const SHORTCUTS_KEY = "loult_personal_shortcuts_v1";
let currentShortcutId = null;
let currentThemeId = null;

const request = indexedDB.open("LoultStickersDB", 5);

request.onupgradeneeded = e => {
  db = e.target.result;

  if (!db.objectStoreNames.contains("themes")) {
    db.createObjectStore("themes", { keyPath: "id" });
  }

  if (!db.objectStoreNames.contains("stickers")) {
    db.createObjectStore("stickers", { keyPath: "id" });
  }
};

request.onsuccess = e => {
  db = e.target.result;
  renderAll();
};

function tx(store, mode = "readonly") {
  return db.transaction(store, mode).objectStore(store);
}

function getAll(store) {
  return new Promise(resolve => {
    const req = tx(store).getAll();
    req.onsuccess = () => resolve(req.result);
  });
}

function put(store, value) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").put(value);
    req.onsuccess = () => resolve();
  });
}

function del(store, id) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").delete(id);
    req.onsuccess = () => resolve();
  });
}

function fileToDataURL(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

function sortThemes(themes) {
  return themes.sort((a,b) => {
    if (!!b.pinned !== !!a.pinned) return (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
    return a.name.localeCompare(b.name, "fr");
  });
}

function getRecentIds() {
  return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
}

function saveRecentIds(ids) {
  localStorage.setItem(RECENT_KEY, JSON.stringify(ids));
}

function recordRecentSticker(id) {
  let ids = getRecentIds().filter(existingId => existingId !== id);
  ids.unshift(id);
  ids = ids.slice(0, 12);
  saveRecentIds(ids);
}

async function addTheme() {
  const input = document.getElementById("themeName");
  const iconInput = document.getElementById("themeIcon");
  const iconUrlInput = document.getElementById("themeIconUrl");

  const name = input.value.trim();
  const iconUrl = iconUrlInput.value.trim();

  if (!name) return alert("Écris un nom de thème.");

  if (!iconInput.files[0] && !iconUrl) {
    return alert("Ajoute une icône / illustration pour ce thème, soit par fichier soit par URL.");
  }

  const themes = await getAll("themes");

  if (themes.some(t => t.name.toLowerCase() === name.toLowerCase())) {
    return alert("Ce thème existe déjà.");
  }

  let icon = null;

  if (iconInput.files[0]) {
    icon = await fileToDataURL(iconInput.files[0]);
  } else {
    icon = iconUrl;
  }

  await put("themes", {
    id: crypto.randomUUID(),
    name,
    icon,
    pinned: false
  });

  input.value = "";
  iconInput.value = "";
  iconUrlInput.value = "";

  renderAll();
}

async function addSticker() {
  const file = document.getElementById("stickerFile").files[0];
  const url = document.getElementById("stickerUrl").value.trim();
  const name = document.getElementById("stickerName").value.trim();
  const tags = document.getElementById("stickerTags").value
    .split(",")
    .map(tag => tag.trim())
    .filter(Boolean);
  const themeId = document.getElementById("themeSelect").value;

  if (!file && !url) return alert("Ajoute un sticker, soit par fichier soit par URL.");
  if (!name) return alert("Donne un nom au sticker.");
  if (!themeId) return alert("Choisis un thème.");

  let stickerData = {
    id: crypto.randomUUID(),
    name,
    themeId,
    favorite: false,
    tags
  };

  if (file) {
    stickerData.file = file;
    stickerData.type = "file";
  } else {
    stickerData.url = url;
    stickerData.type = "url";
  }

  await put("stickers", stickerData);

  document.getElementById("stickerFile").value = "";
  document.getElementById("stickerUrl").value = "";
  document.getElementById("stickerName").value = "";
  document.getElementById("stickerTags").value = "";

  renderAll();
}

async function renderAll() {
  const themes = await getAll("themes");
  const stickers = await getAll("stickers");

  renderStats(themes, stickers);
  renderThemeSelect(themes);
  renderQuickThemes(themes);
  renderThemes(themes, stickers);
  renderShortcuts(stickers);

  if (currentThemeId) {
    const currentTheme = themes.find(t => t.id === currentThemeId);

    if (currentTheme) {
      document.getElementById("stickersView").classList.remove("hidden");
      document.getElementById("themeTitle").textContent = currentTheme.name;

      renderStickers(
        stickers.filter(s => s.themeId === currentThemeId),
        document.getElementById("gallery")
      );
    } else {
      currentThemeId = null;
      document.getElementById("stickersView").classList.add("hidden");
    }
  }
}

async function openTheme(themeId) {
  currentThemeId = themeId;

  const themes = await getAll("themes");
  const stickers = await getAll("stickers");

  const theme = themes.find(t => t.id === themeId);
  if (!theme) return;

  document.getElementById("stickersView").classList.remove("hidden");
  document.getElementById("themeTitle").textContent = theme.name;

  renderStickers(
    stickers.filter(s => s.themeId === themeId),
    document.getElementById("gallery")
  );
}

function getDefaultShortcuts() {
  return [];
}

function getUserShortcuts() {
  return JSON.parse(localStorage.getItem(SHORTCUTS_KEY) || "[]");
}

function saveUserShortcuts(shortcuts) {
  localStorage.setItem(SHORTCUTS_KEY, JSON.stringify(shortcuts));
}

function getAllShortcuts() {
  return [...getDefaultShortcuts(), ...getUserShortcuts()];
}

function getRecentStickers(stickers) {
  const ids = getRecentIds();

  return ids
    .map(id => stickers.find(s => s.id === id))
    .filter(Boolean);
}

function getShortcutStickers(shortcut, stickers) {
  if (shortcut.system === "favorites") {
    return stickers.filter(s => s.favorite);
  }

  if (shortcut.system === "recents") {
    return getRecentStickers(stickers);
  }

  const ids = shortcut.stickerIds || [];

  return ids
    .map(id => stickers.find(s => s.id === id))
    .filter(Boolean);
}

function renderShortcuts(stickers) {
  const container = document.getElementById("shortcutsGrid");
  if (!container) return;

  container.innerHTML = "";

  getAllShortcuts().forEach((shortcut, index) => {
    const shortcutStickers = getShortcutStickers(shortcut, stickers);

    const box = document.createElement("div");
    box.className = "shortcut-box";

    const head = document.createElement("div");
    head.className = "shortcut-head";

    const title = document.createElement("h3");
    title.className = "shortcut-title";

    const icon = document.createElement("span");
    icon.className = "shortcut-title-icon";

    if (shortcut.icon && typeof shortcut.icon === "string" && (shortcut.icon.startsWith("data:") || shortcut.icon.startsWith("http"))) {
      const img = document.createElement("img");
      img.src = shortcut.icon;
      img.alt = "";
      icon.appendChild(img);
    } else {
      icon.textContent = "▣";
    }

    const titleText = document.createElement("span");
    titleText.textContent = `${shortcut.name} (${shortcutStickers.length})`;

    title.appendChild(icon);
    title.appendChild(titleText);

    const key = document.createElement("span");
    key.className = "shortcut-key";
    key.textContent = `ALT + ${index + 1}`;

    head.appendChild(title);
    head.appendChild(key);

    const actions = document.createElement("div");
    actions.className = "shortcut-actions";

    const openBtn = document.createElement("button");
    openBtn.textContent = "Ouvrir";
    openBtn.onclick = () => openShortcut(shortcut.id);

    actions.appendChild(openBtn);

    if (!shortcut.locked) {
      const editWrap = document.createElement("div");
      editWrap.className = "shortcut-edit-wrap";

      const editBtn = document.createElement("button");
      editBtn.textContent = "Éditer ▾";
      editBtn.onclick = () => {
        editPanel.classList.toggle("open");
        editBtn.textContent = editPanel.classList.contains("open") ? "Éditer ▴" : "Éditer ▾";
      };

      const editPanel = document.createElement("div");
      editPanel.className = "shortcut-edit-panel";

      const renameBtn = document.createElement("button");
      renameBtn.textContent = "Renommer";
      renameBtn.onclick = () => {
        editPanel.classList.remove("open");
        renameShortcut(shortcut.id);
      };

      const iconBtn = document.createElement("button");
      iconBtn.textContent = "Changer l'icône";
      iconBtn.onclick = () => {
        editPanel.classList.remove("open");
        changeShortcutIcon(shortcut.id);
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = () => {
        editPanel.classList.remove("open");
        deleteShortcut(shortcut.id);
      };

      editPanel.appendChild(renameBtn);
      editPanel.appendChild(iconBtn);
      editPanel.appendChild(deleteBtn);

      editWrap.appendChild(editBtn);
      editWrap.appendChild(editPanel);
      actions.appendChild(editWrap);
    }

    const preview = document.createElement("div");
    preview.className = "shortcut-preview";

    if (!shortcutStickers.length) {
      const empty = document.createElement("div");
      empty.className = "empty-note";
      empty.textContent = shortcut.locked
        ? "Aucun sticker pour le moment."
        : "Ajoute des stickers depuis Éditer > Ajouter au raccourci.";
      preview.appendChild(empty);
    } else {
      renderStickers(shortcutStickers.slice(0, 4), preview);
    }

    box.appendChild(head);
    box.appendChild(actions);
    box.appendChild(preview);

    container.appendChild(box);
  });

  if (currentShortcutId) {
    renderShortcutPage(stickers);
  }

async function createShortcut() {
  const input = document.getElementById("shortcutNameInput");
  const iconFileInput = document.getElementById("shortcutIconFile");
  const iconUrlInput = document.getElementById("shortcutIconUrl");

  const name = input.value.trim();
  const iconUrl = iconUrlInput.value.trim();

  if (!name) return alert("Écris un nom de raccourci.");

  const shortcuts = getUserShortcuts();

  if (getAllShortcuts().some(s => s.name.toLowerCase() === name.toLowerCase())) {
    return alert("Ce raccourci existe déjà.");
  }

  let icon = "▣";

  if (iconFileInput.files[0]) {
    icon = await fileToDataURL(iconFileInput.files[0]);
  } else if (iconUrl) {
    icon = iconUrl;
  }

  shortcuts.push({
    id: crypto.randomUUID(),
    name,
    icon,
    type: "custom",
    stickerIds: []
  });

  saveUserShortcuts(shortcuts);
  input.value = "";
  iconFileInput.value = "";
  iconUrlInput.value = "";

  getAll("stickers").then(renderShortcuts);
}

function renameShortcut(id) {
  const shortcuts = getUserShortcuts();
  const shortcut = shortcuts.find(s => s.id === id);
  if (!shortcut) return;

  const newName = prompt("Nouveau nom du raccourci :", shortcut.name);
  if (newName === null || !newName.trim()) return;

  shortcut.name = newName.trim();
  saveUserShortcuts(shortcuts);

  getAll("stickers").then(renderShortcuts);
}

function changeShortcutIcon(id) {
  const mode = confirm("OK = choisir un fichier\nAnnuler = coller une URL");

  if (mode) {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";

    input.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;

      const shortcuts = getUserShortcuts();
      const shortcut = shortcuts.find(s => s.id === id);
      if (!shortcut) return;

      shortcut.icon = await fileToDataURL(file);
      saveUserShortcuts(shortcuts);
      await getAll("stickers").then(renderShortcuts);
    };

    input.click();
    return;
  }

  const choice = prompt("Colle l'URL de l'icône :");
  if (!choice || !choice.trim()) return;

  const shortcuts = getUserShortcuts();
  const shortcut = shortcuts.find(s => s.id === id);
  if (!shortcut) return;

  shortcut.icon = choice.trim();
  saveUserShortcuts(shortcuts);
  getAll("stickers").then(renderShortcuts);
}

function deleteShortcut(id) {
  if (!confirm("Supprimer ce raccourci personnel ? Les stickers ne seront pas supprimés.")) return;

  const shortcuts = getUserShortcuts().filter(s => s.id !== id);
  saveUserShortcuts(shortcuts);

  if (currentShortcutId === id) {
    closeShortcutPage();
  }

  getAll("stickers").then(renderShortcuts);
}

function openShortcut(id) {
  currentShortcutId = id;

  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("themesPage").classList.add("hidden");
  document.getElementById("shortcutPage").classList.remove("hidden");

  getAll("stickers").then(renderShortcutPage);
}

function closeShortcutPage() {
  currentShortcutId = null;

  document.getElementById("shortcutPage").classList.add("hidden");
  document.getElementById("themesPage").classList.add("hidden");
  document.getElementById("homePage").classList.remove("hidden");
}

function renderShortcutPage(stickers) {
  const shortcut = getAllShortcuts().find(s => s.id === currentShortcutId);
  if (!shortcut) return;

  document.getElementById("shortcutPageTitle").innerHTML =
    `${shortcut.icon && typeof shortcut.icon === "string" && (shortcut.icon.startsWith("data:") || shortcut.icon.startsWith("http"))
      ? `<img src="${shortcut.icon}" style="width:52px;height:52px;object-fit:cover;border-radius:10px;vertical-align:middle;margin-right:10px;">`
      : `<span style="margin-right:8px;">▣</span>`}${shortcut.name}`;

  renderStickers(
    getShortcutStickers(shortcut, stickers),
    document.getElementById("shortcutPageGallery")
  );
}

function addStickerToShortcut(stickerId, shortcutId) {
  if (shortcutId === "favorites") {
    toggleFavorite(stickerId);
    return;
  }

  if (shortcutId === "recents") {
    recordRecentSticker(stickerId);
    renderAll();
    return;
  }

  const shortcuts = getUserShortcuts();
  const shortcut = shortcuts.find(s => s.id === shortcutId);
  if (!shortcut) return;

  shortcut.stickerIds = shortcut.stickerIds || [];

  if (!shortcut.stickerIds.includes(stickerId)) {
    shortcut.stickerIds.push(stickerId);
  }

  saveUserShortcuts(shortcuts);
  renderAll();
}

function removeStickerFromShortcut(stickerId, shortcutId) {
  if (shortcutId === "favorites") {
    toggleFavorite(stickerId);
    return;
  }

  if (shortcutId === "recents") {
    const ids = getRecentIds().filter(id => id !== stickerId);
    saveRecentIds(ids);
    renderAll();
    return;
  }

  const shortcuts = getUserShortcuts();
  const shortcut = shortcuts.find(s => s.id === shortcutId);
  if (!shortcut) return;

  shortcut.stickerIds = (shortcut.stickerIds || []).filter(id => id !== stickerId);

  saveUserShortcuts(shortcuts);
  renderAll();
}


function renderStickers(stickers, container) {
  container.innerHTML = "";

  const search = document.getElementById("searchInput").value.toLowerCase();
  let renderedCount = 0;

  stickers
    .filter(s => {
      const tagsText = (s.tags || []).join(" ").toLowerCase();
      return s.name.toLowerCase().includes(search) || tagsText.includes(search);
    })
    .sort((a,b) => a.name.localeCompare(b.name, "fr"))
    .forEach(sticker => {
      let url;

      try {
        url = getStickerDisplayUrl(sticker);
      } catch (err) {
        console.error("Sticker impossible à afficher :", sticker, err);
        return;
      }

      if (!url) {
        console.warn("Sticker sans image :", sticker);
        return;
      }

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = url;
      img.title = "Cliquer pour agrandir";
      img.style.cursor = "zoom-in";
      img.onclick = () => openPreview(sticker.id);

      const title = document.createElement("div");
      title.innerHTML = `<strong>${sticker.name}</strong>`;

      const tags = document.createElement("div");
      tags.className = "sticker-tags";
      if (sticker.tags && sticker.tags.length) {
        sticker.tags.forEach(tag => {
          const span = document.createElement("span");
          span.className = "tag-tape";
          span.textContent = "#" + tag;
          tags.appendChild(span);
        });
      }

      const primaryActions = document.createElement("div");
      primaryActions.className = "primary-actions";

      const previewBtnMain = document.createElement("button");
      previewBtnMain.textContent = "Aperçu";
      previewBtnMain.onclick = () => openPreview(sticker.id);

      const copyBtnMain = document.createElement("button");
      copyBtnMain.textContent = "Copier URL";
      copyBtnMain.onclick = () => copyStickerUrl(sticker.id);

      primaryActions.appendChild(previewBtnMain);
      primaryActions.appendChild(copyBtnMain);

      const editToggle = document.createElement("button");
      editToggle.className = "edit-toggle";
      editToggle.textContent = "Éditer ▾";

      const editPanel = document.createElement("div");
      editPanel.className = "edit-panel";

      editToggle.onclick = () => {
        editPanel.classList.toggle("open");
        editToggle.textContent = editPanel.classList.contains("open") ? "Éditer ▴" : "Éditer ▾";
      };

      const shortcutRow = document.createElement("div");
      shortcutRow.className = "shortcut-select-row";

      const personalShortcuts = getAllShortcuts();

      if (personalShortcuts.length) {
        const shortcutSelect = document.createElement("select");

        personalShortcuts.forEach(shortcut => {
          const option = document.createElement("option");
          option.value = shortcut.id;
          option.textContent = shortcut.name;
          shortcutSelect.appendChild(option);
        });

        const addShortcutBtn = document.createElement("button");
        addShortcutBtn.textContent = "Ajouter au raccourci";
        addShortcutBtn.onclick = () => addStickerToShortcut(sticker.id, shortcutSelect.value);

        const removeShortcutBtn = document.createElement("button");
        removeShortcutBtn.textContent = "Retirer";
        removeShortcutBtn.onclick = () => removeStickerFromShortcut(sticker.id, shortcutSelect.value);

        shortcutRow.appendChild(shortcutSelect);
        shortcutRow.appendChild(addShortcutBtn);
        shortcutRow.appendChild(removeShortcutBtn);
      } else {
        const emptyShortcutNote = document.createElement("div");
        emptyShortcutNote.className = "empty-note";
        emptyShortcutNote.textContent = "Crée d'abord un raccourci personnel pour y ajouter ce sticker.";
        shortcutRow.appendChild(emptyShortcutNote);
      }

      const moveBtn = document.createElement("button");
      moveBtn.textContent = "Déplacer";
      moveBtn.onclick = () => moveSticker(sticker.id);

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = () => deleteSticker(sticker.id);

      const editTopActions = document.createElement("div");
      editTopActions.className = "edit-top-actions";
      editTopActions.appendChild(moveBtn);
      editTopActions.appendChild(deleteBtn);

      editPanel.appendChild(editTopActions);
      editPanel.appendChild(shortcutRow);

      card.appendChild(img);
      card.appendChild(title);
      card.appendChild(tags);
      card.appendChild(primaryActions);
      card.appendChild(editToggle);
      card.appendChild(editPanel);

      container.appendChild(card);
      renderedCount++;
    });

  if (!renderedCount && stickers.length) {
    const empty = document.createElement("div");
    empty.className = "empty-note";
    empty.textContent = "Aucun sticker affichable ici. Si tu as utilisé un fichier local, réessaie avec une URL d'image publique.";
    container.appendChild(empty);
  }
}

function getStickerDisplayUrl(sticker) {
  if (!sticker) return "";

  // Stickers ajoutés par URL
  if (sticker.type === "url" && sticker.url) {
    return sticker.url;
  }

  // Anciennes versions ou stickers avec URL sans type
  if (sticker.url) {
    return sticker.url;
  }

  // Stickers ajoutés par fichier local : Blob/File stocké dans IndexedDB
  if (sticker.file instanceof Blob) {
    return URL.createObjectURL(sticker.file);
  }

  // Sécurité pour anciennes versions qui auraient stocké une dataURL
  if (typeof sticker.file === "string") {
    return sticker.file;
  }

  // Sécurité supplémentaire si l'image a été stockée sous un autre nom
  if (sticker.dataUrl) {
    return sticker.dataUrl;
  }

  return "";
}

async function openPreview(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  let previewUrl;

  try {
    previewUrl = getStickerDisplayUrl(sticker);
  } catch (err) {
    console.error("Aperçu impossible :", sticker, err);
    alert("Impossible d'afficher ce sticker. L'image locale est peut-être cassée.");
    return;
  }

  if (!previewUrl) {
    alert("Impossible d'afficher ce sticker. L'image est manquante.");
    return;
  }

  document.getElementById("previewImage").src = previewUrl;
  document.getElementById("previewTitle").textContent = sticker.name;
  document.getElementById("previewTags").textContent = sticker.tags && sticker.tags.length
    ? sticker.tags.map(tag => "#" + tag).join(" ")
    : "";

  document.getElementById("previewModal").style.display = "flex";
}

function closePreview(event) {
  if (event && event.target.id !== "previewModal") return;
  document.getElementById("previewModal").style.display = "none";
}

async function copyStickerUrl(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  if (sticker.type !== "url") {
    alert("Ce sticker vient d'un fichier local. Pour Loult, ajoute-le plutôt via une URL publique.");
    return;
  }

  await navigator.clipboard.writeText(sticker.url);
  alert("URL copiée !");
}

async function toggleFavorite(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  sticker.favorite = !sticker.favorite;
  await put("stickers", sticker);
  renderAll();
}

async function toggleThemePin(id) {
  const themes = await getAll("themes");
  const theme = themes.find(t => t.id === id);
  if (!theme) return;

  theme.pinned = !theme.pinned;
  await put("themes", theme);
  renderAll();
}

async function changeThemeIcon(id) {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;

    const themes = await getAll("themes");
    const theme = themes.find(t => t.id === id);
    if (!theme) return;

    theme.icon = await fileToDataURL(file);
    await put("themes", theme);
    renderAll();
  };
  input.click();
}

async function renameTheme(id) {
  const themes = await getAll("themes");
  const theme = themes.find(t => t.id === id);
  if (!theme) return;

  const newName = prompt("Nouveau nom du thème :", theme.name);
  if (newName === null || !newName.trim()) return;

  if (themes.some(t => t.id !== id && t.name.toLowerCase() === newName.toLowerCase())) {
    return alert("Ce nom existe déjà.");
  }

  theme.name = newName;
  await put("themes", theme);
  renderAll();
}

async function deleteTheme(id) {
  if (!confirm("Supprimer ce thème et tous ses stickers ?")) return;

  const stickers = await getAll("stickers");

  for (const sticker of stickers) {
    if (sticker.themeId === id) {
      await del("stickers", sticker.id);
    }
  }

  await del("themes", id);
  renderAll();
}

async function moveSticker(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  const themes = await getAll("themes");
  const themeOptions = sortThemes([...themes]).map(t => `${t.id}:${t.name}`).join("\n");
  const selected = prompt("Sélectionne le thème :\n" + themeOptions);
  
  if (!selected) return;

  const themeId = selected.split(":")[0];
  if (!themes.some(t => t.id === themeId)) return;

  sticker.themeId = themeId;
  await put("stickers", sticker);
  renderAll();
}

async function deleteSticker(id) {
  if (!confirm("Supprimer ce sticker ?")) return;

  await del("stickers", id);

  // Nettoyer aussi les derniers utilisés
  const recentIds = getRecentIds().filter(recentId => recentId !== id);
  saveRecentIds(recentIds);

  // Nettoyer aussi les raccourcis personnels
  const shortcuts = getUserShortcuts().map(shortcut => {
    shortcut.stickerIds = (shortcut.stickerIds || []).filter(stickerId => stickerId !== id);
    return shortcut;
  });
  saveUserShortcuts(shortcuts);

  // Fermer l'aperçu si le sticker supprimé était affiché
  document.getElementById("previewModal").style.display = "none";

  await renderAll();
}

document.getElementById("addThemeBtn").onclick = addTheme;
document.getElementById("addStickerBtn").onclick = addSticker;
document.getElementById("searchBtn").onclick = () => renderAll();
document.getElementById("createShortcutBtn").onclick = createShortcut;
document.getElementById("backShortcutHomeBtn").onclick = closeShortcutPage;

document.getElementById("goThemesBtn").onclick = () => {
  currentShortcutId = null;
  currentThemeId = null;
  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("shortcutPage").classList.add("hidden");
  document.getElementById("themesPage").classList.remove("hidden");
  document.getElementById("stickersView").classList.add("hidden");
};
document.getElementById("backHomeBtn").onclick = () => {
  currentShortcutId = null;
  currentThemeId = null;
  document.getElementById("homePage").classList.remove("hidden");
  document.getElementById("themesPage").classList.add("hidden");
  document.getElementById("shortcutPage").classList.add("hidden");
};
document.getElementById("backThemesBtn").onclick = () => {
  currentThemeId = null;
  document.getElementById("stickersView").classList.add("hidden");
};
document.getElementById("searchInput").addEventListener("keyup", () => renderAll());
</script>

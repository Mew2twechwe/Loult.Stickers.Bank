<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Loult Stickers Bank</title>

<style>
body{margin:0;padding:20px;background:#111;color:white;font-family:Arial,sans-serif}
h1{text-align:center}
.section{background:#1b1b1b;border:1px solid #444;border-radius:12px;padding:18px;margin-bottom:20px}
.sub-section{margin-top:18px;padding-top:15px;border-top:1px solid #444}
input,select,button{padding:10px;margin:5px;border-radius:6px}
button{cursor:pointer;background:#333;color:white;border:1px solid #777}
button:hover{background:#555}
.big-btn{font-size:20px;padding:16px 30px}
.hidden{display:none}
.themes{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.theme{
  background:#222;
  border:1px solid #555;
  border-radius:15px;
  padding:20px;
  min-width:180px;
  text-align:center;
  cursor:pointer;
}

.theme img{
  width:65px;
  height:65px;
  object-fit:cover;
  border-radius:50%;
  border:2px solid #555;
  display:block;
  margin:0 auto 6px;
  background:#1a1a1a;
}

.theme strong{
  font-size:11px;
  display:block;
  line-height:1.1;
}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px}
.card{background:#1b1b1b;border:1px solid #444;border-radius:10px;padding:10px;text-align:center}
.card img{max-width:120px;max-height:120px;object-fit:contain}
.search{width:60%;max-width:450px}
.quick-themes{
  display:flex;
  align-items:center;
  gap:18px;
  overflow-x:auto;
  white-space:nowrap;
  padding:8px 14px;
  flex:1;
  min-width:0;
  max-width:none;
  border-radius:18px;
  background:linear-gradient(90deg,#141414,#1d1230,#101820);
  box-shadow:0 0 12px rgba(130,80,255,0.35);
}

.quick-themes::-webkit-scrollbar{
  height:8px;
}

.quick-themes::-webkit-scrollbar-track{
  background:#111;
  border-radius:20px;
}

.quick-themes::-webkit-scrollbar-thumb{
  background:linear-gradient(90deg,#7f5cff,#00eaff);
  border-radius:20px;
  box-shadow:0 0 8px #7f5cff;
}



.stats-astral{
  position:relative;
  overflow:hidden;
  text-align:center;
  margin:0 auto 22px auto;
  padding:10px 16px;
  max-width:640px;
  border-radius:18px;
  font-weight:bold;
  letter-spacing:.8px;
  color:#fff;
  background:
    radial-gradient(circle at 18% 35%, rgba(70,0,95,.30), transparent 30%),
    radial-gradient(circle at 78% 45%, rgba(150,0,80,.20), transparent 28%),
    linear-gradient(135deg,#07070a,#120018 55%,#07070a);
  border:1px solid rgba(120,80,180,.18);
  box-shadow:
    inset 0 0 18px rgba(0,0,0,.95),
    inset 0 0 14px rgba(110,0,170,.20),
    0 0 6px rgba(90,0,140,.14);
  text-shadow:
    0 0 5px rgba(255,255,255,.85),
    0 0 10px rgba(170,70,255,.55);
}

#stats{
  position:relative;
  z-index:10;
  font-size:18px;
  font-weight:bold;
  white-space:nowrap;
}

.stars-soft{
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}

.stars-soft::before{
  content:"";
  position:absolute;
  inset:-35px 0 0 0;
  background-image:
    radial-gradient(circle at 10% 35%, rgba(255,255,255,.85) 0 .8px, transparent 1.6px),
    radial-gradient(circle at 28% 72%, rgba(210,170,255,.65) 0 .8px, transparent 1.6px),
    radial-gradient(circle at 46% 28%, rgba(255,255,255,.75) 0 .8px, transparent 1.6px),
    radial-gradient(circle at 66% 66%, rgba(255,180,230,.70) 0 .8px, transparent 1.6px),
    radial-gradient(circle at 85% 38%, rgba(190,150,255,.70) 0 .8px, transparent 1.6px);
  background-size:100% 115px;
  animation:softStarFall 12s linear infinite;
  opacity:.65;
  filter:drop-shadow(0 0 3px rgba(255,255,255,.55));
}

.shooting-star{
  position:absolute;
  width:70px;
  height:2px;
  left:-110px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.9), rgba(180,120,255,.45));
  transform:rotate(-28deg);
  filter:
    drop-shadow(0 0 3px rgba(255,255,255,.75))
    drop-shadow(0 0 6px rgba(160,80,255,.65));
  opacity:0;
  z-index:2;
  animation:shootingStar 8s linear infinite;
}

.shooting-star.s2{
  top:62%;
  animation-delay:3.2s;
  animation-duration:10s;
}

.shooting-star.s3{
  display:none;
}

.shooting-star:not(.s2):not(.s3){
  top:35%;
}

@keyframes softStarFall{
  from{ transform:translateY(-70px); }
  to{ transform:translateY(105px); }
}

@keyframes shootingStar{
  0%{
    transform:translate(-120px,-30px) rotate(-28deg);
    opacity:0;
  }
  9%{ opacity:.75; }
  24%{ opacity:.75; }
  38%{
    transform:translate(760px,165px) rotate(-28deg);
    opacity:0;
  }
  100%{
    transform:translate(760px,165px) rotate(-28deg);
    opacity:0;
  }
}

.pinned-theme{
  border-color:rgba(255,215,80,.8);
  box-shadow:0 0 10px rgba(255,215,80,.25);
}
.recent-note{
  color:#aaa;
  font-size:13px;
  margin-top:-8px;
  margin-bottom:12px;
}

.tagline{
  color:#9f8fb5;
  font-size:12px;
  margin:6px 0 8px 0;
}
.tags-display{
  color:#b899ff;
  font-size:12px;
  margin:6px 0;
  line-height:1.3;
}
.preview-modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.82);
  z-index:9999;
}
.preview-box{
  max-width:90vw;
  max-height:90vh;
  background:#111;
  border:1px solid rgba(160,80,255,.45);
  border-radius:18px;
  padding:18px;
  text-align:center;
  box-shadow:0 0 25px rgba(130,80,255,.35);
}
.preview-box img{
  max-width:80vw;
  max-height:70vh;
  object-fit:contain;
}
.preview-title{
  margin-top:10px;
  font-weight:bold;
}
.preview-actions{
  margin-top:12px;
}

</style>
</head>

<body>

<h1>Loult Stickers Bank</h1>

<div class="stats-astral">
  <div class="stars-soft"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star s2"></div>
  <div class="shooting-star s3"></div>
  <div id="stats"></div>
</div>

<div id="homePage">

  <div class="section">
    <h2>Créer un thème</h2>
    <div style="
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
">

<input id="themeName" placeholder="Nom du thème">

<div style="display:inline-block;vertical-align:top;margin-left:10px;">
  <label style="display:block;color:#ccc;font-size:13px;margin-bottom:4px;">
    Icône / illustration :
  </label>
  <input id="themeIcon" type="file" accept="image/*">
</div>

<button id="addThemeBtn">Créer le thème</button>

</div>

    <div class="sub-section">
      <h3>Ajouter un sticker dans un thème</h3>
      <input id="stickerFile" type="file" accept="image/*">
      <input id="stickerUrl" placeholder="Ou URL du sticker">
      <input id="stickerName" placeholder="Nom du sticker">
      <input id="stickerTags" placeholder="Tags : rire, colère, risitas...">
      <select id="themeSelect"></select>
      <button id="addStickerBtn">Ajouter le sticker</button>
    </div>
  </div>

  <div class="section">
    <h2>Recherche</h2>

    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <input class="search" id="searchInput" placeholder="Rechercher un sticker...">
      <button id="searchBtn">Appliquer</button>
      <button id="goThemesBtn" class="big-btn">Voir tous les thèmes</button>

      <div id="quickThemes" class="quick-themes"></div>
    </div>
  </div>

  <div class="section">
    <h2>Favoris ⭐</h2>
    <div id="favoritesGallery" class="gallery"></div>
  </div>

  <div class="section">
    <h2>Derniers utilisés 🕒</h2>
    <div class="recent-note">Clique sur “Utiliser” ou sur l’image d’un sticker pour l’ajouter ici.</div>
    <div id="recentGallery" class="gallery"></div>
  </div>

</div>

<div id="themesPage" class="hidden">

  <div class="section">
    <button id="backHomeBtn" class="big-btn">Retour accueil</button>
  </div>

  <div class="section">
    <h2>Thèmes</h2>
    <div id="themes" class="themes"></div>
  </div>

  <div id="stickersView" class="section hidden">
    <h2 id="themeTitle"></h2>
    <button id="backThemesBtn">Retour aux thèmes</button>
    <div id="gallery" class="gallery"></div>
  </div>

</div>

<div id="previewModal" class="preview-modal" onclick="closePreview(event)">
  <div class="preview-box">
    <img id="previewImage" src="" alt="aperçu sticker">
    <div id="previewTitle" class="preview-title"></div>
    <div id="previewTags" class="tags-display"></div>
    <div class="preview-actions">
      <button onclick="closePreview()">Fermer</button>
    </div>
  </div>
</div>

<script>
let db;
const RECENT_KEY = "loult_recent_stickers_v1";

const request = indexedDB.open("LoultStickersDB", 5);

request.onupgradeneeded = e => {
  db = e.target.result;

  if (!db.objectStoreNames.contains("themes")) {
    db.createObjectStore("themes", { keyPath: "id" });
  }

  if (!db.objectStoreNames.contains("stickers")) {
    db.createObjectStore("stickers", { keyPath: "id" });
  }
};

request.onsuccess = e => {
  db = e.target.result;
  renderAll();
};

function tx(store, mode = "readonly") {
  return db.transaction(store, mode).objectStore(store);
}

function getAll(store) {
  return new Promise(resolve => {
    const req = tx(store).getAll();
    req.onsuccess = () => resolve(req.result);
  });
}

function put(store, value) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").put(value);
    req.onsuccess = () => resolve();
  });
}

function del(store, id) {
  return new Promise(resolve => {
    const req = tx(store, "readwrite").delete(id);
    req.onsuccess = () => resolve();
  });
}

function fileToDataURL(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

function sortThemes(themes) {
  return themes.sort((a,b) => {
    if (!!b.pinned !== !!a.pinned) return (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
    return a.name.localeCompare(b.name, "fr");
  });
}

function getRecentIds() {
  return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
}

function saveRecentIds(ids) {
  localStorage.setItem(RECENT_KEY, JSON.stringify(ids));
}

function recordRecentSticker(id) {
  let ids = getRecentIds().filter(existingId => existingId !== id);
  ids.unshift(id);
  ids = ids.slice(0, 12);
  saveRecentIds(ids);
}

async function addTheme() {
  const input = document.getElementById("themeName");
  const iconInput = document.getElementById("themeIcon");

  const name = input.value.trim();

  if (!name) return alert("Écris un nom de thème.");

  if (!iconInput.files[0]) {
    return alert("Ajoute une icône / illustration pour ce thème.");
  }

  const themes = await getAll("themes");

  if (themes.some(t => t.name.toLowerCase() === name.toLowerCase())) {
    return alert("Ce thème existe déjà.");
  }

  let icon = null;

  if (iconInput.files[0]) {
    icon = await fileToDataURL(iconInput.files[0]);
  }

  await put("themes", {
    id: crypto.randomUUID(),
    name,
    icon,
    pinned: false
  });

  input.value = "";
  iconInput.value = "";

  renderAll();
}

async function addSticker() {
  const file = document.getElementById("stickerFile").files[0];
  const url = document.getElementById("stickerUrl").value.trim();
  const name = document.getElementById("stickerName").value.trim();
  const tags = document.getElementById("stickerTags").value
    .split(",")
    .map(tag => tag.trim())
    .filter(Boolean);
  const themeId = document.getElementById("themeSelect").value;

  if (!file && !url) return alert("Choisis un fichier ou colle une URL.");
  if (!name) return alert("Donne un nom au sticker.");
  if (!themeId) return alert("Choisis un thème.");

  let stickerData = {
    id: crypto.randomUUID(),
    name,
    themeId,
    favorite: false,
    tags
  };

  if (file) {
    stickerData.file = file;
    stickerData.type = "file";
  } else {
    stickerData.url = url;
    stickerData.type = "url";
  }

  await put("stickers", stickerData);

  document.getElementById("stickerFile").value = "";
  document.getElementById("stickerUrl").value = "";
  document.getElementById("stickerName").value = "";
  document.getElementById("stickerTags").value = "";

  renderAll();
}

async function renderAll() {
  const themes = await getAll("themes");
  const stickers = await getAll("stickers");

  renderStats(themes, stickers);
  renderThemeSelect(themes);
  renderQuickThemes(themes);
  renderThemes(themes, stickers);
  renderFavorites(stickers);
  renderRecents(stickers);
}


function renderStats(themes, stickers) {
  const favorites = stickers.filter(s => s.favorite).length;

  document.getElementById("stats").innerHTML =
    `✦ ${themes.length} thèmes ✧ ${stickers.length} stickers ✧ ${favorites} favs ✦`;
}

function renderThemeSelect(themes) {
  const select = document.getElementById("themeSelect");
  select.innerHTML = "";

  sortThemes([...themes])
    .forEach(theme => {
      const option = document.createElement("option");
      option.value = theme.id;
      option.textContent = theme.name;
      select.appendChild(option);
    });
}

function renderQuickThemes(themes) {
  const container = document.getElementById("quickThemes");
  container.innerHTML = "";

  sortThemes([...themes])
    .forEach(theme => {
      const div = document.createElement("div");

      div.style.textAlign = "center";
      div.style.width = "72px";
      div.style.marginRight = "4px";
      div.style.flexShrink = "0";
      div.style.cursor = "pointer";

      div.onclick = () => {
        document.getElementById("goThemesBtn").click();
        setTimeout(() => openTheme(theme.id), 100);
      };

      div.innerHTML = `
        ${theme.icon ? `<img src="${theme.icon}" style="
          width:58px;
          height:58px;
          border-radius:50%;
          object-fit:cover;
          border:2px solid #555;
          display:block;
          margin:0 auto 6px;
        ">` : ""}
        <div style="
          font-size:11px;
          line-height:1;
          overflow:hidden;
          text-overflow:ellipsis;
          white-space:nowrap;
        ">
          ${theme.name}
        </div>
      `;

      container.appendChild(div);
    });
}

function renderThemes(themes, stickers) {
  const container = document.getElementById("themes");
  container.innerHTML = "";

  sortThemes([...themes])
    .forEach(theme => {
      const count = stickers.filter(s => s.themeId === theme.id).length;

      const box = document.createElement("div");
      box.className = "theme";
      if (theme.pinned) box.classList.add("pinned-theme");

      box.innerHTML = `
        ${theme.pinned ? `<div style="color:#ffd54a;font-size:13px;margin-bottom:6px;">📌 Épinglé</div>` : ""}
        ${
          theme.icon
            ? `<img src="${theme.icon}"
                 style="
                   width:90px;
                   height:90px;
                   object-fit:cover;
                   border-radius:50%;
                   border:3px solid #555;
                   display:block;
                   margin:0 auto 12px;
                   background:#1a1a1a;
                 ">`
            : ""
        }

        <div style="
  font-size:18px;
  font-weight:bold;
  margin-top:8px;
">
  ${theme.name}
</div>

<div style="
  color:#aaa;
  font-size:13px;
  margin-top:4px;
">
  ${count} sticker(s)
</div>
      `;

      const openBtn = document.createElement("button");
      openBtn.textContent = "Ouvrir";
      openBtn.onclick = e => {
        e.stopPropagation();
        openTheme(theme.id);
      };

      const renameBtn = document.createElement("button");
      renameBtn.textContent = "Renommer";
      renameBtn.onclick = e => {
        e.stopPropagation();
        renameTheme(theme.id);
      };

      const iconBtn = document.createElement("button");
      iconBtn.textContent = "Icône";
      iconBtn.onclick = e => {
        e.stopPropagation();
        changeThemeIcon(theme.id);
      };

      const pinBtn = document.createElement("button");
      pinBtn.textContent = theme.pinned ? "Désépingler" : "Épingler";
      pinBtn.onclick = e => {
        e.stopPropagation();
        toggleThemePin(theme.id);
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = e => {
        e.stopPropagation();
        deleteTheme(theme.id);
      };

      box.onclick = () => openTheme(theme.id);
      box.appendChild(openBtn);
      box.appendChild(renameBtn);
      box.appendChild(iconBtn);
      box.appendChild(pinBtn);
      box.appendChild(deleteBtn);

      container.appendChild(box);
    });
}

async function openTheme(themeId) {
  const themes = await getAll("themes");
  const stickers = await getAll("stickers");

  const theme = themes.find(t => t.id === themeId);
  if (!theme) return;

  document.getElementById("stickersView").classList.remove("hidden");
  document.getElementById("themeTitle").textContent = theme.name;

  renderStickers(
    stickers.filter(s => s.themeId === themeId),
    document.getElementById("gallery")
  );
}

function renderFavorites(stickers) {
  renderStickers(
    stickers.filter(s => s.favorite),
    document.getElementById("favoritesGallery")
  );
}

function renderRecents(stickers) {
  const ids = getRecentIds();
  const recentStickers = ids
    .map(id => stickers.find(s => s.id === id))
    .filter(Boolean);

  renderStickers(
    recentStickers,
    document.getElementById("recentGallery")
  );
}

function renderStickers(stickers, container) {
  container.innerHTML = "";

  const search = document.getElementById("searchInput").value.toLowerCase();

  stickers
    .filter(s => {
      const tagsText = (s.tags || []).join(" ").toLowerCase();
      return s.name.toLowerCase().includes(search) || tagsText.includes(search);
    })
    .sort((a,b) => a.name.localeCompare(b.name, "fr"))
    .forEach(sticker => {
      const url = getStickerDisplayUrl(sticker);

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = url;
      img.title = "Cliquer pour agrandir";
      img.style.cursor = "zoom-in";
      img.onclick = () => openPreview(sticker.id);

      const title = document.createElement("div");
      title.innerHTML = `<strong>${sticker.name}</strong>`;

      const tags = document.createElement("div");
      tags.className = "tags-display";
      tags.textContent = sticker.tags && sticker.tags.length
        ? sticker.tags.map(tag => "#" + tag).join(" ")
        : "";

      const useBtn = document.createElement("button");
      useBtn.textContent = "Utiliser";
      useBtn.onclick = () => useSticker(sticker.id);

      const previewBtn = document.createElement("button");
      previewBtn.textContent = "Aperçu";
      previewBtn.onclick = () => openPreview(sticker.id);

      const copyBtn = document.createElement("button");
      copyBtn.textContent = "Copier URL";
      copyBtn.onclick = () => copyStickerUrl(sticker.id);

      const postBtn = document.createElement("button");
      postBtn.textContent = "Poster";
      postBtn.onclick = () => prepareLoultPost(sticker.id);

      const favBtn = document.createElement("button");
      favBtn.textContent = sticker.favorite ? "⭐" : "☆";
      favBtn.onclick = () => toggleFavorite(sticker.id);

      const renameBtn = document.createElement("button");
      renameBtn.textContent = "Renommer";
      renameBtn.onclick = () => renameSticker(sticker.id);

      const moveBtn = document.createElement("button");
      moveBtn.textContent = "Déplacer";
      moveBtn.onclick = () => moveSticker(sticker.id);

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Supprimer";
      deleteBtn.onclick = () => deleteSticker(sticker.id);

      card.appendChild(img);
      card.appendChild(title);
      card.appendChild(tags);
      card.appendChild(useBtn);
      card.appendChild(previewBtn);
      card.appendChild(copyBtn);
      card.appendChild(postBtn);
      card.appendChild(favBtn);
      card.appendChild(renameBtn);
      card.appendChild(moveBtn);
      card.appendChild(deleteBtn);

      container.appendChild(card);
    });
}

function getStickerDisplayUrl(sticker) {
  return sticker.type === "url"
    ? sticker.url
    : URL.createObjectURL(sticker.file);
}

async function openPreview(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  document.getElementById("previewImage").src = getStickerDisplayUrl(sticker);
  document.getElementById("previewTitle").textContent = sticker.name;
  document.getElementById("previewTags").textContent = sticker.tags && sticker.tags.length
    ? sticker.tags.map(tag => "#" + tag).join(" ")
    : "";

  document.getElementById("previewModal").style.display = "flex";
}

function closePreview(event) {
  if (event && event.target.id !== "previewModal") return;
  document.getElementById("previewModal").style.display = "none";
}

async function copyStickerUrl(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  if (sticker.type !== "url") {
    alert("Ce sticker vient d'un fichier local. Pour Loult, ajoute-le plutôt via une URL publique.");
    return;
  }

  await navigator.clipboard.writeText(sticker.url);
  alert("URL copiée !");
}

async function prepareLoultPost(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  recordRecentSticker(id);

  if (sticker.type === "url") {
    await navigator.clipboard.writeText(sticker.url);
    alert("Préparé pour Loult : URL copiée. Plus tard, ce bouton pourra poster directement dans le chat.");
  } else {
    alert("Sticker marqué comme utilisé. Pour poster dans Loult, il faudra une URL publique ou une intégration serveur.");
  }

  renderAll();
}

async function useSticker(id) {
  recordRecentSticker(id);
  const stickers = await getAll("stickers");
  renderRecents(stickers);
}

async function toggleThemePin(id) {
  const themes = await getAll("themes");
  const theme = themes.find(t => t.id === id);
  if (!theme) return;

  theme.pinned = !theme.pinned;
  await put("themes", theme);
  renderAll();
}

async function toggleFavorite(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);

  if (!sticker) return;

  sticker.favorite = !sticker.favorite;
  await put("stickers", sticker);

  renderAll();

  if (!document.getElementById("stickersView").classList.contains("hidden")) {
    openTheme(sticker.themeId);
  }
}

async function renameTheme(id) {
  const themes = await getAll("themes");
  const theme = themes.find(t => t.id === id);

  const newName = prompt("Nouveau nom du thème :", theme.name);
  if (!newName) return;

  theme.name = newName.trim();
  await put("themes", theme);
  renderAll();
}

async function renameSticker(id) {
  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);

  const newName = prompt("Nouveau nom du sticker :", sticker.name);
  if (!newName) return;

  sticker.name = newName.trim();
  await put("stickers", sticker);
  renderAll();

  if (!document.getElementById("stickersView").classList.contains("hidden")) {
    openTheme(sticker.themeId);
  }
}


async function moveSticker(id) {
  const stickers = await getAll("stickers");
  const themes = await getAll("themes");

  const sticker = stickers.find(s => s.id === id);
  if (!sticker) return;

  const sortedThemes = sortThemes([...themes]);
  const currentTheme = sortedThemes.find(t => t.id === sticker.themeId);

  const choices = sortedThemes
    .map((t, index) => `${index + 1}. ${t.name}`)
    .join("\n");

  const answer = prompt(
    `Déplacer "${sticker.name}" vers quel thème ?\n\n${choices}`,
    currentTheme ? currentTheme.name : ""
  );

  if (!answer) return;

  let selectedTheme = sortedThemes.find(t =>
    t.name.toLowerCase() === answer.trim().toLowerCase()
  );

  const number = parseInt(answer.trim(), 10);

  if (!selectedTheme && !isNaN(number)) {
    selectedTheme = sortedThemes[number - 1];
  }

  if (!selectedTheme) {
    alert("Thème introuvable.");
    return;
  }

  sticker.themeId = selectedTheme.id;

  await put("stickers", sticker);

  renderAll();

  if (!document.getElementById("stickersView").classList.contains("hidden")) {
    openTheme(selectedTheme.id);
  }
}

async function deleteSticker(id) {
  if (!confirm("Supprimer ce sticker ?")) return;

  const stickers = await getAll("stickers");
  const sticker = stickers.find(s => s.id === id);

  await del("stickers", id);
  renderAll();

  if (sticker && !document.getElementById("stickersView").classList.contains("hidden")) {
    openTheme(sticker.themeId);
  }
}


async function changeThemeIcon(id) {
  const themes = await getAll("themes");
  const theme = themes.find(t => t.id === id);

  if (!theme) return;

  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;

    theme.icon = await fileToDataURL(file);

    await put("themes", theme);
    renderAll();
  };

  input.click();
}

async function deleteTheme(id) {
  const stickers = await getAll("stickers");

  if (stickers.some(s => s.themeId === id)) {
    return alert("Supprime d'abord les stickers de ce thème.");
  }

  if (!confirm("Supprimer ce thème ?")) return;

  await del("themes", id);
  renderAll();
}

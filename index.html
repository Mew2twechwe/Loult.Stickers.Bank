<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Loult Stickers Bank</title>
<style>
body {
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  padding: 30px;
}

h1 {
  text-align: center;
}

#search {
  display: block;
  margin: 20px auto;
  padding: 12px;
  width: 80%;
  max-width: 500px;
  border-radius: 8px;
  border: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
}

.card {
  background: #1b1b1b;
  border: 1px solid #444;
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}

.card img {
  max-width: 120px;
  max-height: 120px;
}

.creator {
  color: #ccc;
  font-size: 14px;
  margin-top: 8px;
}

.tags {
  color: #888;
  font-size: 12px;
}
</style>
</head>
<body>

<h1>Loult Stickers Bank</h1>

<input id="search" placeholder="Rechercher un sticker, créateur ou tag...">

<div class="grid" id="gallery"></div>

<script>
let stickers = [];

fetch("stickers.json")
  .then(response => response.json())
  .then(data => {
    stickers = data;
    render();
  });

document.getElementById("search").addEventListener("input", render);

function render() {
  const gallery = document.getElementById("gallery");
  const search = document.getElementById("search").value.toLowerCase();

  gallery.innerHTML = "";

  stickers
    .filter(sticker => {
      const text = `
        ${sticker.name}
        ${sticker.creator}
        ${sticker.tags.join(" ")}
      `.toLowerCase();

      return text.includes(search);
    })
    .forEach(sticker => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${sticker.image}" alt="${sticker.name}">
        <div>${sticker.name}</div>
        <div class="creator">Créé par : ${sticker.creator}</div>
        <div class="tags">${sticker.tags.map(tag => "#" + tag).join(" ")}</div>
        <button onclick="copySticker('${sticker.image}')">Copier</button>
      `;

      gallery.appendChild(card);
    });
}

function copySticker(url) {
  navigator.clipboard.writeText(url);
  alert("Lien copié !");
}
</script>

</body>
</html>
